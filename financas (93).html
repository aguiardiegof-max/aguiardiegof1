        await saveState(); closeModal(); renderPlanning();
      };
    }
    overlay.querySelector('#pe-save').onclick = async ()=>{
      const title = document.getElementById('pe-title').value.trim();
      const date = document.getElementById('pe-date').value;
      const eventType = document.getElementById('pe-type').value;
      const value = parseMoneyInput(document.getElementById('pe-value').value) || undefined;
      const categoryId = document.getElementById('pe-cat').value || undefined;
      const notes = document.getElementById('pe-notes').value.trim() || undefined;
      if(!title){ alert('Dê um título pro evento.'); return; }
      if(!date){ alert('Escolha uma data.'); return; }
      if(isEdit){
        Object.assign(existing, {title, date, eventType, value, categoryId, notes});
      } else {
        state.planningEvents.push({id: uid(), title, date, eventType, value, categoryId, notes});
      }
      await saveState(); closeModal(); renderPlanning();
    };
  }

  // ---------- BUDGETS ----------
  function renderBudgets(){
    const monthTx = txForMonth(currentYear, currentMonth).filter(t=>t.type==='expense');
    const spentByCat = {};
    monthTx.forEach(t=>{ spentByCat[t.categoryId] = (spentByCat[t.categoryId]||0) + Math.abs(t.amount); });

    const expenseCats = state.categories.filter(c=>c.type==='expense');
    const rows = expenseCats.map(c=>{
      const limit = state.budgets[c.id] || 0;
      const spent = spentByCat[c.id] || 0;
      const pct = limit>0 ? Math.min(100, (spent/limit*100)) : 0;
      const over = limit>0 && spent>limit;
      const barColor = over ? 'var(--rust)' : (pct>75 ? 'var(--amber)' : 'var(--forest)');
      return `<div class="budget-item">
        <div class="budget-top">
          <div class="name"><span class="swatch" style="width:14px;height:14px;background:${c.color}"></span>${c.name}</div>
          <div class="figures mono">
            <span style="color:${over?'var(--rust)':'var(--ink)'}">${fmt(spent)}</span> / 
            <input type="text" inputmode="decimal" class="budget-input" data-cat="${c.id}" value="${limit || ''}" placeholder="0,00">
          </div>
        </div>
        <div class="budget-track"><div class="budget-fill" style="width:${pct}%; background:${barColor}"></div></div>
        ${over ? `<div style="color:var(--rust); font-size:11.5px; margin-top:5px;">Estourou o orçamento em ${fmt(spent-limit)}</div>` : ''}
      </div>`;
    }).join('');

    const overspendRanking = expenseCats.map(c=>{
      const limit = state.budgets[c.id] || 0;
      const spent = spentByCat[c.id] || 0;
      const overage = spent - limit;
      const pctOver = limit>0 ? (spent/limit*100-100) : 0;
      return { c, limit, spent, overage, pctOver };
    }).filter(r=>r.limit>0 && r.overage>0.004).sort((a,b)=>b.overage-a.overage);
    const overspendTotal = overspendRanking.reduce((s,r)=>s+r.overage,0);
    const overspendRankingHtml = overspendRanking.length>0
      ? overspendRanking.map((r,i)=>`
        <div class="overspend-row">
          <div class="overspend-rank">${i+1}</div>
          <div class="overspend-name"><span class="cat-icon" style="background:${r.c.color}"></span>${escapeHtml(r.c.name)}</div>
          <div class="overspend-figures">
            <span class="mono overspend-amount">-${fmt(r.overage)}</span>
            <span class="overspend-pct">${r.pctOver.toFixed(0)}% acima da meta</span>
          </div>
        </div>`).join('')
      : `<div class="empty-state">Nenhuma categoria passou do orçamento este mês. 🎉</div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Orçamentos</h1><div class="subtitle">Defina limites mensais por categoria</div></div>
        ${monthSwitchHtml()}
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-head-row">
          <div>
            <div class="card-title">Maiores estouros do mês</div>
            <div class="card-sub">Categorias que passaram da meta, da maior pra menor diferença</div>
          </div>
          ${overspendRanking.length>0 ? `<span class="mono collapse-total neg">-${fmt(overspendTotal)}</span>` : ''}
        </div>
        ${overspendRankingHtml}
      </div>
      <div class="card">
        <div class="card-title">Limites de ${MONTHS[currentMonth]}</div>
        <div class="card-sub">Clique no valor para editar o limite mensal de cada categoria</div>
        ${rows}
      </div>
    `;
    bindMonthSwitch();
    mainEl.querySelectorAll('.budget-input').forEach(inp=>{
      attachMoneyMask(inp);
      inp.onchange = async (e)=>{
        const val = parseMoneyInput(e.target.value);
        state.budgets[e.target.dataset.cat] = val;
        await saveState(); renderBudgets();
      };
    });
  }

  // ---------- BILLS ----------
  function renderBills(){
    const bills = [...state.bills].sort((a,b)=> (a.paid-b.paid) || a.dueDate.localeCompare(b.dueDate));
    const today = new Date().toISOString().slice(0,10);
    const rows = bills.map(b=>{
      const c = catById(b.categoryId);
      const overdue = !b.paid && b.dueDate < today;
      const dateFmt = new Date(b.dueDate+'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
      return `<div class="bill-row ${overdue?'overdue':''}" data-id="${b.id}">
        <button class="checkbtn ${b.paid?'checked':''}" data-toggle="${b.id}" title="Marcar como pago"></button>
        <div>
          <div class="desc" style="font-weight:600; color:var(--ink);">${escapeHtml(b.desc)}</div>
          <div class="meta">${c?c.name:'Sem categoria'}</div>
        </div>
        <div class="due mono">Vence ${dateFmt}</div>
        <div class="amount mono" style="font-weight:600;">${fmt(b.amount)}</div>
        <div class="pill ${b.paid?'paid':'pending'}">${b.paid?'Pago':(overdue?'Atrasado':'Pendente')}</div>
        <div class="row-actions">
          <button class="icon-btn edit-bill" data-id="${b.id}" title="Editar">✎</button>
          <button class="icon-btn del-bill" data-id="${b.id}" title="Excluir">✕</button>
        </div>
      </div>`;
    }).join('') || `<div class="empty-state"><div class="display">Nenhuma conta cadastrada</div>Adicione suas contas fixas para não perder o vencimento.</div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Contas a pagar</h1><div class="subtitle">Suas contas recorrentes e vencimentos · clique numa conta para editar</div></div>
        <button class="btn btn-primary" id="addBillBtn">+ Nova conta</button>
      </div>
      <div class="card">${rows}</div>
    `;
    document.getElementById('addBillBtn').onclick = ()=> openBillModal();
    mainEl.querySelectorAll('[data-toggle]').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const b = state.bills.find(x=>x.id===btn.dataset.toggle);
        b.paid = !b.paid;
        await saveState(); renderBills();
      };
    });
    mainEl.querySelectorAll('.bill-row').forEach(row=>{
      row.style.cursor = 'pointer';
      row.onclick = ()=> openBillModal(state.bills.find(b=>b.id===row.dataset.id));
    });
    mainEl.querySelectorAll('.edit-bill').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); openBillModal(state.bills.find(b=>b.id===btn.dataset.id)); };
    });
    mainEl.querySelectorAll('.del-bill').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        state.bills = state.bills.filter(b=>b.id!==btn.dataset.id);
        await saveState(); renderBills();
      };
    });
  }

  // ---------- ACCOUNTS ----------
  function renderAccounts(){
    const cardEntries = state.accounts.map((a, idx)=>{
      const bal = computeAccountBalance(a.id);
      const caixinhas = a.caixinhas || [];
      const reserved = caixinhas.reduce((s,c)=>s+c.balance,0);
      const available = bal - reserved;
      const invoiceInfo = a.type==='Crédito' ? currentInvoiceInfo(a) : null;
      const invoiceDueLabel = invoiceInfo && invoiceInfo.dueDate ? new Date(invoiceInfo.dueDate+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : null;
      const caixinhaRows = caixinhas.map(cx=>`
        <div class="caixinha-row">
          <div class="caixinha-info">
            <span class="swatch" style="background:${cx.color}"></span>
            <div>
              <div class="caixinha-name">${escapeHtml(cx.name)}</div>
              ${cx.goal ? `<div class="caixinha-track"><div class="caixinha-fill" style="width:${Math.min(100, cx.goal>0?(cx.balance/cx.goal*100):0)}%"></div></div>` : ''}
            </div>
          </div>
          <div class="caixinha-balance mono">${fmt(cx.balance)}${cx.goal?` <span style="color:var(--slate-mute)">/ ${fmt(cx.goal)}</span>`:''}</div>
          <div class="caixinha-actions">
            <button class="icon-btn cx-edit" data-acc="${a.id}" data-cx="${cx.id}" title="Editar">✎</button>
            <button class="icon-btn cx-move" data-acc="${a.id}" data-cx="${cx.id}" title="Mover dinheiro">⇄</button>
            <button class="icon-btn cx-del" data-acc="${a.id}" data-cx="${cx.id}" title="Excluir">✕</button>
          </div>
        </div>`).join('');

      return { archived: !!a.archived, html: `
      <div class="account-card ${a.archived?'account-archived':''}" data-edit-acc="${a.id}" style="cursor:pointer;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="display:flex; align-items:center; gap:10px;">
            ${bankLogoHtml(a)}
            <div>
              <div class="acc-name">${escapeHtml(a.name)} ${a.archived?'<span class="archived-badge">Arquivada</span>':''}</div>
              <div class="acc-type">${a.type}${dueInfoText(a)}</div>
            </div>
          </div>
          <div class="acc-card-actions">
            <button class="icon-btn move-acc" data-dir="up" data-id="${a.id}" title="Mover para cima" ${idx===0?'disabled':''}>▲</button>
            <button class="icon-btn move-acc" data-dir="down" data-id="${a.id}" title="Mover para baixo" ${idx===state.accounts.length-1?'disabled':''}>▼</button>
            <button class="icon-btn del-acc" data-id="${a.id}" title="Excluir">✕</button>
          </div>
        </div>
        <div class="acc-balance mono" style="color:${bal>=0?'var(--forest)':'var(--rust)'}">${fmt(bal)}</div>
        ${invoiceInfo ? `<div class="available-note">${invoiceInfo.payable?'Fatura a pagar':'Próxima fatura'}${invoiceDueLabel?' · vence '+invoiceDueLabel:''}: <span class="mono">${fmt(invoiceInfo.amount)}</span> · <a href="#" data-view-card-tx="${a.id}">ver lançamentos</a></div>` : ''}
        ${a.type==='Crédito' && hasPayableInvoice(a) ? `<button type="button" class="btn btn-ghost btn-small pay-invoice-btn-light" data-pay-invoice="${a.id}">Pagar fatura</button>` : ''}
        ${caixinhas.length>0 ? `<div class="available-note">Disponível: <span class="mono">${fmt(available)}</span> · em caixinhas: <span class="mono">${fmt(reserved)}</span></div>` : ''}
        <div class="caixinhas-wrap" data-caixinhas-wrap="${a.id}">
          <div class="caixinhas-head">
            <span>Caixinhas</span>
            <button class="add-caixinha" data-acc="${a.id}">+ nova</button>
          </div>
          ${caixinhaRows || '<div style="font-size:11.5px; color:var(--slate-mute);">Nenhuma caixinha ainda.</div>'}
        </div>
      </div>
    ` };
    });
    const activeCardsHtml = cardEntries.filter(c=>!c.archived).map(c=>c.html).join('');
    const archivedCardsHtml = cardEntries.filter(c=>c.archived).map(c=>c.html).join('');

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Contas</h1><div class="subtitle">Carteira, bancos e cartões · clique numa conta para editar</div></div>
        <button class="btn btn-primary" id="addAccBtn">+ Nova conta</button>
      </div>
      <div class="accounts-grid roomy">${activeCardsHtml || '<div class="empty-state">Nenhuma conta ativa. Clique em "+ Nova conta".</div>'}</div>
      ${archivedCardsHtml ? `
        <div class="archived-section">
          <div class="archived-section-title">Contas arquivadas</div>
          <div class="accounts-grid roomy">${archivedCardsHtml}</div>
        </div>` : ''}
      <div class="danger-zone-link">
        <a href="#" id="clearTestDataLink">🗑️ Limpar dados de teste</a>
        <span class="danger-zone-hint">apaga transações, contas a pagar e zera saldos — mantém contas, cartões, grupos e categorias</span>
      </div>
    `;
    document.getElementById('addAccBtn').onclick = ()=> openAccountModal();
    document.getElementById('clearTestDataLink').onclick = (e)=>{ e.preventDefault(); openClearTestDataModal(); };
    mainEl.querySelectorAll('[data-edit-acc]').forEach(card=>{
      card.onclick = ()=> openAccountModal(state.accounts.find(a=>a.id===card.dataset.editAcc));
    });
    mainEl.querySelectorAll('[data-pay-invoice]').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        openPayInvoiceModal(state.accounts.find(a=>a.id===btn.dataset.payInvoice));
      };
    });
    mainEl.querySelectorAll('[data-view-card-tx]').forEach(link=>{
      link.onclick = (e)=>{
        e.preventDefault(); e.stopPropagation();
        openCardTransactionsModal(state.accounts.find(a=>a.id===link.dataset.viewCardTx));
      };
    });
    mainEl.querySelectorAll('.move-acc').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        if(btn.disabled) return;
        const id = btn.dataset.id;
        const idx = state.accounts.findIndex(a=>a.id===id);
        const swapWith = btn.dataset.dir==='up' ? idx-1 : idx+1;
        if(swapWith<0 || swapWith>=state.accounts.length) return;
        [state.accounts[idx], state.accounts[swapWith]] = [state.accounts[swapWith], state.accounts[idx]];
        await saveState(); renderAccounts();
      };
    });
    mainEl.querySelectorAll('.del-acc').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const id = btn.dataset.id;
        if(state.transactions.some(t=>t.accountId===id || t.fromAccountId===id || t.toAccountId===id)){
          alert('Não é possível excluir: existem transações vinculadas a esta conta.');
          return;
        }
        state.accounts = state.accounts.filter(a=>a.id!==id);
        await saveState(); renderAccounts();
      };
    });
    mainEl.querySelectorAll('[data-caixinhas-wrap]').forEach(wrap=>{
      wrap.addEventListener('click', (e)=> e.stopPropagation());
    });
    mainEl.querySelectorAll('.add-caixinha').forEach(btn=>{
      btn.onclick = (e)=>{ e.stopPropagation(); openCaixinhaModal(state.accounts.find(a=>a.id===btn.dataset.acc)); };
    });
    mainEl.querySelectorAll('.cx-edit').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const acc = state.accounts.find(a=>a.id===btn.dataset.acc);
        const cx = (acc.caixinhas||[]).find(c=>c.id===btn.dataset.cx);
        openCaixinhaModal(acc, cx);
      };
    });
    mainEl.querySelectorAll('.cx-move').forEach(btn=>{
      btn.onclick = (e)=>{
        e.stopPropagation();
        const acc = state.accounts.find(a=>a.id===btn.dataset.acc);
        const cx = (acc.caixinhas||[]).find(c=>c.id===btn.dataset.cx);
        openCaixinhaMoveModal(acc, cx);
      };
    });
    mainEl.querySelectorAll('.cx-del').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const acc = state.accounts.find(a=>a.id===btn.dataset.acc);
        const cx = (acc.caixinhas||[]).find(c=>c.id===btn.dataset.cx);
        if(cx.balance>0){
          alert('Resgate o dinheiro da caixinha antes de excluí-la.');
          return;
        }
        acc.caixinhas = (acc.caixinhas||[]).filter(c=>c.id!==cx.id);
        await saveState(); renderAccounts();
      };
    });
  }

  // ---------- CATEGORIES ----------
  function renderCategories(){
    const catCard = c => {
      const subs = c.subcategories || [];
      const chips = subs.map(s=>`<span class="subchip">${escapeHtml(s.name)}<button class="subchip-del" data-parent="${c.id}" data-sub="${s.id}" title="Remover">×</button></span>`).join('');
      return `
      <div class="cat-card-wrap" style="background: var(--paper-2); border:1px solid var(--line); border-radius: 12px; padding: 14px 16px;">
        <div class="cat-card" style="border:none; padding:0; background:transparent;">
          <div class="cat-left cat-left-clickable" data-edit-cat="${c.id}" style="cursor:pointer;"><span class="swatch icon-swatch" style="background:${c.color}">${c.icon||'💰'}</span>${escapeHtml(c.name)}</div>
          <div style="display:flex; gap:4px;">
            <button class="icon-btn edit-cat" data-id="${c.id}" title="Editar">✎</button>
            <button class="icon-btn del-cat" data-id="${c.id}" title="Excluir">✕</button>
          </div>
        </div>
        <div class="subcat-row">
          ${chips}
          <button class="subchip-add" data-parent="${c.id}">+ subcategoria</button>
        </div>
      </div>`;
    };

    const groupBlock = (type) => {
      const groups = (state.groups||[]).filter(g=>g.type===type);
      return groups.map(g=>{
        const cats = state.categories.filter(c=>c.groupId===g.id);
        return `
        <div class="group-block">
          <div class="group-head">
            <div class="group-title"><span class="swatch icon-swatch" style="background:${g.color}">${g.icon||'📁'}</span>${escapeHtml(g.name)}</div>
            <div style="display:flex; gap:6px;">
              <button class="btn btn-ghost btn-small add-cat-in-group" data-group="${g.id}">+ categoria</button>
              <button class="icon-btn del-group" data-id="${g.id}" title="Excluir grupo">✕</button>
            </div>
          </div>
          <div class="cats-grid" style="align-items:start;">
            ${cats.map(catCard).join('') || '<div style="font-size:12px; color:var(--slate-mute);">Nenhuma categoria neste grupo ainda.</div>'}
          </div>
        </div>`;
      }).join('') || `<div class="empty-state">Nenhum grupo ainda. Clique em "+ Novo grupo".</div>`;
    };

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Categorias</h1><div class="subtitle">Grupo → categoria → subcategoria</div></div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-ghost" id="addGroupBtn">+ Novo grupo</button>
          <button class="btn btn-primary" id="addCatBtn">+ Nova categoria</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Despesas</div>
        ${groupBlock('expense')}
      </div>
      <div class="card">
        <div class="card-title">Receitas</div>
        ${groupBlock('income')}
      </div>
    `;
    document.getElementById('addCatBtn').onclick = ()=> openCategoryModal();
    document.getElementById('addGroupBtn').onclick = ()=> openGroupModal();
    mainEl.querySelectorAll('.add-cat-in-group').forEach(btn=>{
      btn.onclick = ()=> openCategoryModal(null, btn.dataset.group);
    });
    mainEl.querySelectorAll('.del-group').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.id;
        if(state.categories.some(c=>c.groupId===id)){
          alert('Não é possível excluir: existem categorias dentro deste grupo.');
          return;
        }
        state.groups = state.groups.filter(g=>g.id!==id);
        await saveState(); renderCategories();
      };
    });
    mainEl.querySelectorAll('.del-cat').forEach(btn=>{
      btn.onclick = async (e)=>{
        e.stopPropagation();
        const id = btn.dataset.id;
        if(state.transactions.some(t=>t.categoryId===id) || state.bills.some(b=>b.categoryId===id)){
          alert('Não é possível excluir: existem lançamentos vinculados a esta categoria.');
          return;
        }
        state.categories = state.categories.filter(c=>c.id!==id);
        delete state.budgets[id];
        await saveState(); renderCategories();
      };
    });
    mainEl.querySelectorAll('.edit-cat, [data-edit-cat]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const id = el.dataset.id || el.dataset.editCat;
        openCategoryModal(state.categories.find(c=>c.id===id));
      };
    });
    mainEl.querySelectorAll('.subchip-add').forEach(btn=>{
      btn.onclick = async ()=>{
        const name = (prompt('Nome da subcategoria:')||'').trim();
        if(!name) return;
        const cat = state.categories.find(c=>c.id===btn.dataset.parent);
        cat.subcategories = cat.subcategories || [];
        cat.subcategories.push({id: uid(), name: toStandardCase(name)});
        await saveState(); renderCategories();
      };
    });
    mainEl.querySelectorAll('.subchip-del').forEach(btn=>{
      btn.onclick = async ()=>{
        const parentId = btn.dataset.parent, subId = btn.dataset.sub;
        if(state.transactions.some(t=>t.subcategoryId===subId)){
          alert('Não é possível excluir: existem transações vinculadas a esta subcategoria.');
          return;
        }
        const cat = state.categories.find(c=>c.id===parentId);
        cat.subcategories = (cat.subcategories||[]).filter(s=>s.id!==subId);
        await saveState(); renderCategories();
      };
    });
  }

  // ---------- MODALS ----------
  function closeModal(){
    const ov = document.getElementById('modalOverlay');
    if(ov) ov.remove();
    if(calcKeypadState) closeCalcKeypad();
  }

  function openSupabaseModal(){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const s = state.settings;
    overlay.innerHTML = `
      <div class="modal">
        <h2>Conectar ao Supabase</h2>
        <div class="card-sub" style="margin-top:-10px;">Cole os dados do seu projeto (Project Settings → API no Supabase).</div>
        <div class="field"><label>URL do projeto</label><input type="text" id="sb-url" value="${s.supabaseUrl?escapeHtml(s.supabaseUrl):''}" placeholder="https://xxxxx.supabase.co"></div>
        <div class="field"><label>Chave anon (public)</label><input type="text" id="sb-key" value="${s.supabaseKey?escapeHtml(s.supabaseKey):''}" placeholder="eyJhbGciOi..."></div>
        <div class="fab-hint">Essa chave fica salva só no seu app. Qualquer pessoa que tenha o arquivo e essa chave consegue ler/gravar esses dados — não compartilhe o arquivo com estranhos.</div>
        <div class="modal-actions">
          ${(s.supabaseUrl||s.supabaseKey)?'<button class="btn btn-danger" id="sb-disconnect">Desconectar</button>':''}
          <button class="btn btn-ghost" id="sb-cancel">Cancelar</button>
          <button class="btn btn-primary" id="sb-save">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    overlay.querySelector('#sb-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(s.supabaseUrl||s.supabaseKey){
      overlay.querySelector('#sb-disconnect').onclick = async ()=>{
        state.settings.supabaseUrl = undefined;
        state.settings.supabaseKey = undefined;
        await saveState();
        await clearAuthSession();
        updateAccountFoot();
        closeModal();
        alert('Desconectado do Supabase.');
        if(root.classList.contains('login-mode')) renderLoginScreen();
      };
    }
    overlay.querySelector('#sb-save').onclick = async ()=>{
      const url = document.getElementById('sb-url').value.trim();
      const key = document.getElementById('sb-key').value.trim();
      if(!url || !key){ alert('Preencha a URL e a chave.'); return; }
      state.settings.supabaseUrl = sbOrigin(url);
      state.settings.supabaseKey = key;
      await saveState();
      closeModal();
      if(!authSession){
        // Sem sessão válida: mostra a tela de login agora mesmo, sem precisar recarregar a página.
        renderLoginScreen();
      } else {
        alert('Conectado! Os próximos lançamentos vão sincronizar automaticamente com o Supabase.');
      }
    };
  }

  // Transforma um lançamento avulso (ex: vindo de uma importação) numa
  // recorrência daqui pra frente — útil quando o histórico importado parou
  // no mês atual mas a despesa (assinatura, parcela de obra etc) continua.
  function openContinueRecurrenceModal(existing){
    const m = /\s*\((\d+)\s*\/\s*(\d+)\)\s*$/.exec(existing.desc||'');
    const baseDesc = m ? existing.desc.slice(0, m.index).trim() : (existing.desc||'').trim();
    const detectedIndex = m ? parseInt(m[1],10) : null;
    const detectedTotal = m ? parseInt(m[2],10) : null;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>Continuar recorrência</h2>
        <div class="card-sub" style="margin-top:-10px;">"${escapeHtml(baseDesc)}" passa a se repetir automaticamente a partir do mês seguinte a ${new Date(existing.date+'T00:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}.</div>
        <div class="type-toggle" style="margin-top:16px;">
          <button type="button" data-mode="fixed" class="${!m?'active income':''}">Fixa (todo mês)</button>
          <button type="button" data-mode="installment" class="${m?'active income':''}">Parcelada (tem fim)</button>
        </div>
        <div id="cr-installment-fields" style="display:${m?'block':'none'}; margin-top:16px;">
          <div class="field-row">
            <div class="field"><label>Essa é a parcela nº</label><input type="text" inputmode="numeric" id="cr-index" value="${detectedIndex||1}"></div>
            <div class="field"><label>De quantas parcelas</label><input type="text" inputmode="numeric" id="cr-total" value="${detectedTotal||2}"></div>
          </div>
          <div class="fab-hint">Vamos criar as parcelas seguintes, do mesmo valor, uma por mês, até completar o total.</div>
        </div>
        <div id="cr-fixed-fields" style="display:${m?'none':'block'}; margin-top:16px;">
          <div class="fab-hint" style="margin-top:0;">Vamos repetir o mesmo valor todo mês, sem data pra acabar (dá pra parar quando quiser, editando e escolhendo "excluir esta e as futuras").</div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="cr-cancel">Cancelar</button>
          <button class="btn btn-primary" id="cr-confirm">Confirmar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    overlay.querySelector('#cr-cancel').onclick = closeModal;
    let mode = m ? 'installment' : 'fixed';
    overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.onclick = ()=>{
        mode = btn.dataset.mode;
        overlay.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active','income'));
        btn.classList.add('active','income');
        document.getElementById('cr-installment-fields').style.display = mode==='installment' ? 'block' : 'none';
        document.getElementById('cr-fixed-fields').style.display = mode==='fixed' ? 'block' : 'none';
      };
    });
    overlay.querySelector('#cr-confirm').onclick = async ()=>{
      const groupId = uid();
      if(mode==='installment'){
        const idx = clampInt(document.getElementById('cr-index').value, 1, 999);
        const total = clampInt(document.getElementById('cr-total').value, idx, 999);
        existing.desc = `${baseDesc} (${idx}/${total})`;
        existing.recurrenceType = 'installment';
        existing.recurrenceGroupId = groupId;
        existing.installmentIndex = idx;
        existing.installmentTotal = total;
        for(let i=idx+1; i<=total; i++){
          state.transactions.push({
            id: uid(), desc: `${baseDesc} (${i}/${total})`, amount: existing.amount,
            date: addMonthsToDateStr(existing.date, i-idx), type: existing.type,
            categoryId: existing.categoryId, subcategoryId: existing.subcategoryId, accountId: existing.accountId,
            paid: existing.type==='expense' || existing.type==='income' ? false : undefined,
            recurrenceType: 'installment', recurrenceGroupId: groupId, installmentIndex: i, installmentTotal: total
          });
        }
      } else {
        existing.recurrenceType = 'fixed';
        existing.recurrenceGroupId = groupId;
        for(let i=1; i<=24; i++){
          state.transactions.push({
            id: uid(), desc: baseDesc, amount: existing.amount,
            date: addMonthsToDateStr(existing.date, i), type: existing.type,
            categoryId: existing.categoryId, subcategoryId: existing.subcategoryId, accountId: existing.accountId,
            paid: existing.type==='expense' || existing.type==='income' ? false : undefined,
            recurrenceType: 'fixed', recurrenceGroupId: groupId
          });
        }
      }
      await saveState();
      closeModal();
      render();
    };
  }

  // Edita a recorrência de um lançamento que já é parte de uma série —
  // regenera "esta e as futuras" com os novos parâmetros, sem mexer no
  // histórico já passado.
  function openEditRecurrenceModal(existing){
    const baseDesc = (existing.recurrenceType==='installment')
      ? (existing.desc||'').replace(/\s*\((\d+)\s*\/\s*(\d+)\)\s*$/, '').trim()
      : (existing.desc||'').trim();
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>Editar recorrência</h2>
        <div class="card-sub" style="margin-top:-10px;">Isso muda "${escapeHtml(baseDesc)}" a partir desta data em diante — o que já passou continua igual.</div>
        <div class="type-toggle" style="margin-top:16px;">
          <button type="button" data-mode="fixed" class="${existing.recurrenceType==='fixed'?'active income':''}">Fixa (todo mês)</button>
          <button type="button" data-mode="installment" class="${existing.recurrenceType==='installment'?'active income':''}">Parcelada (tem fim)</button>
        </div>
        <div class="field" style="margin-top:16px;">
          <label>Valor a partir de agora (R$)</label>
          <input type="text" inputmode="decimal" id="er-amount" value="${Math.abs(existing.amount).toFixed(2).replace('.',',')}">
        </div>
        <div id="er-installment-fields" style="display:${existing.recurrenceType==='installment'?'block':'none'}">
          <div class="field-row">
            <div class="field"><label>Essa é a parcela nº</label><input type="text" inputmode="numeric" id="er-index" value="${existing.installmentIndex||1}" disabled></div>
            <div class="field"><label>De quantas parcelas</label><input type="text" inputmode="numeric" id="er-total" value="${existing.installmentTotal||2}"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="er-cancel">Cancelar</button>
          <button class="btn btn-primary" id="er-confirm">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    overlay.querySelector('#er-cancel').onclick = closeModal;
    let mode = existing.recurrenceType==='installment' ? 'installment' : 'fixed';
    overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.onclick = ()=>{
        mode = btn.dataset.mode;
        overlay.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active','income'));
        btn.classList.add('active','income');
        document.getElementById('er-installment-fields').style.display = mode==='installment' ? 'block' : 'none';
      };
    });
    overlay.querySelector('#er-confirm').onclick = async ()=>{
      const newAmount = parseMoneyInput(document.getElementById('er-amount').value) || Math.abs(existing.amount);
      const signedAmount = existing.type==='income' ? Math.abs(newAmount) : -Math.abs(newAmount);
      const groupId = existing.recurrenceGroupId;
      const fromDate = existing.date;
      // Tira as futuras antigas da série (o que já passou fica intacto).
      state.transactions = state.transactions.filter(t=> !(t.recurrenceGroupId===groupId && t.date>fromDate));

      if(mode==='installment'){
        const idx = existing.installmentIndex || 1;
        const total = clampInt(document.getElementById('er-total').value, idx, 999);
        existing.desc = `${baseDesc} (${idx}/${total})`;
        existing.amount = signedAmount;
        existing.recurrenceType = 'installment';
        existing.installmentIndex = idx;
        existing.installmentTotal = total;
        for(let i=idx+1; i<=total; i++){
          state.transactions.push({
            id: uid(), desc: `${baseDesc} (${i}/${total})`, amount: signedAmount,
            date: addMonthsToDateStr(fromDate, i-idx), type: existing.type,
            categoryId: existing.categoryId, subcategoryId: existing.subcategoryId, accountId: existing.accountId,
            paid: false, recurrenceType: 'installment', recurrenceGroupId: groupId, installmentIndex: i, installmentTotal: total
          });
        }
      } else {
        existing.desc = baseDesc;
        existing.amount = signedAmount;
        existing.recurrenceType = 'fixed';
        existing.installmentIndex = undefined;
        existing.installmentTotal = undefined;
        for(let i=1; i<=24; i++){
          state.transactions.push({
            id: uid(), desc: baseDesc, amount: signedAmount,
            date: addMonthsToDateStr(fromDate, i), type: existing.type,
            categoryId: existing.categoryId, subcategoryId: existing.subcategoryId, accountId: existing.accountId,
            paid: false, recurrenceType: 'fixed', recurrenceGroupId: groupId
          });
        }
      }
      await saveState();
      closeModal();
      render();
    };
  }

  function openTxModal(existing){
    const isEdit = !!existing;
    const type = existing ? existing.type : 'expense';
    // Se a transação editada é uma despesa lançada numa conta do tipo Crédito,
    // trata como "Cartão de crédito" na hora de abrir o formulário.
    const existingAcc = existing ? accById(existing.accountId) : null;
    const isExistingCreditCard = !!(existing && existing.type==='expense' && existingAcc && existingAcc.type==='Crédito');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const catOpts = (t) => [...state.categories].filter(c=>c.type===t).sort((a,b)=>{
      const ga = groupById(a.groupId), gb = groupById(b.groupId);
      const gna = ga ? ga.name : 'zzz', gnb = gb ? gb.name : 'zzz';
      return gna.localeCompare(gnb, 'pt-BR') || a.name.localeCompare(b.name, 'pt-BR');
    }).map(c=>`<option value="${c.id}" ${existing&&existing.categoryId===c.id?'selected':''}>${c.icon?c.icon+' ':''}${c.name}</option>`).join('');
    const accOpts = (selectedId, mode) => state.accounts.filter(a=>{
      if(a.archived && a.id!==selectedId) return false;
      if(mode==='creditOnly') return a.type==='Crédito';
      if(mode==='excludeCredit') return a.type!=='Crédito';
      return true;
    }).map(a=>`<option value="${a.id}" ${selectedId===a.id?'selected':''}>${a.name}${a.archived?' (arquivada)':''}</option>`).join('');
    // Lista global de subcategorias (de todas as categorias do tipo), pra poder
    // escolher a subcategoria primeiro e puxar categoria/grupo automaticamente.
    const subOptsGlobal = (t, selectedId) => {
      const opts = [];
      [...state.categories].filter(c=>c.type===t).sort((a,b)=>{
        const ga = groupById(a.groupId), gb = groupById(b.groupId);
        const gna = ga ? ga.name : 'zzz', gnb = gb ? gb.name : 'zzz';
        return gna.localeCompare(gnb, 'pt-BR') || a.name.localeCompare(b.name, 'pt-BR');
      }).forEach(c=>{
        (c.subcategories||[]).forEach(s=>{
          opts.push(`<option value="${s.id}" ${selectedId===s.id?'selected':''}>${escapeHtml(s.name)} — ${escapeHtml(c.name)}</option>`);
        });
      });
      return '<option value="">Nenhuma (escolher categoria abaixo)</option>' + opts.join('');
    };

    const seriesNote = isEdit && existing.recurrenceGroupId
      ? `<div class="fab-hint" style="margin-top:-6px;">Parte de um lançamento recorrente${existing.installmentTotal?` (${existing.installmentIndex}/${existing.installmentTotal})`:''}.</div>`
      : '';

    const recurrenceBlock = !isEdit ? `
      <div class="field">
        <label>Recorrência</label>
        <select id="f-recurrence">
          <option value="none">Única</option>
          <option value="installment">Parcelada</option>
          <option value="fixed">Fixa (todo mês)</option>
          <option value="period">Por tempo determinado</option>
        </select>
      </div>
      <div id="f-recurrence-extra"></div>
    ` : '';

    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar transação':'Nova transação'}</h2>
        <div class="type-toggle">
          <button type="button" data-type="expense" class="${isEdit && type==='expense' && !isExistingCreditCard?'active expense':''}">Despesa</button>
          <button type="button" data-type="income" class="${isEdit && type==='income'?'active income':''}">Receita</button>
          <button type="button" data-type="transfer" class="${isEdit && type==='transfer'?'active transfer':''}">Transferência</button>
          <button type="button" data-type="creditcard" class="${!isEdit || isExistingCreditCard?'active creditcard':''}">Cartão de crédito</button>
        </div>
        ${!isEdit ? `<div id="f-quickpicks" class="quickpicks"></div>` : ''}
        <div class="field" style="margin-top:16px;">
          <label>Descrição</label>
          <input type="text" id="f-desc" value="${existing?escapeHtml(existing.desc||''):''}" placeholder="${type==='transfer'?'Ex: Pagamento da fatura':'Ex: Supermercado'}" autocomplete="off" list="f-desc-suggestions" autofocus>
          <datalist id="f-desc-suggestions">${recentDescriptions().map(d=>`<option value="${escapeHtml(d)}">`).join('')}</datalist>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Valor (R$)${!isEdit?' <span id="f-amount-hint" style="text-transform:none; font-weight:400;"></span>':''}</label>
            <input type="text" inputmode="decimal" id="f-amount" ${isMobileViewport()?'readonly':''} value="${existing?Math.abs(existing.amount).toFixed(2).replace('.',','):''}" placeholder="0,00">
          </div>
          <div class="field">
            <label id="f-date-label">Data</label>
            <div id="f-date-field-inner">
              <div style="display:flex; gap:6px;">
                <input type="date" id="f-date" style="flex:1;" value="${existing?existing.date:new Date(currentYear,currentMonth,Math.min(new Date().getDate(),28)).toISOString().slice(0,10)}">
                <button type="button" id="f-date-today" class="btn btn-ghost btn-small" style="flex-shrink:0;">Hoje</button>
              </div>
            </div>
          </div>
        </div>
        <div id="f-normal-fields" style="display:${type==='transfer'?'none':'block'}">
          <div class="field">
            <label>Grupo</label>
            <div id="f-group-display" class="group-display"></div>
          </div>
          <div class="field">
            <label>Categoria</label>
            <select id="f-cat">${catOpts(type==='transfer'?'expense':type)}</select>
          </div>
          <div class="field">
            <label>Subcategoria</label>
            <select id="f-subcat">${subOptsGlobal(type==='transfer'?'expense':type, existing?existing.subcategoryId:null)}</select>
          </div>
          <div class="field">
            <label id="f-acc-label">Conta</label>
            <select id="f-acc">${accOpts(existing?existing.accountId:null, (!isEdit || isExistingCreditCard)?'creditOnly':'excludeCredit')}</select>
          </div>
          <div class="field">
            <label>Tags <span style="text-transform:none; font-weight:400;">(separadas por vírgula, opcional)</span></label>
            <input type="text" id="f-tags" value="${existing&&existing.tags?escapeHtml(existing.tags.join(', ')):''}" placeholder="Ex: viagem, reembolsável" list="f-tags-suggestions" autocomplete="off">
            <datalist id="f-tags-suggestions">${allTagsList().map(t=>`<option value="${escapeHtml(t)}">`).join('')}</datalist>
          </div>
          ${seriesNote}
          ${recurrenceBlock}
        </div>
        <div id="f-transfer-fields" style="display:${type==='transfer'?'block':'none'}">
          <div class="field-row">
            <div class="field">
              <label>Da conta</label>
              <select id="f-from-acc">${accOpts(existing?existing.fromAccountId:null)}</select>
            </div>
            <div class="field">
              <label>Para a conta</label>

          ${isEdit && !existing.recurrenceGroupId && existing.type!=='transfer' ? '<button class="btn btn-ghost" id="f-continue-recurrence">🔁 Continuar recorrência</button>' : ''}
          ${isEdit && existing.recurrenceGroupId ? '<button class="btn btn-ghost" id="f-edit-recurrence">✎ Editar recorrência</button>' : ''}
          ${isEdit && existing.recurrenceGroupId ? '<button class="btn btn-danger" id="f-delete-series">Excluir esta e as futuras</button>' : ''}
          ${isEdit?'<button class="btn btn-danger" id="f-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="f-cancel">Cancelar</button>
          <button class="btn btn-primary" id="f-save">Salvar</button>
        </div>
      </div>
    `;
    root.appendChild(overlay);
    const descInput = document.getElementById('f-desc');
    if(descInput) setTimeout(()=> descInput.focus(), 50);
    attachSmartCapitalize(descInput);
    const amountInput = document.getElementById('f-amount');
    if(amountInput && isMobileViewport()){
      amountInput.addEventListener('click', ()=> openCalcKeypad(amountInput));
    } else {
      attachMoneyMask(amountInput);
    }
    let selType = (isExistingCreditCard || !isEdit) ? 'creditcard' : type;

    // Atalhos rápidos: as últimas combinações usadas (descrição + categoria +
    // subcategoria + conta) para o tipo atual, prontas pra preencher com 1 toque.
    function renderQuickPicks(){
      const wrap = document.getElementById('f-quickpicks');
      if(!wrap) return;
      if(selType==='transfer'){ wrap.innerHTML=''; return; }
      const wantAccType = selType==='creditcard' ? 'Crédito' : null;
      const wantTxType = selType==='income' ? 'income' : 'expense';
      const seen = new Set();
      const picks = [];
      [...state.transactions].sort((a,b)=> b.date.localeCompare(a.date)).forEach(t=>{
        if(picks.length>=6 || t.type!==wantTxType || !t.categoryId) return;
        const acc = accById(t.accountId);
        if(wantAccType && (!acc || acc.type!==wantAccType)) return;
        const key = t.categoryId+'|'+(t.subcategoryId||'')+'|'+t.desc;
        if(seen.has(key)) return;
        seen.add(key);
        picks.push(t);
      });
      if(picks.length===0){ wrap.innerHTML=''; return; }
      wrap.innerHTML = picks.map((t,i)=>{
        const c = catById(t.categoryId);
        return `<button type="button" class="quickpick-chip" data-idx="${i}">${c&&c.icon?c.icon+' ':''}${escapeHtml(t.desc)}</button>`;
      }).join('');
      wrap.querySelectorAll('.quickpick-chip').forEach(btn=>{
        btn.onclick = ()=>{
          const t = picks[Number(btn.dataset.idx)];
          document.getElementById('f-desc').value = t.desc;
          document.getElementById('f-cat').value = t.categoryId;
          document.getElementById('f-subcat').value = t.subcategoryId || '';
          if(document.getElementById('f-acc').querySelector(`option[value="${t.accountId}"]`)){
            document.getElementById('f-acc').value = t.accountId;
          }
          updateGroupDisplay();
          document.getElementById('f-amount').focus();
        };
      });
    }

    function bindDateTodayButton(){
      const btn = document.getElementById('f-date-today');
      if(btn) btn.onclick = ()=>{ document.getElementById('f-date').value = new Date().toISOString().slice(0,10); };
    }
    bindDateTodayButton();
    overlay.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !['TEXTAREA','SELECT'].includes(e.target.tagName)){
        e.preventDefault();
        const saveBtn = document.getElementById('f-save');
        if(saveBtn) saveBtn.click();
      }
    });
    setTimeout(()=>{ const d = document.getElementById('f-desc'); if(d) d.focus(); }, 50);

    // Faturas: quando é compra no cartão de crédito, a data vira "em qual
    // fatura isso cai" em vez da data literal da compra. A próxima fatura
    // (a mais próxima que ainda não fechou) fica sempre pré-selecionada.
    const MONTHS_SHORT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    // Sempre oferece: fatura do mês anterior, a próxima (padrão) e mais algumas seguintes.
    // O valor guardado passa a ter o MÊS DA COMPRA (não o mês de vencimento) —
    // assim "Fatura de agosto" sempre grava uma data dentro de agosto, e
    // bate com a forma como o resto do app soma as faturas por mês.
    function invoiceDates(account, count){
      const dueDay = (account && account.dueDay) || 1;
      const closingDay = (account && account.closingDay) || dueDay;
      const today = new Date(); today.setHours(0,0,0,0);
      let closing = new Date(today.getFullYear(), today.getMonth(), closingDay);
      if(closing < today) closing = new Date(closing.getFullYear(), closing.getMonth()+1, closingDay);
      const nextSpendMonth = new Date(closing.getFullYear(), closing.getMonth()-1, 1);
      const start = new Date(nextSpendMonth.getFullYear(), nextSpendMonth.getMonth()-1, 1);
      const dates = [];
      for(let i=0;i<count;i++){
        const m = new Date(start.getFullYear(), start.getMonth()+i, 1);
        const lastDay = new Date(m.getFullYear(), m.getMonth()+1, 0).getDate();
        dates.push(new Date(m.getFullYear(), m.getMonth(), Math.min(dueDay, lastDay)));
      }
      return dates; // dates[i] fica dentro do mês da compra; dates[1] = "próxima fatura a fechar"
    }
    function faturaLabel(d, account){
      const dueDay = (account && account.dueDay) || 1;
      const dueMonthDate = new Date(d.getFullYear(), d.getMonth()+1, 1);
      const lastDay = new Date(dueMonthDate.getFullYear(), dueMonthDate.getMonth()+1, 0).getDate();
      const dd = Math.min(dueDay, lastDay);
      return `Fatura de ${MONTHS_SHORT[d.getMonth()]} — vence ${String(dd).padStart(2,'0')}/${String(dueMonthDate.getMonth()+1).padStart(2,'0')}`;
    }
    function refreshDateOrFaturaField(){
      const isCreditCard = selType==='creditcard';
      const label = document.getElementById('f-date-label');
      const inner = document.getElementById('f-date-field-inner');
      if(isCreditCard){
        const accSel = document.getElementById('f-acc');
        const acc = accSel ? accById(accSel.value) : null;
        const dates = invoiceDates(acc, 5);
        const existingDate = (existing && existing.type==='expense') ? existing.date : null;
        let matchIdx = existingDate ? dates.findIndex(d=> d.toISOString().slice(0,10)===existingDate) : -1;
        if(matchIdx===-1) matchIdx = 1; // padrão: a próxima fatura (índice 1, já que o índice 0 é a do mês anterior)
        const purchaseDay = (existing && existing.purchaseDate) ? existing.purchaseDate : new Date().toISOString().slice(0,10);
        label.textContent = 'Fatura';
        inner.innerHTML = `<select id="f-fatura">${dates.map((d,i)=>`<option value="${d.toISOString().slice(0,10)}" ${i===matchIdx?'selected':''}>${faturaLabel(d, acc)}</option>`).join('')}</select>
          <div class="fab-hint" style="margin:6px 0 3px;">Dia da compra <span style="text-transform:none; font-weight:400;">(opcional, só pra referência — não muda a fatura)</span></div>
          <input type="date" id="f-purchase-date" value="${purchaseDay}">`;
      } else {
        label.textContent = 'Data';
        inner.innerHTML = `<div style="display:flex; gap:6px;">
          <input type="date" id="f-date" style="flex:1;" value="${existing?existing.date:new Date(currentYear,currentMonth,Math.min(new Date().getDate(),28)).toISOString().slice(0,10)}">
          <button type="button" id="f-date-today" class="btn btn-ghost btn-small" style="flex-shrink:0;">Hoje</button>
        </div>`;
        bindDateTodayButton();
      }
    }

    function updateGroupDisplay(){
      const catId = document.getElementById('f-cat').value;
      const cat = catById(catId);
      const group = cat ? groupById(cat.groupId) : null;
      const el = document.getElementById('f-group-display');
      el.innerHTML = group ? `<span class="cat-icon" style="background:${group.color}"></span>${escapeHtml(group.name)}` : '—';
    }
    function subcatParentCategory(subId){
      return state.categories.find(c=> (c.subcategories||[]).some(s=>s.id===subId));
    }
    // Depois que a categoria fica definida (de um jeito ou de outro), a lista de
    // subcategorias passa a mostrar só as daquela categoria — nada de outras categorias.
    function rebuildSubcatOptionsForCategory(catId, keepSelectedId){
      const subSel = document.getElementById('f-subcat');
      const cat = catById(catId);
      const subs = (cat && cat.subcategories) || [];
      subSel.innerHTML = '<option value="">Nenhuma</option>' + subs.map(s=>`<option value="${s.id}" ${keepSelectedId===s.id?'selected':''}>${escapeHtml(s.name)}</option>`).join('');
    }
    // Escolher a subcategoria primeiro puxa a categoria (e o grupo) automaticamente,
    // e a partir daí a lista de subcategorias já fica restrita a essa categoria.
    function onSubcatChange(){
      const subId = document.getElementById('f-subcat').value;
      if(subId){
        const parent = subcatParentCategory(subId);
        if(parent){
          document.getElementById('f-cat').value = parent.id;
          rebuildSubcatOptionsForCategory(parent.id, subId);
        }
      }
      updateGroupDisplay();
    }
    // Escolher a categoria direto também atualiza o grupo, e filtra a lista de
    // subcategorias pra mostrar só as que pertencem a essa categoria.
    function onCatChange(){
      const catId = document.getElementById('f-cat').value;
      rebuildSubcatOptionsForCategory(catId, null);
      updateGroupDisplay();
    }
    function refreshFieldsForType(){
      const isCreditCard = selType==='creditcard';
      const t = (selType==='transfer' || isCreditCard) ? 'expense' : selType;
      document.getElementById('f-subcat').innerHTML = subOptsGlobal(t, existing?existing.subcategoryId:null);
      document.getElementById('f-cat').innerHTML = catOpts(t);
      document.getElementById('f-acc').innerHTML = accOpts(existing?existing.accountId:null, isCreditCard?'creditOnly':'excludeCredit');
      document.getElementById('f-acc-label').textContent = isCreditCard ? 'Cartão de crédito' : 'Conta';
      refreshDateOrFaturaField();
      updateGroupDisplay();
    }
    refreshDateOrFaturaField();
    updateGroupDisplay();
    renderQuickPicks();
    // Editando um lançamento existente: já mostra a lista de subcategorias
    // restrita à categoria dele, em vez da lista global de todas as categorias.
    if(isEdit && existing.categoryId && selType!=='transfer'){
      rebuildSubcatOptionsForCategory(existing.categoryId, existing.subcategoryId);
    }
    overlay.querySelector('#f-subcat') && overlay.querySelector('#f-subcat').addEventListener('change', onSubcatChange);
    overlay.querySelector('#f-cat') && overlay.querySelector('#f-cat').addEventListener('change', onCatChange);
    overlay.querySelector('#f-acc') && overlay.querySelector('#f-acc').addEventListener('change', ()=>{ if(selType==='creditcard') refreshDateOrFaturaField(); });

    function refreshRecurrenceExtra(){
      const sel = document.getElementById('f-recurrence');
      const hint = document.getElementById('f-amount-hint');
      if(!sel) return;
      const mode = sel.value;
      const extra = document.getElementById('f-recurrence-extra');
      if(mode==='installment'){
        extra.innerHTML = `<div class="field"><label>Número de parcelas</label><input type="text" inputmode="numeric" id="f-installments" value="2" placeholder="Ex: 3"></div>
          <div class="fab-hint">O valor acima é o total da compra; vamos dividir entre as parcelas e lançar uma por mês.</div>`;
        if(hint) hint.textContent = '(total da compra)';
      } else if(mode==='period'){
        extra.innerHTML = `<div class="field"><label>Repetir por quantos meses</label><input type="text" inputmode="numeric" id="f-months" value="3" placeholder="Ex: 6"></div>
          <div class="fab-hint">O mesmo valor será lançado todo mês, pelo número de meses informado.</div>`;
        if(hint) hint.textContent = '(valor mensal)';
      } else if(mode==='fixed'){
        extra.innerHTML = `<div class="fab-hint">Vamos repetir esse valor todo mês automaticamente, sem data para acabar.</div>`;
        if(hint) hint.textContent = '(valor mensal)';
      } else {
        extra.innerHTML = '';
        if(hint) hint.textContent = '';
      }
    }
    refreshRecurrenceExtra();
    const recSel = document.getElementById('f-recurrence');
    if(recSel) recSel.addEventListener('change', refreshRecurrenceExtra);

    overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.onclick = ()=>{
        selType = btn.dataset.type;
        overlay.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active','expense','income','transfer','creditcard'));
        btn.classList.add('active', selType);
        const isTransfer = selType==='transfer';
        document.getElementById('f-normal-fields').style.display = isTransfer ? 'none' : 'block';
        document.getElementById('f-transfer-fields').style.display = isTransfer ? 'block' : 'none';
        if(!isTransfer) refreshFieldsForType();
        renderQuickPicks();
      };
    });
    overlay.querySelector('#f-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#f-delete').onclick = async ()=>{
        state.transactions = state.transactions.filter(t=>t.id!==existing.id);
        await saveState(); closeModal(); render();
      };
      const continueBtn = overlay.querySelector('#f-continue-recurrence');
      if(continueBtn) continueBtn.onclick = ()=>{ closeModal(); openContinueRecurrenceModal(existing); };
      if(existing.recurrenceGroupId){
        overlay.querySelector('#f-edit-recurrence').onclick = ()=>{ closeModal(); openEditRecurrenceModal(existing); };
        overlay.querySelector('#f-delete-series').onclick = async ()=>{
          state.transactions = state.transactions.filter(t=> !(t.recurrenceGroupId===existing.recurrenceGroupId && t.date>=existing.date));
          await saveState(); closeModal(); render();
        };
      }
    }
    overlay.querySelector('#f-save').onclick = async ()=>{
      const desc = document.getElementById('f-desc').value.trim();
      const amount = parseMoneyInput(document.getElementById('f-amount').value);
      const faturaEl = document.getElementById('f-fatura');
      const date = faturaEl ? faturaEl.value : document.getElementById('f-date').value;

      if(isNaN(amount) || amount<=0 || !date){
        alert('Preencha valor e data.');
        return;
      }

      if(selType==='transfer'){
        const fromAccountId = document.getElementById('f-from-acc').value;
        const toAccountId = document.getElementById('f-to-acc').value;
        if(!fromAccountId || !toAccountId || fromAccountId===toAccountId){
          alert('Escolha duas contas diferentes para a transferência.');
          return;
        }
        const finalDesc = desc || 'Transferência';
        if(isEdit){
          Object.assign(existing, {desc: finalDesc, amount: Math.abs(amount), date, type: 'transfer', fromAccountId, toAccountId, categoryId: undefined, accountId: undefined});
        } else {
          state.transactions.push({id: uid(), desc: finalDesc, amount: Math.abs(amount), date, type: 'transfer', fromAccountId, toAccountId});
        }
      } else {
        const categoryId = document.getElementById('f-cat').value;
        const subcategoryId = document.getElementById('f-subcat') ? (document.getElementById('f-subcat').value || undefined) : undefined;
        const tags = document.getElementById('f-tags') ? parseTagsInput(document.getElementById('f-tags').value) : [];
        const purchaseDate = document.getElementById('f-purchase-date') ? document.getElementById('f-purchase-date').value : undefined;
        const accountId = document.getElementById('f-acc').value;
        if(!desc || !accountId){
          alert('Preencha descrição, valor, data e conta.');
          return;
        }
        const storedType = selType==='creditcard' ? 'expense' : selType;
        const signedAmount = selType==='income' ? Math.abs(amount) : -Math.abs(amount);
        const recurrenceMode = document.getElementById('f-recurrence') ? document.getElementById('f-recurrence').value : 'none';
        const today = new Date().toISOString().slice(0,10);
        // Despesa/receita comum: "pago"/"recebido" segue a data (passado/hoje = ok, futuro = pendente).
        // Despesa de cartão: sempre nasce "pendente" — só vira "pago" quando a fatura é paga.
        const tracksPaid = storedType==='expense' || storedType==='income';
        const paidFor = (d) => {
          if(!tracksPaid) return undefined;
          if(selType==='creditcard') return false;
          return d<=today;
        };

        if(isEdit){
          Object.assign(existing, {desc, amount: signedAmount, date, type: storedType, categoryId, subcategoryId, accountId, tags, purchaseDate: selType==='creditcard'?purchaseDate:undefined, fromAccountId: undefined, toAccountId: undefined});
        } else if(recurrenceMode==='installment'){
          const n = clampInt(document.getElementById('f-installments').value, 2, 48);
          const per = Math.round((amount/n)*100)/100;
          const groupId = uid();
          let allocated = 0;
          for(let i=0;i<n;i++){
            const instAmt = (i===n-1) ? Math.round((amount-allocated)*100)/100 : per;
            allocated += per;
            const signed = selType==='income' ? Math.abs(instAmt) : -Math.abs(instAmt);
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc: `${desc} (${i+1}/${n})`, amount: signed, date: d,
              type: storedType, categoryId, subcategoryId, accountId, tags, purchaseDate: selType==='creditcard'?purchaseDate:undefined, paid: paidFor(d),
              recurrenceType:'installment', recurrenceGroupId: groupId, installmentIndex:i+1, installmentTotal:n
            });
          }
        } else if(recurrenceMode==='period'){
          const n = clampInt(document.getElementById('f-months').value, 1, 60);
          const groupId = uid();
          for(let i=0;i<n;i++){
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc, amount: signedAmount, date: d,
              type: storedType, categoryId, subcategoryId, accountId, tags, purchaseDate: selType==='creditcard'?purchaseDate:undefined, paid: paidFor(d),
              recurrenceType:'period', recurrenceGroupId: groupId, installmentIndex:i+1, installmentTotal:n
            });
          }
        } else if(recurrenceMode==='fixed'){
          const groupId = uid();
          for(let i=0;i<24;i++){
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc, amount: signedAmount, date: d,
              type: storedType, categoryId, subcategoryId, accountId, tags, purchaseDate: selType==='creditcard'?purchaseDate:undefined, paid: paidFor(d),
              recurrenceType:'fixed', recurrenceGroupId: groupId
            });
          }
        } else {
          state.transactions.push({id: uid(), desc, amount: signedAmount, date, type: storedType, categoryId, subcategoryId, accountId, tags, purchaseDate: selType==='creditcard'?purchaseDate:undefined, paid: paidFor(date)});
        }
      }
      await saveState();
      closeModal();
      render();
    };
  }

  // Lista as despesas de um cartão (todas, só pagas, ou só pendentes),
  // reaproveitando o mesmo visual de linha usado na aba Transações.
  // Lista despesas ou receitas pendentes do mês, com um botão pra marcar
  // como paga/recebida na hora, sem precisar abrir a transação inteira.
  function openPendingListModal(kind){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    root.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

    function draw(){
      const list = txForMonth(currentYear, currentMonth).filter(t=>{
        if(t.type!==kind || t.paid!==false) return false;
        if(kind==='expense'){ const acc = accById(t.accountId); if(acc && acc.type==='Crédito') return false; }
        return true;
      }).sort((a,b)=>a.date.localeCompare(b.date));
      const total = list.reduce((s,t)=>s+Math.abs(t.amount),0);

  // Limpa transações/contas a pagar de teste, mantendo a estrutura (contas,
  // cartões, grupos, categorias, subcategorias e metas) intacta.
  // ---------- IMPORTAÇÃO DE PLANILHA EXCEL ----------
  function normalizeMatch(str){
    return (str||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
  }
  function parseBrDate(str){
    const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec((str||'').toString().trim());
    if(!m) return null;
    return `${m[3]}-${m[2]}-${m[1]}`;
  }
  function findAccountByName(name){
    const norm = normalizeMatch(name);
    if(!norm) return null;
    const candidates = state.accounts.filter(a=>normalizeMatch(a.name)===norm);
    if(candidates.length===0) return null;
    // Prefere conta que não seja cartão de crédito, pra evitar confundir
    // "Nubank" (conta corrente na planilha) com o cartão "Nubank" do app.
    return candidates.find(a=>a.type!=='Crédito') || candidates[0];
  }
  function findCategoryByName(name, type){
    const norm = normalizeMatch(name);
    if(!norm) return null;
    return state.categories.find(c=>c.type===type && normalizeMatch(c.name)===norm) || null;
  }
  function ensureImportGroup(type){
    let g = (state.groups||[]).find(gr=>gr.type===type && normalizeMatch(gr.name)==='importados');
    if(!g){
      g = { id: uid(), name: 'Importados', type, color: '#7C8880', icon: '📥' };
      state.groups.push(g);
    }
    return g;
  }
  function ensureCategory(name, type){
    let cat = findCategoryByName(name, type);
    if(!cat){
      const group = ensureImportGroup(type);
      cat = { id: uid(), name: toStandardCase(name), type, groupId: group.id, color:'#7C8880', icon:'📥', subcategories: [] };
      state.categories.push(cat);
    }
    return cat;
  }
  function ensureSubcategory(cat, name){
    if(!name) return null;
    const norm = normalizeMatch(name);
    cat.subcategories = cat.subcategories || [];
    let sub = cat.subcategories.find(s=>normalizeMatch(s.name)===norm);
    if(!sub){
      sub = { id: uid(), name: toStandardCase(name) };
      cat.subcategories.push(sub);
    }
    return sub;
  }

  function openImportModal(){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    root.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

    let parsed = null; // { rows: [...], transferRows: [...], accountNames: Set }
    let accountMap = {}; // nome da planilha -> 'new' | accountId existente

    function drawStep1(){
      overlay.innerHTML = `
        <div class="modal">
          <h2>Importar planilha Excel</h2>
          <div class="card-sub" style="margin-top:-10px;">
            Espera as abas "Receitas e Despesas" (ou "Despesas"/"Receitas") e, opcionalmente, "Transferências" — com as colunas Data, Descrição, Valor, Conta, Situação, Categoria, Subcategoria.
          </div>
          <div class="field" style="margin-top:16px;">
            <label>Arquivo .xlsx</label>
            <input type="file" id="import-file-input" accept=".xlsx,.xls">
          </div>
          <div id="import-status" class="fab-hint" style="margin-top:0;"></div>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="import-cancel">Cancelar</button>
          </div>
        </div>`;
      overlay.querySelector('#import-cancel').onclick = closeModal;
      overlay.querySelector('#import-file-input').onchange = async (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('import-status').textContent = 'Lendo o arquivo...';
        try {
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf, { type: 'array' });
          parsed = extractDataFromWorkbook(wb);
          if(parsed.rows.length===0 && parsed.transferRows.length===0){
            document.getElementById('import-status').textContent = 'Não encontrei nenhuma linha válida nessa planilha. Confira o nome das abas e colunas.';
            return;
          }
          drawStep2();
        } catch(err){
          document.getElementById('import-status').textContent = 'Não consegui ler esse arquivo: ' + (err.message||err);
        }
      };
    }

    function extractDataFromWorkbook(wb){
      const findSheet = (needles) => wb.SheetNames.find(n => needles.some(nd => normalizeMatch(n).includes(normalizeMatch(nd))));
      const toRows = (sheetName) => sheetName ? XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: null }) : [];

      let rows = [];
      const combinedName = findSheet(['receitas e despesas']);
      if(combinedName){
        rows = toRows(combinedName);
      } else {
        rows = toRows(findSheet(['despesas'])).concat(toRows(findSheet(['receitas'])));
      }
      rows = rows.filter(r => parseBrDate(r['Data']) && typeof r['Valor']==='number' && r['Conta']);

      const transferName = findSheet(['transferenc']);
      let transferRows = transferName ? toRows(transferName) : [];
      transferRows = transferRows.filter(r => parseBrDate(r['Data']) && typeof r['Valor']==='number' && r['Conta origem'] && r['Conta destino']);

      const accountNames = new Set();
      rows.forEach(r => accountNames.add(String(r['Conta']).trim()));
      transferRows.forEach(r => { accountNames.add(String(r['Conta origem']).trim()); accountNames.add(String(r['Conta destino']).trim()); });

      return { rows, transferRows, accountNames };
    }

    function drawStep2(){
      const names = [...parsed.accountNames].sort();
      names.forEach(n=>{
        if(!(n in accountMap)){
          const match = findAccountByName(n);
          accountMap[n] = match ? match.id : 'new';
        }
      });
      const accOptionsHtml = (selected) => `<option value="new" ${selected==='new'?'selected':''}>+ Criar conta nova</option>` +
        state.accounts.map(a=>`<option value="${a.id}" ${selected===a.id?'selected':''}>${escapeHtml(a.name)} (${a.type})</option>`).join('');

      overlay.innerHTML = `
        <div class="modal" style="width:480px;">
          <h2>Confirme as contas</h2>
          <div class="card-sub" style="margin-top:-10px;">Encontrei ${parsed.rows.length} lançamento(s)${parsed.transferRows.length?` e ${parsed.transferRows.length} transferência(s)`:''}. Pra cada conta da planilha, escolha uma conta existente ou deixe "criar conta nova".</div>
          <div class="import-acc-list">
            ${names.map(n=>`
              <div class="field">
                <label>${escapeHtml(n)}</label>
                <select class="import-acc-select" data-sheet-acc="${escapeHtml(n)}">${accOptionsHtml(accountMap[n])}</select>
              </div>`).join('')}
          </div>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="import-back">Voltar</button>
            <button class="btn btn-primary" id="import-continue">Continuar</button>
          </div>
        </div>`;
      overlay.querySelector('#import-back').onclick = drawStep1;
      overlay.querySelectorAll('.import-acc-select').forEach(sel=>{
        sel.onchange = ()=>{ accountMap[sel.dataset.sheetAcc] = sel.value; };
      });
      overlay.querySelector('#import-continue').onclick = drawStep3;
    }

    function drawStep3(){
      const newAccCount = Object.values(accountMap).filter(v=>v==='new').length;
      overlay.innerHTML = `
        <div class="modal">
          <h2>Pronto para importar</h2>
          <ul class="clear-data-list">
            <li>${parsed.rows.length} lançamento(s) de despesa/receita</li>
            <li>${parsed.transferRows.length} transferência(s)</li>
            <li>${newAccCount} conta(s) nova(s) serão criadas</li>
            <li>Categorias/subcategorias que já existem no app são reaproveitadas; as que não existem entram no grupo "Importados", pra você organizar depois</li>
            <li>O status "Paga"/"Pendente" da planilha vira o selo de pago/pendente no app</li>
          </ul>
          <div class="card-sub">Isso não apaga nada que já existe — só adiciona.</div>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="import-back2">Voltar</button>
            <button class="btn btn-primary" id="import-run">Importar agora</button>
          </div>
        </div>`;
      overlay.querySelector('#import-back2').onclick = drawStep2;
      overlay.querySelector('#import-run').onclick = runImport;
    }

    async function runImport(){
      overlay.querySelector('.modal').innerHTML = `<h2>Importando…</h2><div class="card-sub">Isso pode levar alguns segundos pra planilhas grandes.</div>`;
      await new Promise(r=>setTimeout(r, 30)); // deixa a tela acima pintar antes do trabalho pesado

      const resolvedAccounts = {};
      Object.entries(accountMap).forEach(([sheetName, mapping])=>{
        if(mapping==='new'){
          const acc = { id: uid(), name: sheetName.trim(), type:'Banco', balance: 0, color:'#3F6E92' };
          state.accounts.push(acc);
          resolvedAccounts[sheetName] = acc.id;
        } else {
          resolvedAccounts[sheetName] = mapping;
        }
      });

      let created = 0;
      parsed.rows.forEach(r=>{
        const date = parseBrDate(r['Data']);
        const amount = Number(r['Valor']);
        if(!date || !amount) return;
        const type = amount<0 ? 'expense' : 'income';
        const accountId = resolvedAccounts[String(r['Conta']).trim()];
        if(!accountId) return;
        const cat = r['Categoria'] ? ensureCategory(r['Categoria'], type) : null;
        const sub = cat && r['Subcategoria'] ? ensureSubcategory(cat, r['Subcategoria']) : null;
        const paid = String(r['Situação']||'').trim().toLowerCase()==='paga';
        state.transactions.push({
          id: uid(), desc: (r['Descrição']||'Importado').toString().trim(), amount, date,
          type, categoryId: cat?cat.id:undefined, subcategoryId: sub?sub.id:undefined, accountId,
          paid
        });
        created++;
      });

      let transfersCreated = 0;
      parsed.transferRows.forEach(r=>{
        const date = parseBrDate(r['Data']);
        const amount = Math.abs(Number(r['Valor']));
        const fromAccountId = resolvedAccounts[String(r['Conta origem']).trim()];
        const toAccountId = resolvedAccounts[String(r['Conta destino']).trim()];
        if(!date || !amount || !fromAccountId || !toAccountId || fromAccountId===toAccountId) return;
        state.transactions.push({
          id: uid(), desc: 'Transferência importada', amount, date,
          type: 'transfer', fromAccountId, toAccountId
        });
        transfersCreated++;
      });

      await saveState();
      overlay.querySelector('.modal').innerHTML = `
        <h2>Importação concluída 🎉</h2>
        <div class="card-sub">${created} lançamento(s) e ${transfersCreated} transferência(s) foram adicionados.</div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="import-done">Ver contas</button>
        </div>`;
      overlay.querySelector('#import-done').onclick = ()=>{ closeModal(); currentPage='accounts'; render(); };
    }

    drawStep1();
  }

      });

      const targetMonthKey = monthOverride ? `${monthOverride.year}-${String(monthOverride.month+1).padStart(2,'0')}` : invoiceMonthKey(info.dueDate ? addMonthsToDateStr(info.dueDate, -1) : new Date().toISOString().slice(0,10));

      if(dir==='in'){
