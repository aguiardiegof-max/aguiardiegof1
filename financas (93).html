      const targetId = document.getElementById('merge-target').value;
      if(!targetId) return;
      let count = 0;
      state.transactions.forEach(t=>{
        if(t.accountId===source.id){ t.accountId = targetId; count++; }
        if(t.fromAccountId===source.id){ t.fromAccountId = targetId; count++; }
        if(t.toAccountId===source.id){ t.toAccountId = targetId; count++; }
      });
      await saveState();
      closeModal();
      alert(`${count} lançamento(s) movido(s) para a conta escolhida.`);
      currentPage = 'accounts';
      render();
    };
  }

  function openAccountModal(existing){
    const isEdit = !!existing;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const types = ['Dinheiro','Banco','Crédito','Investimento'];
    const typeOpts = types.map(t=>`<option ${existing&&existing.type===t?'selected':''}>${t}</option>`).join('');
    const currentBal = isEdit ? computeAccountBalance(existing.id) : null;
    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar conta':'Nova conta'}</h2>
        <div class="field"><label>Nome</label><input type="text" id="a-name" value="${isEdit?escapeHtml(existing.name):''}" placeholder="Ex: Poupança"></div>
        <div class="field"><label>Tipo</label>
          <select id="a-type">${typeOpts}</select>
        </div>
        <div class="field-row">
          <div class="field">
            <label>${isEdit?'Saldo inicial (R$)':'Saldo inicial (R$)'}</label>
            <input type="text" inputmode="decimal" id="a-balance" value="${isEdit?existing.balance.toFixed(2).replace('.',','):''}" placeholder="0,00">
          </div>
          <div class="field">
            <label id="a-dueday-label">${existing&&existing.type==='Crédito'?'Dia de vencimento':'Dia de vencimento'}</label>
            <input type="text" inputmode="numeric" id="a-dueday" value="${isEdit&&existing.dueDay?existing.dueDay:''}" placeholder="Ex: 10">
          </div>
        </div>
        <div class="field" id="a-closingday-wrap" style="display:${existing&&existing.type==='Crédito'?'block':'none'}">
          <label>Dia de fechamento da fatura</label>
          <input type="text" inputmode="numeric" id="a-closingday" value="${isEdit&&existing.closingDay?existing.closingDay:''}" placeholder="Ex: 01">
          <div class="fab-hint" style="margin-top:6px; margin-bottom:0;">O botão "Pagar fatura" só libera a partir desse dia.</div>
        </div>
        ${isEdit?`<div class="fab-hint" style="margin-top:-6px;">Saldo atual, com transações: <strong class="mono">${fmt(currentBal)}</strong></div>`:''}
        ${isEdit && existing.archived ? `<div class="fab-hint" style="margin-top:-6px; color:var(--amber);">Esta conta está arquivada — não aparece no painel nem pode receber novos lançamentos.</div>` : ''}
        ${isEdit ? `
        <div class="field balance-adjust-box">
          <label>Ajustar para o saldo real (R$)</label>
          <div style="display:flex; gap:8px;">
            <input type="text" inputmode="decimal" id="a-adjust" placeholder="Ex: 1234,56">
            <button type="button" class="btn btn-ghost btn-small" id="a-adjust-btn">Ajustar</button>
          </div>
          <div class="fab-hint" style="margin-top:6px; margin-bottom:0;">Corrige só o saldo inicial por trás — não cria nenhuma transação, então não aparece nos relatórios de gastos.</div>
        </div>` : ''}
        <div class="modal-actions">
          ${isEdit?`<button class="btn btn-ghost" id="a-archive">${existing.archived?'Reativar conta':'Arquivar conta'}</button>`:''}
          ${isEdit && state.accounts.length>1?`<button class="btn btn-ghost" id="a-merge">Mesclar com outra conta</button>`:''}
          ${isEdit?'<button class="btn btn-danger" id="a-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="a-cancel">Cancelar</button>
          <button class="btn btn-primary" id="a-save">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    attachSmartCapitalize(document.getElementById('a-name'));
    attachMoneyMask(document.getElementById('a-balance'));
    const closingWrap = document.getElementById('a-closingday-wrap');
    document.getElementById('a-type').addEventListener('change', (e)=>{
      closingWrap.style.display = e.target.value==='Crédito' ? 'block' : 'none';
    });
    overlay.querySelector('#a-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#a-archive').onclick = async ()=>{
        existing.archived = !existing.archived;
        await saveState(); closeModal(); render();
      };
      const mergeBtn = overlay.querySelector('#a-merge');
      if(mergeBtn) mergeBtn.onclick = ()=>{ closeModal(); openMergeAccountModal(existing); };
      overlay.querySelector('#a-adjust-btn').onclick = async ()=>{
        const desiredRaw = document.getElementById('a-adjust').value;
        if(!desiredRaw.trim()) return;
        const desired = parseMoneyInput(desiredRaw);
        const delta = desired - computeAccountBalance(existing.id);
        existing.balance = Math.round((existing.balance + delta)*100)/100;
        await saveState();
        closeModal();
        alert(`Saldo ajustado para ${fmt(desired)}. Nenhuma transação foi criada.`);
        render();
      };
      overlay.querySelector('#a-delete').onclick = async ()=>{
        if(state.transactions.some(t=>t.accountId===existing.id || t.fromAccountId===existing.id || t.toAccountId===existing.id)){
          alert('Não é possível excluir: existem transações vinculadas a esta conta. Você pode arquivá-la em vez de excluir.');
          return;
        }
        state.accounts = state.accounts.filter(a=>a.id!==existing.id);
        await saveState(); closeModal(); render();
      };
    }
    overlay.querySelector('#a-save').onclick = async ()=>{
      const name = document.getElementById('a-name').value.trim();
      const type = document.getElementById('a-type').value;
      const balance = parseMoneyInput(document.getElementById('a-balance').value);
      const dueDayRaw = document.getElementById('a-dueday').value.trim();
      const dueDay = dueDayRaw ? Math.min(31, Math.max(1, parseInt(dueDayRaw,10)||0)) : null;
      const closingDayRaw = document.getElementById('a-closingday').value.trim();
      const closingDay = closingDayRaw ? Math.min(31, Math.max(1, parseInt(closingDayRaw,10)||0)) : null;
      if(!name){ alert('Dê um nome para a conta.'); return; }
      if(isEdit){
        Object.assign(existing, {name, type, balance, dueDay: dueDay || undefined, closingDay: type==='Crédito' ? (closingDay||undefined) : undefined});
      } else {
        const colors = ['#1F6E4A','#B8913C','#3F6E92','#8C6FB0','#AE3B2C'];
        state.accounts.push({id: uid(), name, type, balance, dueDay: dueDay || undefined, closingDay: type==='Crédito' ? (closingDay||undefined) : undefined, color: colors[state.accounts.length % colors.length]});
      }
      await saveState(); closeModal(); render();
    };
  }

  function openCategoryModal(existing, presetGroupId){
    const isEdit = !!existing;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const icons = ['💰','🏠','🍽️','🚗','💊','🎮','🎓','🛍️','📦','💼','💻','📈','✈️','🐾','📱','🎁','☕','⚽','🎵','💡'];
    const startIcon = isEdit ? (existing.icon || icons[0]) : icons[0];
    const iconBtns = icons.map((ic,i)=>`<button type="button" class="icon-pick ${ic===startIcon?'active':''}" data-icon="${ic}">${ic}</button>`).join('');
    const startType = isEdit ? existing.type : 'expense';
    const startGroupId = isEdit ? existing.groupId : presetGroupId;
    const groupOpts = (type) => (state.groups||[]).filter(g=>g.type===type).map(g=>`<option value="${g.id}" ${startGroupId===g.id?'selected':''}>${g.icon||'📁'} ${g.name}</option>`).join('');
    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar categoria':'Nova categoria'}</h2>
        <div class="field"><label>Nome</label><input type="text" id="c-name" value="${isEdit?escapeHtml(existing.name):''}" placeholder="Ex: Pets"></div>
        <div class="field"><label>Tipo</label>
          <div class="type-toggle">
            <button type="button" data-type="expense" class="${startType==='expense'?'active expense':''}">Despesa</button>
            <button type="button" data-type="income" class="${startType==='income'?'active income':''}">Receita</button>
          </div>
        </div>
        <div class="field"><label>Grupo</label><select id="c-group">${groupOpts(startType)}</select></div>
        <div class="field"><label>Ícone</label><div class="icon-grid">${iconBtns}</div></div>
        <div class="field"><label>Cor</label><input type="color" id="c-color" value="${isEdit?existing.color:'#1F6E4A'}" style="height:40px; padding:4px;"></div>
        <div class="modal-actions">
          ${isEdit?'<button class="btn btn-danger" id="c-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="c-cancel">Cancelar</button>
          <button class="btn btn-primary" id="c-save">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    attachSmartCapitalize(document.getElementById('c-name'));
    let selType = startType;
    let selIcon = startIcon;
    const groupSel = ()=> document.getElementById('c-group');
    if(!groupOpts(startType)){
      groupSel().innerHTML = '<option value="">Nenhum grupo — crie um primeiro</option>';
    }
    overlay.querySelectorAll('.icon-pick').forEach(btn=>{
      btn.onclick = ()=>{
        selIcon = btn.dataset.icon;
        overlay.querySelectorAll('.icon-pick').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      };
    });
    overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.onclick = ()=>{
        selType = btn.dataset.type;
        overlay.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active','expense','income'));
        btn.classList.add('active', selType);
        groupSel().innerHTML = groupOpts(selType) || '<option value="">Nenhum grupo — crie um primeiro</option>';
      };
    });
    overlay.querySelector('#c-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#c-delete').onclick = async ()=>{
        if(state.transactions.some(t=>t.categoryId===existing.id) || state.bills.some(b=>b.categoryId===existing.id)){
          alert('Não é possível excluir: existem lançamentos vinculados a esta categoria.');
          return;
        }
        state.categories = state.categories.filter(c=>c.id!==existing.id);
        delete state.budgets[existing.id];
        await saveState(); closeModal(); renderCategories();
      };
    }
    overlay.querySelector('#c-save').onclick = async ()=>{
      const name = document.getElementById('c-name').value.trim();
      const color = document.getElementById('c-color').value;
      const groupId = groupSel().value;
      if(!name){ alert('Dê um nome para a categoria.'); return; }
      if(!groupId){ alert('Crie um grupo antes de adicionar uma categoria.'); return; }
      if(isEdit){
        Object.assign(existing, {name: toStandardCase(name), type: selType, groupId, color, icon: selIcon});
      } else {
        state.categories.push({id: uid(), name: toStandardCase(name), type: selType, groupId, color, icon: selIcon, subcategories: []});
      }
      await saveState(); closeModal(); renderCategories();
    };
  }

          <div class="login-sub">${mode==='login' ? 'Entre com seu e-mail e senha' : 'Crie sua conta'}</div>
          <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="voce@email.com"></div>
          <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
          <div class="login-error" id="login-error"></div>
          <button class="btn btn-primary" id="login-submit" style="width:100%; justify-content:center;">${mode==='login'?'Entrar':'Criar conta'}</button>
          <div class="login-switch">${mode==='login' ? 'Não tem conta? <a href="#" id="switchMode">Criar uma</a>' : 'Já tem conta? <a href="#" id="switchMode">Entrar</a>'}</div>
          <div class="login-switch" style="margin-top:8px;"><a href="#" id="loginSbSettings">Configurações do Supabase</a></div>
        </div>`;
      document.getElementById('loginSbSettings').onclick = (e)=>{ e.preventDefault(); openSupabaseModal(); };
      document.getElementById('switchMode').onclick = (e)=>{ e.preventDefault(); mode = mode==='login'?'signup':'login'; draw(); };
      const submit = async ()=>{
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-error');
        errEl.style.color = 'var(--rust)';
        errEl.textContent = '';
        if(!email || !pass){ errEl.textContent = 'Preencha e-mail e senha.'; return; }
        try{
          const data = mode==='login' ? await signInWithPassword(email, pass) : await signUpWithPassword(email, pass);
          if(!data.access_token){
            errEl.style.color = 'var(--forest)';
            errEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar antes de entrar.';
            mode = 'login'; draw();
            return;
          }
          setAuthSession(data);
          await afterLogin();
        } catch(e){
          errEl.textContent = e.message;
        }
      };
      document.getElementById('login-submit').onclick = submit;
      mainEl.querySelectorAll('#login-email, #login-pass').forEach(inp=>{
        inp.addEventListener('keydown', ev=>{ if(ev.key==='Enter') submit(); });
      });
    }
    draw();
  }

  async function afterLogin(){
    root.classList.remove('login-mode');
    mainEl.innerHTML = `<div style="padding:60px; text-align:center; color:var(--slate-mute);">Carregando seus dados...</div>`;
    try {
      const remote = await pullFromSupabase(state.settings.supabaseUrl, state.settings.supabaseKey);
      if(remote){
        remote.settings = remote.settings || {};
        remote.settings.supabaseUrl = state.settings.supabaseUrl;
        remote.settings.supabaseKey = state.settings.supabaseKey;
        state = remote;
      }
    } catch(e){ console.error('supabase pull failed', e); }
    updateAccountFoot();
    await finishBoot();
  }

  async function onLogoutClick(){
    await clearAuthSession();
    updateAccountFoot();
    closeMoreSheet();
    renderLoginScreen();
  }
  document.getElementById('logoutBtn').addEventListener('click', onLogoutClick);
  document.getElementById('logoutBtnMobile').addEventListener('click', onLogoutClick);

  // ---------- INIT ----------
  async function init(){
    mainEl.innerHTML = `<div style="padding:60px; text-align:center; color:var(--slate-mute);">Carregando seus dados...</div>`;
    await loadState();
    await loadAuthSession();
    const configured = !!(state.settings.supabaseUrl && state.settings.supabaseKey);

    if(configured && authSession && authSession.expires_at && Date.now() > authSession.expires_at - 30000){
      const ok = await refreshAuthSession();
      if(!ok) authSession = null;
    }

    if(configured && !authSession){
      renderLoginScreen();
      return;
    }
    if(configured && authSession){
      updateAccountFoot();
      await afterLogin();
      return;
    }
    // Supabase não configurado — segue localmente, sem exigir login.
    await finishBoot();
  }
  init();
})();
</script>
