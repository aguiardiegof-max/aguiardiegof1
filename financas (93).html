  function catById(id){ return state.categories.find(c=>c.id===id); }
  function accById(id){ return state.accounts.find(a=>a.id===id); }

  // Current balance = opening balance stored on the account + every transaction
  // that has ever touched it (income/expense directly, or transfers in/out).
  function computeAccountBalance(accountId){
    const acc = accById(accountId);
    let bal = acc ? (acc.balance || 0) : 0;
    state.transactions.forEach(t=>{
      if(t.type==='transfer'){
        if(t.fromAccountId===accountId) bal -= t.amount;
        if(t.toAccountId===accountId) bal += t.amount;
      } else if(t.accountId===accountId){
        bal += t.amount;
      }
    });
    return bal;
  }

  // Uma fatura junta TODAS as compras feitas num mesmo mês-calendário — sem
  // nunca mudar a data de nenhuma transação. Ela "fecha" (fica paga-mento
  // liberado) no dia de fechamento do mês seguinte ao das compras — ex:
  // compras de julho fecham em 01/08 e ficam pagáveis a partir daí.
  function invoiceMonthKey(dateStr){ return dateStr.slice(0,7); } // "AAAA-MM"
  function isInvoiceMonthClosed(monthKey, closingDay){
    const [y,m] = monthKey.split('-').map(Number); // m é 1-indexado
    const closeDate = new Date(y, m, closingDay||1); // mês "m" (0-indexado) = mês seguinte ao das compras
    const today = new Date(); today.setHours(0,0,0,0);
    return closeDate <= today;
  }
  function hasPayableInvoice(account){
    if(!account || account.type!=='Crédito') return false;
    const closingDay = account.closingDay || 1;
    return state.transactions.some(t=> t.type==='expense' && t.accountId===account.id && !t.paid && isInvoiceMonthClosed(invoiceMonthKey(t.date), closingDay));
  }
  // Descobre qual fatura mostrar: se tem algum mês já fechado e ainda não
  // pago, é esse (libera o botão "Pagar fatura"). Se está tudo pago, mostra
  // o total que já está se acumulando pro mês corrente (fatura em aberto).
  function currentInvoiceInfo(account){
    const closingDay = account.closingDay || 1;
    const dueDay = account.dueDay || closingDay;
    const byMonth = {};
    state.transactions.forEach(t=>{
      if(t.type!=='expense' || t.accountId!==account.id || t.paid) return;
      const key = invoiceMonthKey(t.date);
      byMonth[key] = (byMonth[key]||0) + Math.abs(t.amount);
    });
    const monthToDueDate = (monthKey) => {
      const [y,m] = monthKey.split('-').map(Number);
      const dueMonthDate = new Date(y, m, 1); // mês seguinte ao das compras (0-indexado = m)
      const lastDay = new Date(dueMonthDate.getFullYear(), dueMonthDate.getMonth()+1, 0).getDate();
      const dd = Math.min(dueDay, lastDay);
      return `${dueMonthDate.getFullYear()}-${String(dueMonthDate.getMonth()+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    };
    const closedMonths = Object.keys(byMonth).filter(k=>isInvoiceMonthClosed(k, closingDay)).sort();
    if(closedMonths.length>0){
      const monthKey = closedMonths[0];
      return { payable:true, amount: byMonth[monthKey], dueDate: monthToDueDate(monthKey) };
    }
    const openMonths = Object.keys(byMonth).sort();
    if(openMonths.length>0){
      const monthKey = openMonths[0];
      return { payable:false, amount: byMonth[monthKey], dueDate: monthToDueDate(monthKey) };
    }
    return { payable:false, amount:0, dueDate:null };
  }
  // Igual acima, mas pro mês exato que está sendo visualizado no painel —
  // assim trocar o mês no seletor também atualiza o valor do cartão.
  function invoiceInfoForMonth(account, year, month){
    const closingDay = account.closingDay || 1;
    const dueDay = account.dueDay || closingDay;
    const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
    let amount = 0, pendingAmount = 0;
    state.transactions.forEach(t=>{
      if(t.type!=='expense' || t.accountId!==account.id) return;
      if(invoiceMonthKey(t.date)!==monthKey) return;
      amount += Math.abs(t.amount);
      if(!t.paid) pendingAmount += Math.abs(t.amount);
    });
    const dueMonthDate = new Date(year, month+1, 1);
    const lastDay = new Date(dueMonthDate.getFullYear(), dueMonthDate.getMonth()+1, 0).getDate();
    const dd = Math.min(dueDay, lastDay);
    const dueDate = `${dueMonthDate.getFullYear()}-${String(dueMonthDate.getMonth()+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    return { amount, pendingAmount, dueDate, closed: isInvoiceMonthClosed(monthKey, closingDay) };
  }
  function daysUntilClosing(account){
    const closingDay = account.closingDay || 1;
    const today = new Date(); today.setHours(0,0,0,0);
    let close = new Date(today.getFullYear(), today.getMonth(), closingDay);
    if(close < today) close = new Date(close.getFullYear(), close.getMonth()+1, closingDay);
    return Math.round((close-today)/(1000*60*60*24));
  }

  function txForMonth(y,m){
    return state.transactions.filter(t=>{
      const dt = new Date(t.date+'T00:00:00');
      return dt.getFullYear()===y && dt.getMonth()===m;
    });
  }

  // "Fixed" (indefinite) recurring expenses are generated in rolling batches:
  // whenever the viewed month approaches the edge of what's been generated,
  // we top up further months automatically.
  async function ensureFixedCoverage(){
    const groups = {};
    state.transactions.filter(t=>t.recurrenceType==='fixed').forEach(t=>{
      (groups[t.recurrenceGroupId] = groups[t.recurrenceGroupId] || []).push(t);
    });
    let changed = false;
    Object.values(groups).forEach(list=>{
      list.sort((a,b)=>a.date.localeCompare(b.date));
      const last = list[list.length-1];
      const lastMonthDate = new Date(last.date+'T00:00:00');
      const targetMonthDate = new Date(currentYear, currentMonth+12, 1);
      const n = monthsBetween(new Date(lastMonthDate.getFullYear(), lastMonthDate.getMonth(),1), targetMonthDate);
      const today = new Date().toISOString().slice(0,10);
      const lastAcc = accById(last.accountId);
      const isCardExpense = last.type==='expense' && lastAcc && lastAcc.type==='Crédito';
      const tracksPaid = last.paid!==undefined;
      for(let i=1;i<=n;i++){
        const d = addMonthsToDateStr(last.date, i);
        state.transactions.push({
          id: uid(), desc: last.desc, amount: last.amount, date: d,
          type: last.type, categoryId: last.categoryId, subcategoryId: last.subcategoryId, accountId: last.accountId,
          paid: tracksPaid ? (isCardExpense ? false : d<=today) : undefined,
          recurrenceType: 'fixed', recurrenceGroupId: last.recurrenceGroupId
        });
        changed = true;
      }
    });
    if(changed) await saveState();
  }

  async function render(){
    await ensureFixedCoverage();
    renderNav();
    renderPage();
    updateNotificationBadges();
  }

    `).join('');
    sheetNav.querySelectorAll('[data-page]').forEach(btn=>{
      btn.onclick = ()=>{ currentPage = btn.dataset.page; closeMoreSheet(); render(); };
    });

  function bindMonthSwitch(){

  // ---------- DASHBOARD ----------
  function renderDashboard(){
    const monthTx = txForMonth(currentYear, currentMonth);
    const income = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const savings = income + expense;
    const pctSpent = income>0 ? (Math.abs(expense)/income*100) : null;

    const byCat = {};
    const bySubCat = {};
    monthTx.filter(t=>t.type==='expense').forEach(t=>{
      if(t.subcategoryId && disabledSubcats.has(t.subcategoryId)) return;
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + Math.abs(t.amount);
      const subKey = t.subcategoryId || '__none__';
      bySubCat[t.categoryId] = bySubCat[t.categoryId] || {};
      bySubCat[t.categoryId][subKey] = (bySubCat[t.categoryId][subKey]||0) + Math.abs(t.amount);
    });

    function subBreakdownHtml(cid, c){
      const subMap = bySubCat[cid] || {};
      const entries = Object.entries(subMap).sort((a,b)=>b[1]-a[1]);
      const chips = entries.map(([subId,val])=>{
        const subName = subId==='__none__' ? 'Sem subcategoria' : ((c.subcategories||[]).find(s=>s.id===subId)||{}).name || 'Subcategoria removida';
        const toggleable = subId!=='__none__';
        const isOff = toggleable && disabledSubcats.has(subId);
        const style = isOff ? '' : `background:${c.color}1F; border-color:${c.color}80; color:${c.color};`;
        return `<button type="button" class="subcat-chip ${isOff?'off':''}" ${toggleable?`data-subcat-toggle="${subId}"`:'style="cursor:default;"'} style="${style}">${escapeHtml(subName)} <span class="mono">${fmt(val)}</span></button>`;
      }).join('');
      return `<div class="subcat-chips">${chips}</div>`;
    }

    const catRows = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cid, val])=>{
      const c = catById(cid);
      const hasSubs = !!(c && c.subcategories && c.subcategories.length>0);
      const expanded = hasSubs && expandedDashboardCat===cid;
      const chev = hasSubs ? `<span class="chev ${expanded?'open':''}" data-toggle-cat="${cid}" title="Ver subcategorias aqui">›</span>` : '';
      return `<div class="rank-item">
        <div class="rank-row clickable" data-goto-analysis="${cid}" title="Ver detalhes">
          <span class="rank-name">${chev}<span class="cat-icon" style="background:${c?c.color:'#999'}"></span>${c?c.name:'Outros'}</span>
          <span class="rank-value mono">${fmt(val)}</span>

    }).join('') || `<div class="empty-state">Nenhuma despesa lançada neste mês ainda.</div>`;

    const byGroup = {};
    monthTx.filter(t=>t.type==='expense').forEach(t=>{
      if(t.subcategoryId && disabledSubcats.has(t.subcategoryId)) return;
      const c = catById(t.categoryId);
      const gid = c ? c.groupId : null;
      if(!gid) return;
      byGroup[gid] = (byGroup[gid]||0) + Math.abs(t.amount);
    });
    const groupRows = Object.entries(byGroup).sort((a,b)=>b[1]-a[1]).map(([gid,val])=>{
      const g = groupById(gid);
      return `<div class="rank-row clickable" data-goto-analysis-group="${gid}" title="Ver detalhes">
        <span class="rank-name"><span class="cat-icon" style="background:${g?g.color:'#999'}"></span>${g?g.name:'Sem grupo'}</span>
        <span class="rank-value mono">${fmt(val)}</span>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma despesa lançada neste mês ainda.</div>`;

    const recent = [...monthTx].sort((a,b)=> b.date.localeCompare(a.date)).slice(0,7);
    const recentRows = recent.map(rowHtml).join('') || `<div class="empty-state"><div class="display">Tudo em branco por aqui</div>Lance sua primeira transação do mês.</div>`;

    // Pendências do mês (despesas de cartão ficam de fora — elas têm fluxo
    // próprio via fatura, já coberto na seção de cartões).
    const pendingExpenses = monthTx.filter(t=>{
      if(t.type!=='expense' || t.paid!==false) return false;
      const acc = accById(t.accountId);
      return !(acc && acc.type==='Crédito');
    });
    const pendingExpenseTotal = pendingExpenses.reduce((s,t)=>s+Math.abs(t.amount),0);
    const pendingIncome = monthTx.filter(t=>t.type==='income' && t.paid===false);
    const pendingIncomeTotal = pendingIncome.reduce((s,t)=>s+t.amount,0);

    const accRows = state.accounts.filter(a=>!a.archived && a.type!=='Crédito').map(a=>{
      const bal = computeAccountBalance(a.id);
      return `<div class="acc-mini-row" data-edit-acc="${a.id}">
        ${bankLogoHtml(a)}
        <div style="flex:1;">
          <div style="font-weight:600;color:var(--ink);font-size:13px;">${escapeHtml(a.name)}</div>
          <div class="meta">${a.type}${dueInfoText(a)}</div>
        </div>
        <div class="mono" style="font-weight:600;color:${bal>=0?'var(--forest)':'var(--rust)'}">${fmt(bal)}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma conta cadastrada.</div>`;
    const accountsTotal = state.accounts.filter(a=>!a.archived && a.type!=='Crédito').reduce((s,a)=>s+computeAccountBalance(a.id),0);

    const creditCards = state.accounts.filter(a=>a.type==='Crédito' && !a.archived);
    const creditSummaryRows = creditCards.map(a=>{
      const info = invoiceInfoForMonth(a, currentYear, currentMonth);

      const canPay = info.closed && info.pendingAmount>0.004;
      return `<div class="credit-summary-row">
        <div class="credit-summary-logo">${bankLogoHtml(a)}</div>

        ${canPay ? `<button type="button" class="btn btn-ghost btn-small" data-pay-invoice="${a.id}">Pagar</button>` : '<span class="credit-summary-spacer"></span>'}
      </div>`;
    }).join('') || `<div class="empty-state">Nenhum cartão de crédito cadastrado.</div>`;
    const creditSummaryTotal = creditCards.reduce((s,a)=>s+invoiceInfoForMonth(a, currentYear, currentMonth).amount,0);

    const creditTiles = creditCards.map(a=>{
      const info = invoiceInfoForMonth(a, currentYear, currentMonth);

      const dueLabel = info.dueDate ? new Date(info.dueDate+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : null;
      const canPay = info.closed && info.pendingAmount>0.004;

      return `<div class="credit-tile" data-edit-acc="${a.id}" style="background:${bg};">

        </div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhum cartão de crédito cadastrado.<br><a href="#" id="goAddCard" style="color:var(--brass); font-weight:600;">Adicionar cartão</a></div>`;

    mainEl.innerHTML = `
      <div id="rumo-header" class="dashboard-header">
        <div><h1>Painel</h1><div class="subtitle">Visão geral do seu mês</div></div>
        <div style="display:flex; gap:10px; align-items:center;">
          ${monthSwitchHtml()}

        </div>
      </div>

      <div class="grid-4 dashboard-stats">
        <div class="card stat-card">
          <div class="stat-label">Despesas × Receita</div>
          <div class="stat-value mono ${pctSpent===null?'':pctSpent>=100?'neg':pctSpent>=75?'':'pos'}">${pctSpent===null?'—':pctSpent.toFixed(0)+'%'}</div>
          <div class="stat-note">${pctSpent===null ? 'Sem receita lançada este mês' : pctSpent>=100 ? 'Gastando mais do que ganhou' : `Já usou ${pctSpent.toFixed(0)}% do que ganhou`}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Receitas do mês</div>
          <div class="stat-value pos mono">${fmt(income)}</div>
          <div class="stat-note">${monthTx.filter(t=>t.type==='income').length} lançamento(s)</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Despesas do mês</div>
          <div class="stat-value neg mono">${fmt(expense)}</div>
          <div class="stat-note">${monthTx.filter(t=>t.type==='expense').length} lançamento(s)</div>
        </div>

          <div class="stat-label">Economia do mês</div>

  function multiSelectHtml(id, allLabel, options, selectedSet){
    const count = selectedSet.size;

      : count===1 ? (options.find(o=>o.value===[...selectedSet][0])||{}).label || '1 selecionado'

          <div class="msel-divider"></div>
          ${options.map(o=>`<label class="msel-opt"><input type="checkbox" value="${o.value}" ${selectedSet.has(o.value)?'checked':''}><span>${escapeHtml(o.label)}</span></label>`).join('') || '<div class="msel-empty">Nada pra escolher aqui.</div>'}

  function bindMultiSelect(id, selectedSet, onChange){
    const container = document.getElementById(id);
    if(!container) return;
    const btn = container.querySelector('.msel-btn');
    const panel = container.querySelector('.msel-panel');
    btn.onclick = (e)=>{
      e.stopPropagation();
      document.querySelectorAll('.msel-panel.open').forEach(p=>{ if(p!==panel) p.classList.remove('open'); });
      panel.classList.toggle('open');
    };
    panel.addEventListener('click', e=> e.stopPropagation());
    container.querySelectorAll('input[type=checkbox]:not([data-msel-all])').forEach(cb=>{
      cb.onchange = ()=>{
        if(cb.checked) selectedSet.add(cb.value); else selectedSet.delete(cb.value);
        onChange();
      };
    });
    const allCb = container.querySelector('[data-msel-all]');
    allCb.onchange = ()=>{
      if(allCb.checked){ selectedSet.clear(); onChange(); }
      else allCb.checked = true; // não deixa desmarcar "Todos" sem escolher outra coisa
    };
  }

  // Corrige digitação em CAIXA ALTA sozinha, e garante a primeira letra
  // maiúscula — sem atrapalhar quem já está digitando normalmente.
  function attachSmartCapitalize(el){
    if(!el) return;
    el.addEventListener('input', ()=>{
      const v = el.value;
      if(!v) return;
      const letters = v.replace(/[^a-zA-ZÀ-ÿ]/g,'');
      let next = v;
      if(letters.length>=3 && letters===letters.toUpperCase() && letters!==letters.toLowerCase()){
        next = v.toLowerCase();
      }
      next = next.charAt(0).toUpperCase() + next.slice(1);
      if(next!==v){
        const pos = el.selectionStart;
        el.value = next;
        el.setSelectionRange(pos, pos);
      }
    });
  }

  // Máscara de dinheiro: a pessoa só digita números, e os pontos de milhar
  // e a vírgula decimal aparecem sozinhos (como numa maquininha).
  function attachMoneyMask(el){
    if(!el) return;
    el.addEventListener('input', ()=>{
      let digits = el.value.replace(/\D/g,'');
      if(!digits){ el.value=''; return; }
      digits = digits.replace(/^0+(?=\d)/,'');
      while(digits.length<3) digits = '0'+digits;
      const cents = digits.slice(-2);
      let intPart = digits.slice(0,-2).replace(/^0+(?=\d)/,'') || '0';
      intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      el.value = intPart + ',' + cents;
    });
  }
  // Converte "12.345,67" (com ponto de milhar) num número de verdade.
  function parseMoneyInput(str){
    return parseFloat((str||'').replace(/\./g,'').replace(',','.')) || 0;
  }

  // Teclado numérico próprio pro campo de valor no celular: dá pra somar,
  // subtrair, multiplicar e dividir como numa calculadora, e "Pronto" já
  // preenche o campo com o resultado calculado.
  let calcKeypadState = null;
  function closeCalcKeypad(){
    const kb = document.getElementById('calcKeypad');
    const ov = document.getElementById('calcKeypadOverlay');
    if(kb) kb.remove();
    if(ov) ov.remove();
    calcKeypadState = null;
  }
  function openCalcKeypad(input){
    if(calcKeypadState && calcKeypadState.input===input) return;
    closeCalcKeypad();
    const startingExpr = (input.value||'').trim().replace(',', '.');
    calcKeypadState = { input, expr: /^[0-9.]+$/.test(startingExpr) ? startingExpr : '' };

    const overlay = document.createElement('div');
    overlay.id = 'calcKeypadOverlay';
    overlay.className = 'bn-overlay open';
    overlay.style.zIndex = '1150';
    root.appendChild(overlay);
    overlay.addEventListener('click', closeCalcKeypad);

    const kb = document.createElement('div');
    kb.id = 'calcKeypad';
    kb.className = 'calc-keypad';
    kb.innerHTML = `
      <div class="calc-display mono" id="calcDisplay">0</div>
      <div class="calc-grid">
        <button type="button" data-k="7">7</button><button type="button" data-k="8">8</button><button type="button" data-k="9">9</button><button type="button" class="calc-op" data-k="/">÷</button>
        <button type="button" data-k="4">4</button><button type="button" data-k="5">5</button><button type="button" data-k="6">6</button><button type="button" class="calc-op" data-k="*">×</button>
        <button type="button" data-k="1">1</button><button type="button" data-k="2">2</button><button type="button" data-k="3">3</button><button type="button" class="calc-op" data-k="-">−</button>
        <button type="button" data-k="0">0</button><button type="button" data-k=".">,</button><button type="button" class="calc-op" data-k="back">⌫</button><button type="button" class="calc-op" data-k="+">+</button>
      </div>
      <button type="button" class="calc-done" id="calcDone">Pronto</button>
    `;
    root.appendChild(kb);

    function refreshDisplay(){
      const shown = calcKeypadState.expr.replace(/\./g, ',') || '0';
      document.getElementById('calcDisplay').textContent = shown;
    }
    refreshDisplay();

    kb.querySelectorAll('[data-k]').forEach(btn=>{
      btn.onclick = ()=>{
        const k = btn.dataset.k;
        if(k==='back'){
          calcKeypadState.expr = calcKeypadState.expr.slice(0,-1);
        } else if('+-*/'.includes(k)){
          if(calcKeypadState.expr && !/[+\-*/.]$/.test(calcKeypadState.expr)){
            calcKeypadState.expr += k;
          } else if(calcKeypadState.expr && /[+\-*/]$/.test(calcKeypadState.expr)){
            calcKeypadState.expr = calcKeypadState.expr.slice(0,-1) + k;
          }
        } else if(k==='.'){
          const lastNum = calcKeypadState.expr.split(/[+\-*/]/).pop();
          if(!lastNum.includes('.')) calcKeypadState.expr += '.';
        } else {
          calcKeypadState.expr += k;
        }
        refreshDisplay();
      };
    });

    document.getElementById('calcDone').onclick = ()=>{
      let expr = calcKeypadState.expr.replace(/[+\-*/.]$/, '');
      let result = 0;
      if(expr && /^[0-9+\-*/.]+$/.test(expr)){
        try { result = Function('"use strict"; return (' + expr + ')')(); }
        catch(e){ result = 0; }
      }
      if(!isFinite(result)) result = 0;
      input.value = Math.abs(result).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
      closeCalcKeypad();
    };
  }

  // Descrições mais usadas recentemente, pra sugerir no autocompletar (ajuda

  function recentDescriptions(){
    const counts = {};
    [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,300).forEach(t=>{
      if(!t.desc) return;
      counts[t.desc] = (counts[t.desc]||0) + 1;
    });
    return Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,25);
  }

  }

  // ---------- TRANSACTIONS ----------
  function renderTransactions(){
    const allGroups = state.groups||[];
    const catsForGroup = () => state.categories.filter(c => txFilter.groupIds.size===0 || txFilter.groupIds.has(c.groupId));
    const availableCats = catsForGroup();
    [...txFilter.categoryIds].forEach(cid=>{ if(!availableCats.some(c=>c.id===cid)) txFilter.categoryIds.delete(cid); });
    const subsForFilter = () => {
      const cats = txFilter.categoryIds.size>0 ? availableCats.filter(c=>txFilter.categoryIds.has(c.id)) : availableCats;
      const subs = [];
      cats.forEach(c=> (c.subcategories||[]).forEach(s=> subs.push({...s, catName:c.name})));
      return subs;
    };
    const availableSubs = subsForFilter();
    [...txFilter.subcategoryIds].forEach(sid=>{ if(!availableSubs.some(s=>s.id===sid)) txFilter.subcategoryIds.delete(sid); });

    let list = txForMonth(currentYear, currentMonth);
    if(txFilter.groupIds.size>0) list = list.filter(t=>{ const c=catById(t.categoryId); return c && txFilter.groupIds.has(c.groupId); });
    if(txFilter.categoryIds.size>0) list = list.filter(t=>txFilter.categoryIds.has(t.categoryId));
    if(txFilter.subcategoryIds.size>0) list = list.filter(t=>txFilter.subcategoryIds.has(t.subcategoryId));
    if(txFilter.accountIds.size>0) list = list.filter(t=> t.type==='transfer' ? (txFilter.accountIds.has(t.fromAccountId) || txFilter.accountIds.has(t.toAccountId)) : txFilter.accountIds.has(t.accountId));
    if(txFilter.search.trim()) {
      const q = txFilter.search.toLowerCase();
      list = list.filter(t=>t.desc.toLowerCase().includes(q));
    }
    if(txFilter.tags.size>0) list = list.filter(t=> (t.tags||[]).some(tg=>txFilter.tags.has(tg)));
    list = [...list].sort((a,b)=> b.date.localeCompare(a.date));
    const filteredTotal = list.reduce((s,t)=> t.type==='income' ? s+t.amount : t.type==='expense' ? s-Math.abs(t.amount) : s, 0);

    const groupMsel = multiSelectHtml('groupFilter', 'Todos os grupos', allGroups.map(g=>({value:g.id, label:(g.icon||'📁')+' '+g.name})), txFilter.groupIds);
    const catMsel = multiSelectHtml('catFilter', 'Todas categorias', availableCats.map(c=>({value:c.id, label:(c.icon?c.icon+' ':'')+c.name})), txFilter.categoryIds);
    const subMsel = multiSelectHtml('subFilter', 'Todas subcategorias', availableSubs.map(s=>({value:s.id, label:s.name+(s.catName?' — '+s.catName:'')})), txFilter.subcategoryIds);
    const accMsel = multiSelectHtml('accFilter', 'Todas contas', state.accounts.map(a=>({value:a.id, label:a.name})), txFilter.accountIds);
    const tagMsel = multiSelectHtml('tagFilter', 'Todas tags', allTagsList().map(tg=>({value:tg, label:'#'+tg})), txFilter.tags);

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Transações</h1><div class="subtitle">Todos os lançamentos do mês</div></div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          ${monthSwitchHtml()}
          <div class="type-toggle" id="txViewToggle" style="width:auto;">
            <button type="button" data-view="list" class="${txViewMode==='list'?'active income':''}">Lista</button>
            <button type="button" data-view="hierarchy" class="${txViewMode==='hierarchy'?'active income':''}">Hierarquia</button>
          </div>
          ${txViewMode==='list' ? `<button type="button" class="btn btn-ghost btn-small" id="txSelectModeBtn">${txSelectMode?'✕ Cancelar seleção':'☑️ Selecionar'}</button>` : ''}
          <button class="btn btn-primary new-tx-btn" id="addTxBtn">+ Nova transação</button>
        </div>
      </div>
      <div class="card">
        <div class="toolbar">
          <div class="toolbar-left">
            <input type="text" class="search" id="searchBox" placeholder="Buscar descrição..." value="${txFilter.search}">
            ${groupMsel}
            ${catMsel}
            ${subMsel}
            ${accMsel}
            ${tagMsel}
          </div>
          <div class="subtitle">${list.length} lançamento(s)</div>
        </div>
        <div class="filtered-total-row">
          <span>Total da seleção</span>
          <span class="mono" style="color:${filteredTotal>=0?'var(--forest)':'var(--rust)'}">${fmt(filteredTotal)}</span>
        </div>
        ${txSelectMode && txSelection.size>0 ? `
          <div class="bulk-action-bar">
            <span>${txSelection.size} selecionada(s)</span>
            <select id="bulkMoveTarget" class="filter">${state.accounts.map(a=>`<option value="${a.id}">${escapeHtml(a.name)} (${a.type})</option>`).join('')}</select>
            <button class="btn btn-primary btn-small" id="bulkMoveBtn">Mover para essa conta</button>
            <button class="btn btn-ghost btn-small" id="bulkClearBtn">Limpar seleção</button>
          </div>
          <div class="bulk-action-bar">
            <span>Despesas de cartão — mover pra outra fatura</span>
            <input type="month" id="bulkFaturaTarget" value="${String(currentYear)}-${String(currentMonth+1).padStart(2,'0')}">
            <button class="btn btn-primary btn-small" id="bulkFaturaBtn">Mover fatura das selecionadas</button>
          </div>` : ''}
        ${txViewMode==='list'
          ? `<div class="ledger">${list.map(t=> txSelectMode
              ? `<label class="tx-select-row"><input type="checkbox" class="tx-select-cb" data-id="${t.id}" ${txSelection.has(t.id)?'checked':''}>${rowHtml(t)}</label>`
              : rowHtml(t)
            ).join('') || `<div class="empty-state"><div class="display">Nada encontrado</div>Tente ajustar os filtros ou o mês.</div>`}</div>`
          : renderExpenseHierarchy(list)}
      </div>
    `;
    bindMonthSwitch();
    document.getElementById('addTxBtn').onclick = ()=> openTxModal();
    document.getElementById('searchBox').oninput = (e)=>{ txFilter.search = e.target.value; renderTransactions(); };
    bindMultiSelect('groupFilter', txFilter.groupIds, ()=>{ txFilter.categoryIds.clear(); txFilter.subcategoryIds.clear(); renderTransactions(); });
    bindMultiSelect('catFilter', txFilter.categoryIds, ()=>{ txFilter.subcategoryIds.clear(); renderTransactions(); });
    bindMultiSelect('subFilter', txFilter.subcategoryIds, ()=> renderTransactions());
    bindMultiSelect('accFilter', txFilter.accountIds, ()=> renderTransactions());
    bindMultiSelect('tagFilter', txFilter.tags, ()=> renderTransactions());
    const selModeBtn = document.getElementById('txSelectModeBtn');
    if(selModeBtn) selModeBtn.onclick = ()=>{ txSelectMode = !txSelectMode; if(!txSelectMode) txSelection.clear(); renderTransactions(); };
    mainEl.querySelectorAll('.tx-select-cb').forEach(cb=>{
      cb.onclick = (e)=> e.stopPropagation();
      cb.onchange = ()=>{
        if(cb.checked) txSelection.add(cb.dataset.id); else txSelection.delete(cb.dataset.id);
        renderTransactions();
      };
    });
    const bulkBtn = document.getElementById('bulkMoveBtn');
    if(bulkBtn) bulkBtn.onclick = async ()=>{
      const targetId = document.getElementById('bulkMoveTarget').value;
      if(!targetId) return;
      let count = 0;
      state.transactions.forEach(t=>{
        if(!txSelection.has(t.id)) return;
        if(t.type==='transfer') return; // transferências não têm "a conta", tem origem/destino — pula
        t.accountId = targetId;
        count++;
      });
      await saveState();
      txSelection.clear();
      alert(`${count} lançamento(s) movido(s).`);
      renderTransactions();
    };
    const bulkClearBtn = document.getElementById('bulkClearBtn');
    if(bulkClearBtn) bulkClearBtn.onclick = ()=>{ txSelection.clear(); renderTransactions(); };
    const bulkFaturaBtn = document.getElementById('bulkFaturaBtn');
    if(bulkFaturaBtn) bulkFaturaBtn.onclick = async ()=>{
      const monthVal = document.getElementById('bulkFaturaTarget').value; // "AAAA-MM"
      if(!monthVal) return;
      const [ty, tm] = monthVal.split('-').map(Number); // tm é 1-indexado
      let count = 0, skipped = 0;
      state.transactions.forEach(t=>{
        if(!txSelection.has(t.id)) return;
        if(t.type!=='expense'){ skipped++; return; }
        const acc = accById(t.accountId);
        if(!acc || acc.type!=='Crédito'){ skipped++; return; }
        const dueDay = acc.dueDay || acc.closingDay || 1;
        const lastDay = new Date(ty, tm, 0).getDate();
        t.date = `${ty}-${String(tm).padStart(2,'0')}-${String(Math.min(dueDay,lastDay)).padStart(2,'0')}`;
        count++;
      });
      await saveState();
      txSelection.clear();
      alert(`${count} despesa(s) de cartão movida(s) pra outra fatura.${skipped?` ${skipped} selecionada(s) ignorada(s) por não serem despesa de cartão.`:''}`);
      renderTransactions();
    };
    document.querySelectorAll('#txViewToggle button').forEach(btn=>{
      btn.onclick = ()=>{ txViewMode = btn.dataset.view; renderTransactions(); };
    });
    if(txViewMode==='list'){
      bindLedgerRowActions();
    } else {
      bindHierarchyEvents();
    }
  }

  // Monta a árvore Grupo > Categoria > Subcategoria com o valor de cada nível,
  // a partir das despesas já filtradas (mês + filtros ativos).
  function buildExpenseHierarchy(list){
    const tree = {};
    list.filter(t=>t.type==='expense').forEach(t=>{
      if(t.subcategoryId && disabledSubcats.has(t.subcategoryId)) return;
      const cat = catById(t.categoryId);
      const groupId = cat ? (cat.groupId || '__none__') : '__none__';
      const group = groupId!=='__none__' ? groupById(groupId) : null;
      tree[groupId] = tree[groupId] || { group, total: 0, cats: {} };
      tree[groupId].total += Math.abs(t.amount);
      const catId = t.categoryId || '__none__';
      tree[groupId].cats[catId] = tree[groupId].cats[catId] || { cat, total: 0, subs: {} };
      tree[groupId].cats[catId].total += Math.abs(t.amount);
      const subId = t.subcategoryId || '__none__';
      const subName = subId==='__none__' ? 'Sem subcategoria' : (((cat&&cat.subcategories)||[]).find(s=>s.id===subId)||{}).name || 'Subcategoria removida';
      tree[groupId].cats[catId].subs[subId] = tree[groupId].cats[catId].subs[subId] || { name: subName, total: 0 };
      tree[groupId].cats[catId].subs[subId].total += Math.abs(t.amount);
    });
    return tree;
  }

  function renderExpenseHierarchy(list){
    const tree = buildExpenseHierarchy(list);
    const groupEntries = Object.entries(tree).sort((a,b)=>b[1].total-a[1].total);
    if(groupEntries.length===0) return `<div class="empty-state"><div class="display">Nenhuma despesa encontrada</div>Tente ajustar os filtros ou o mês.</div>`;
    const grandTotal = groupEntries.reduce((s,[,g])=>s+g.total,0);

    const rows = groupEntries.map(([groupId, g])=>{
      const gKey = 'g:'+groupId;
      const gCollapsed = hierarchyCollapsed.has(gKey);
      const gColor = g.group ? g.group.color : '#6E6E6E';
      const catEntries = Object.entries(g.cats).sort((a,b)=>b[1].total-a[1].total);

      const catRowsHtml = catEntries.map(([catId, cEntry])=>{
        const cKey = 'c:'+groupId+':'+catId;
        const cCollapsed = hierarchyCollapsed.has(cKey);
        const cColor = cEntry.cat ? cEntry.cat.color : gColor;
        const subEntries = Object.entries(cEntry.subs).sort((a,b)=>b[1].total-a[1].total);
        const hasRealSubs = subEntries.length>0 && !(subEntries.length===1 && subEntries[0][0]==='__none__');

        const subChipsHtml = subEntries.map(([subId, sEntry])=>{
          const toggleable = subId!=='__none__';
          const isOff = toggleable && disabledSubcats.has(subId);
          const style = isOff ? '' : `background:${cColor}1F; border-color:${cColor}80; color:${cColor};`;
          return `<button type="button" class="subcat-chip ${isOff?'off':''}" ${toggleable?`data-subcat-toggle="${subId}"`:'style="cursor:default;"'} style="${style}">${escapeHtml(sEntry.name)} <span class="mono">${fmt(sEntry.total)}</span></button>`;
        }).join('');

        return `<div class="hier-row hier-cat">
          <div class="hier-row-main ${hasRealSubs?'clickable':''}" ${hasRealSubs?`data-hier-toggle="${cKey}"`:''}>
            <span class="hier-label">${hasRealSubs?`<span class="hier-chev ${cCollapsed?'':'open'}">›</span>`:'<span class="hier-chev-spacer"></span>'}<span class="cat-icon" style="background:${cEntry.cat?cEntry.cat.color:'#999'}"></span>${cEntry.cat?escapeHtml(cEntry.cat.name):'Sem categoria'}</span>
            <span class="hier-value mono">${fmt(cEntry.total)}</span>
          </div>
          ${hasRealSubs && !cCollapsed ? `<div class="subcat-chips" style="margin-left:39px;">${subChipsHtml}</div>` : ''}
        </div>`;
      }).join('');

      return `<div class="hier-row hier-group">
        <div class="hier-row-main clickable" data-hier-toggle="${gKey}">
          <span class="hier-label"><span class="hier-chev ${gCollapsed?'':'open'}">›</span><span class="cat-icon" style="background:${g.group?g.group.color:'#999'}"></span>${g.group?escapeHtml(g.group.name):'Sem grupo'}</span>
          <span class="hier-value mono">${fmt(g.total)}</span>
        </div>
        ${!gCollapsed ? `<div class="hier-children">${catRowsHtml}</div>` : ''}
      </div>`;
    }).join('');

    return `
      <div class="hier-total-row">
        <span>Total das despesas filtradas</span>
        <span class="mono">${fmt(grandTotal)}</span>
      </div>
      <div class="hier-tree">${rows}</div>
    `;
  }

  function bindHierarchyEvents(){
    mainEl.querySelectorAll('[data-hier-toggle]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const key = el.dataset.hierToggle;
        if(hierarchyCollapsed.has(key)) hierarchyCollapsed.delete(key); else hierarchyCollapsed.add(key);
        renderTransactions();
      };
    });
    mainEl.querySelectorAll('[data-subcat-toggle]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const sid = el.dataset.subcatToggle;
        if(disabledSubcats.has(sid)) disabledSubcats.delete(sid); else disabledSubcats.add(sid);
        renderTransactions();
      };
    });
  }

  // ---------- ANÁLISE (gasto diário por grupo/categoria/subcategoria) ----------
  function renderAnalysis(){
    const groups = (state.groups||[]).filter(g=>g.type==='expense');
    const catsForGroup = () => state.categories.filter(c=>c.type==='expense' && (analysisFilter.groupIds.size===0 || analysisFilter.groupIds.has(c.groupId)));
    const availableCats = catsForGroup();
    // Tira da seleção qualquer categoria que não exista mais nos grupos escolhidos.
    [...analysisFilter.categoryIds].forEach(cid=>{ if(!availableCats.some(c=>c.id===cid)) analysisFilter.categoryIds.delete(cid); });
    const subsForCat = () => {
      const cats = analysisFilter.categoryIds.size>0 ? availableCats.filter(c=>analysisFilter.categoryIds.has(c.id)) : availableCats;
      const subs = [];
      cats.forEach(c=> (c.subcategories||[]).forEach(s=> subs.push({...s, catName:c.name})));
      return subs;
    };
    const availableSubs = subsForCat();
    [...analysisFilter.subcategoryIds].forEach(sid=>{ if(!availableSubs.some(s=>s.id===sid)) analysisFilter.subcategoryIds.delete(sid); });

    const selectedAccounts = [...analysisFilter.accountIds].map(id=>accById(id)).filter(Boolean);
    const isSingleCardAccount = selectedAccounts.length===1 && selectedAccounts[0].type==='Crédito';
    // Faturas disponíveis: só faz sentido oferecer quando exatamente 1 cartão está escolhido.
    const faturaDates = isSingleCardAccount
      ? [...new Set(state.transactions.filter(t=>t.type==='expense' && t.accountId===selectedAccounts[0].id).map(t=>t.date))].sort()
      : [];
    if(!isSingleCardAccount) analysisFilter.faturaDate = 'all';
    else if(analysisFilter.faturaDate!=='all' && !faturaDates.includes(analysisFilter.faturaDate)) analysisFilter.faturaDate = 'all';

    const groupMsel = multiSelectHtml('an-group', 'Todos os grupos', groups.map(g=>({value:g.id, label:(g.icon||'📁')+' '+g.name})), analysisFilter.groupIds);
    const catMsel = multiSelectHtml('an-cat', 'Todas categorias', availableCats.map(c=>({value:c.id, label:(c.icon?c.icon+' ':'')+c.name})), analysisFilter.categoryIds);
    const subMsel = multiSelectHtml('an-sub', 'Todas subcategorias', availableSubs.map(s=>({value:s.id, label:s.name+(s.catName?' — '+s.catName:'')})), analysisFilter.subcategoryIds);
    const accMsel = multiSelectHtml('an-acc', 'Todas contas', state.accounts.map(a=>({value:a.id, label:a.name})), analysisFilter.accountIds);
    const faturaOptsHtml = `<option value="all">Todas faturas</option>` + faturaDates.map(d=>{
      const dObj = new Date(d+'T00:00:00');
      return `<option value="${d}" ${analysisFilter.faturaDate===d?'selected':''}>${dObj.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}</option>`;
    }).join('');

    // Transações que batem com os filtros, dentro do mês selecionado.
    const filteredTx = txForMonth(currentYear, currentMonth).filter(t=>{
      if(t.type!=='expense') return false;
      const cat = catById(t.categoryId);
      if(analysisFilter.groupIds.size>0 && (!cat || !analysisFilter.groupIds.has(cat.groupId))) return false;
      if(analysisFilter.categoryIds.size>0 && !analysisFilter.categoryIds.has(t.categoryId)) return false;
      if(analysisFilter.subcategoryIds.size>0 && !analysisFilter.subcategoryIds.has(t.subcategoryId)) return false;
      if(analysisFilter.accountIds.size>0 && !analysisFilter.accountIds.has(t.accountId)) return false;
      if(analysisFilter.faturaDate!=='all' && t.date!==analysisFilter.faturaDate) return false;
      return true;
    });

    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const totals = new Array(daysInMonth+1).fill(0);
    filteredTx.forEach(t=>{
      const day = new Date(t.date+'T00:00:00').getDate();
      totals[day] = (totals[day]||0) + Math.abs(t.amount);
    });
    const totalSpent = filteredTx.reduce((s,t)=>s+Math.abs(t.amount),0);
    const daysWithSpend = totals.slice(1, daysInMonth+1).filter(v=>v>0).length;
    const avgPerActiveDay = daysWithSpend>0 ? totalSpent/daysWithSpend : 0;
    const avgWholeMonth = totalSpent/daysInMonth;
    let peakDay = 0, peakVal = 0;
    for(let d=1; d<=daysInMonth; d++){ if(totals[d]>peakVal){ peakVal = totals[d]; peakDay = d; } }

    function analysisFilterSummary(){
      if(analysisFilter.subcategoryIds.size>0){
        const names = [...analysisFilter.subcategoryIds].map(id=>{
          for(const c of state.categories){ const s=(c.subcategories||[]).find(x=>x.id===id); if(s) return s.name; }
          return null;
        }).filter(Boolean);
        return names.join(', ') || 'Todas as despesas';
      }
      if(analysisFilter.categoryIds.size>0){
        return [...analysisFilter.categoryIds].map(id=>(catById(id)||{}).name).filter(Boolean).join(', ') || 'Todas as despesas';
      }
      if(analysisFilter.groupIds.size>0){
        return [...analysisFilter.groupIds].map(id=>(groupById(id)||{}).name).filter(Boolean).join(', ') || 'Todas as despesas';
      }
      return 'Todas as despesas';
    }
    const chartColor = analysisFilter.categoryIds.size===1 ? (catById([...analysisFilter.categoryIds][0])||{}).color
      : analysisFilter.groupIds.size===1 ? (groupById([...analysisFilter.groupIds][0])||{}).color
      : 'var(--brass)';
    const chartSvg = dailyChartSvg(totals, daysInMonth, chartColor||'var(--brass)');

    const dayRows = [];
    for(let d=1; d<=daysInMonth; d++){
      if(totals[d]>0) dayRows.push({day:d, val:totals[d]});
    }
    const maxDayVal = Math.max(1, ...dayRows.map(r=>r.val));
    const txByDay = {};
    filteredTx.forEach(t=>{
      const day = new Date(t.date+'T00:00:00').getDate();
      (txByDay[day] = txByDay[day]||[]).push(t);
    });
    const dayRowsHtml = dayRows.map(r=>{
      const dateObj = new Date(currentYear, currentMonth, r.day);
      const weekday = dateObj.toLocaleDateString('pt-BR', {weekday:'short'});
      const items = (txByDay[r.day]||[]).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
      const itemsHtml = items.map(t=>{
        const cat = catById(t.categoryId);
        const sub = cat && t.subcategoryId ? (cat.subcategories||[]).find(s=>s.id===t.subcategoryId) : null;
        return `<div class="day-tx-item">
          <span class="day-tx-desc">${escapeHtml(t.desc)}${sub?` <span class="day-tx-sub">— ${escapeHtml(sub.name)}</span>`:''}</span>
          <span class="day-tx-amount mono">${fmt(Math.abs(t.amount))}</span>
        </div>`;
      }).join('');
      return `<div class="bar-row">
        <div class="bar-head"><span class="name">Dia ${String(r.day).padStart(2,'0')}/${String(currentMonth+1).padStart(2,'0')} <span style="color:var(--slate-mute); font-weight:400;">(${weekday})</span></span><span class="mono">${fmt(r.val)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(r.val/maxDayVal*100).toFixed(0)}%; background:${chartColor||'var(--brass)'}"></div></div>
        <div class="day-tx-list">${itemsHtml}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma despesa encontrada com esses filtros neste mês.</div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Análise</h1><div class="subtitle">Acompanhamento diário de gastos</div></div>
        ${monthSwitchHtml()}
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Filtros</div>
        <div class="card-sub">Escolha grupo, categoria, subcategoria, conta e/ou fatura — os filtros se combinam</div>
        <div class="toolbar-left" style="margin-top:4px;">
          ${groupMsel}
          ${catMsel}
          ${subMsel}
          ${accMsel}
          ${isSingleCardAccount ? `<select class="filter" id="an-fatura">${faturaOptsHtml}</select>` : ''}
        </div>
      </div>
      <div class="grid-4">
        <div class="card stat-card">
          <div class="stat-label">Total no período</div>
          <div class="stat-value neg mono">${fmt(totalSpent)}</div>
          <div class="stat-note">${filteredTx.length} lançamento(s)</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Média nos dias com gasto</div>
          <div class="stat-value mono">${fmt(avgPerActiveDay)}</div>
          <div class="stat-note">${daysWithSpend} de ${daysInMonth} dias</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Dia de maior gasto</div>
          <div class="stat-value mono" style="color:var(--rust);">${peakVal>0?fmt(peakVal):'—'}</div>
          <div class="stat-note">${peakVal>0?`Dia ${String(peakDay).padStart(2,'0')}/${String(currentMonth+1).padStart(2,'0')}`:'Sem dados'}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Média do mês inteiro</div>
          <div class="stat-value mono">${fmt(totalSpent/daysInMonth)}</div>
          <div class="stat-note">Considerando todos os ${daysInMonth} dias</div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Calendário — ${MONTHS[currentMonth]}</div>
        <div class="card-sub">${escapeHtml(analysisFilterSummary())} · dias em destaque gastaram acima da média</div>
        ${renderMonthCalendar(totals, daysInMonth, currentYear, currentMonth, avgWholeMonth)}
        <div class="cal-avg-row">
          <span>Média diária do mês inteiro (com os filtros acima)</span>
          <span class="mono">${fmt(avgWholeMonth)}</span>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Gasto por dia — ${MONTHS[currentMonth]}</div>
        <div class="card-sub">${escapeHtml(analysisFilterSummary())}</div>
        ${chartSvg}
      </div>
      <div class="card">
        <div class="card-title">Detalhe por dia</div>
        <div class="card-sub">Só os dias com gasto registrado</div>
        <div class="ledger">${dayRowsHtml}</div>
      </div>
    `;
    bindMonthSwitch();
    bindMultiSelect('an-group', analysisFilter.groupIds, ()=>{ analysisFilter.categoryIds.clear(); analysisFilter.subcategoryIds.clear(); renderAnalysis(); });
    bindMultiSelect('an-cat', analysisFilter.categoryIds, ()=>{ analysisFilter.subcategoryIds.clear(); renderAnalysis(); });
    bindMultiSelect('an-sub', analysisFilter.subcategoryIds, ()=> renderAnalysis());
    bindMultiSelect('an-acc', analysisFilter.accountIds, ()=>{ analysisFilter.faturaDate='all'; renderAnalysis(); });
    const anFaturaSel = document.getElementById('an-fatura');
    if(anFaturaSel) anFaturaSel.onchange = (e)=>{
      analysisFilter.faturaDate = e.target.value;
      if(e.target.value!=='all'){
        const d = new Date(e.target.value+'T00:00:00');
        currentYear = d.getFullYear();
        currentMonth = d.getMonth();
      }
      renderAnalysis();
    };
  }

  // Monta a grade do calendário do mês, com o valor gasto em cada dia (já
  // considerando os filtros ativos) e um destaque nos dias acima da média.
  function renderMonthCalendar(totals, daysInMonth, year, month, avgValue){
    const weekDayLabels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const firstDow = new Date(year, month, 1).getDay();
    const maxVal = Math.max(1, ...totals.slice(1, daysInMonth+1));
    const todayStr = new Date().toISOString().slice(0,10);
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="cal-cell cal-empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const val = totals[d]||0;
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr===todayStr;
      const aboveAvg = avgValue>0 && val>avgValue;
      const intensity = val>0 ? Math.min(1, val/maxVal) : 0;
      const style = val>0 ? `--cal-alpha:${(0.06+intensity*0.22).toFixed(2)};` : '';
      cells += `<div class="cal-cell ${val>0?'has-spend':''} ${isToday?'is-today':''} ${aboveAvg?'above-avg':''}" style="${style}">
        <span class="cal-day-num">${d}</span>
        ${val>0 ? `<span class="cal-day-val mono">${val.toLocaleString('pt-BR',{maximumFractionDigits:0})}</span>` : ''}
      </div>`;
    }
    const totalCells = firstDow + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let i=0;i<trailing;i++) cells += `<div class="cal-cell cal-empty"></div>`;

    return `
      <div class="cal-weekdays">${weekDayLabels.map(w=>`<div>${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    `;
  }

  function dailyChartSvg(totals, daysInMonth, color){
    const max = Math.max(1, ...totals.slice(1, daysInMonth+1));
    const w = 700, h = 232, padL = 8, padR = 8, padT = 54, padB = 22;
    const chartW = w-padL-padR, chartH = h-padT-padB;
    const gap = chartW/daysInMonth;
    const barW = Math.max(2, gap*0.62);
    let bars = '';
    for(let d=1; d<=daysInMonth; d++){
      const val = totals[d]||0;
      const barH = val>0 ? Math.max(2, (val/max)*chartH) : 0;
      const x = padL + (d-1)*gap + (gap-barW)/2;
      const y = padT + chartH - barH;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="2" fill="${val>0?color:'var(--line)'}"></rect>`;
      if(val>0){
        const cx = x+barW/2, ly = y-5;
        const label = val.toLocaleString('pt-BR',{maximumFractionDigits:0});
        bars += `<text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="8.5" fill="var(--slate-mute)" text-anchor="start" font-family="IBM Plex Mono, monospace" transform="rotate(-90 ${cx.toFixed(1)} ${ly.toFixed(1)})">${label}</text>`;
      }
      if(d===1 || d%5===0 || d===daysInMonth){
        bars += `<text x="${(x+barW/2).toFixed(1)}" y="${h-6}" font-size="9.5" fill="var(--slate-mute)" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d}</text>`;
      }
    }
    bars += `<line x1="${padL}" y1="${padT+chartH}" x2="${w-padR}" y2="${padT+chartH}" stroke="var(--line)" stroke-width="1"></line>`;
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:230px; display:block;">${bars}</svg>`;
  }

  // ---------- DASHBOARD DE METAS (grupo, categoria, balanço mensal) ----------
  function farolFor(pct, over){
    if(over) return { emoji:'🔴', color:'var(--rust)' };
    if(pct>=75) return { emoji:'🟡', color:'var(--amber)' };
    return { emoji:'🟢', color:'var(--forest)' };
  }

  // Tag discreta: mostra um botãozinho compacto (ex: "Meta: 20%"); ao clicar,
  // vira um campo de texto ali mesmo, pra editar sem poluir a tela.
  function miniTagHtml(field, label, rawValue, placeholder, isEmpty){
    return `<span class="tag-edit-wrap">
      <button type="button" class="mini-tag ${isEmpty?'empty':''}" data-tag-show>${label}</button>
      <input type="text" inputmode="decimal" class="mini-tag-input" data-tag-field="${field}" value="${rawValue}" placeholder="${placeholder}" style="display:none;">
    </span>`;
  }
  function bindMiniTags(onSave){
    mainEl.querySelectorAll('[data-tag-show]').forEach(btn=>{
      btn.onclick = ()=>{
        const wrap = btn.closest('.tag-edit-wrap');
        const input = wrap.querySelector('.mini-tag-input');
        btn.style.display = 'none';
        input.style.display = 'inline-block';
        input.focus(); input.select();
      };
    });
    mainEl.querySelectorAll('.mini-tag-input').forEach(inp=>{
      let saved = false;
      const commit = async ()=>{
        if(saved) return;
        saved = true;
        await onSave(inp.dataset.tagField, inp.value);
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e=>{ if(e.key==='Enter') inp.blur(); });
    });
  }

  // ---------- BOWLER (visão anual, todos os grupos x 12 meses) ----------
  function renderBowler(){
    if(bowlerYear===null) bowlerYear = currentYear;
    if(!state.groupBudgets) state.groupBudgets = {};
    const incomeGoal = state.incomeGoal || 0;
    const year = bowlerYear;
    const expenseGroups = (state.groups||[]).filter(g=>g.type==='expense');

    const spentByGroupMonth = {};
    expenseGroups.forEach(g=> spentByGroupMonth[g.id] = new Array(12).fill(0));
    for(let m=0; m<12; m++){
      txForMonth(year, m).filter(t=>t.type==='expense').forEach(t=>{
        const c = catById(t.categoryId);
        if(!c || !spentByGroupMonth[c.groupId]) return;
        spentByGroupMonth[c.groupId][m] += Math.abs(t.amount);
      });
    }

    const pctFor = (spent) => incomeGoal>0 ? (spent/incomeGoal*100) : 0;
    const cellClass = (realizedPct, goalPct) => {
      if(!goalPct) return 'bowler-neutral';
      return realizedPct>goalPct ? 'bowler-red' : 'bowler-green';
    };

    const rowsHtml = expenseGroups.map(g=>{
      const goalPct = state.groupBudgets[g.id] || 0;
      const cellsHtml = spentByGroupMonth[g.id].map(spent=>{
        const realizedPct = pctFor(spent);
        return `<td class="bowler-cell ${cellClass(realizedPct, goalPct)}" title="${fmt(spent)}">${goalPct ? realizedPct.toFixed(0)+'%' : '—'}</td>`;
      }).join('');
      return `<tr><td class="bowler-row-label"><span class="cat-icon" style="background:${g.color}"></span>${escapeHtml(g.name)}</td>${cellsHtml}</tr>`;
    }).join('') || `<tr><td colspan="13" class="empty-state">Crie grupos de despesa e metas na aba Dashboard primeiro.</td></tr>`;

    const totalGoalPct = expenseGroups.reduce((s,g)=>s+(state.groupBudgets[g.id]||0),0);
    const totalCellsHtml = [];
    for(let m=0;m<12;m++){
      const totalSpent = expenseGroups.reduce((s,g)=>s+spentByGroupMonth[g.id][m],0);
      const realizedPct = pctFor(totalSpent);
      totalCellsHtml.push(`<td class="bowler-cell bowler-total-cell ${cellClass(realizedPct, totalGoalPct)}" title="${fmt(totalSpent)}">${totalGoalPct ? realizedPct.toFixed(0)+'%' : '—'}</td>`);
    }

    if(bowlerSelectedGroup===null || !expenseGroups.some(g=>g.id===bowlerSelectedGroup)){
      bowlerSelectedGroup = expenseGroups[0] ? expenseGroups[0].id : null;
    }
    const selGroup = expenseGroups.find(g=>g.id===bowlerSelectedGroup);
    const groupPillsHtml = expenseGroups.map(g=>`<button type="button" class="bowler-pill ${g.id===bowlerSelectedGroup?'active':''}" data-bowler-group="${g.id}" style="${g.id===bowlerSelectedGroup?`background:${g.color}; border-color:${g.color}; color:#fff;`:''}">${escapeHtml(g.name)}</button>`).join('');
    let trendSectionHtml = '';
    if(selGroup){
      const goalPct = state.groupBudgets[selGroup.id] || 0;
      const monthlyPct = spentByGroupMonth[selGroup.id].map(pctFor);
      const trend = computeBowlerTrend(monthlyPct);
      trendSectionHtml = `
        <div class="card" style="margin-top:16px;">
          <div class="card-head-row">
            <div>
              <div class="card-title">Acompanhamento — ${escapeHtml(selGroup.name)}</div>
              <div class="card-sub">Percentual realizado mês a mês em ${year}, comparado com a meta (linha pontilhada)</div>
            </div>
            <span class="bowler-trend-badge">${trend.icon} ${trend.label}</span>
          </div>
          <div class="bowler-pill-row">${groupPillsHtml}</div>
          ${bowlerTrendChartSvg(monthlyPct, goalPct)}
        </div>`;
    }

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Bowler</h1><div class="subtitle">Realizado × meta por grupo, mês a mês — 🟢 dentro da meta, 🔴 estourou</div></div>
        <div class="month-switch" style="width:auto;">
          <button type="button" id="bowlerPrevYear">‹</button>
          <div class="label display">${year}</div>
          <button type="button" id="bowlerNextYear">›</button>
        </div>
      </div>
      <div class="card" style="overflow-x:auto;">
        ${incomeGoal>0 ? '' : `<div class="card-sub" style="color:var(--amber); margin-bottom:10px;">Defina a "Meta de receita" na aba Dashboard pra habilitar os percentuais aqui.</div>`}
        <table class="bowler-table">
          <thead><tr><th>Grupo</th>${MONTHS.map(m=>`<th>${m.slice(0,3)}</th>`).join('')}</tr></thead>
          <tbody>
            ${rowsHtml}
            <tr class="bowler-total-row"><td>Total</td>${totalCellsHtml.join('')}</tr>
          </tbody>
        </table>
      </div>
      ${trendSectionHtml}
    `;
    document.getElementById('bowlerPrevYear').onclick = ()=>{ bowlerYear--; renderBowler(); };
    document.getElementById('bowlerNextYear').onclick = ()=>{ bowlerYear++; renderBowler(); };
    mainEl.querySelectorAll('[data-bowler-group]').forEach(btn=>{
      btn.onclick = ()=>{ bowlerSelectedGroup = btn.dataset.bowlerGroup; renderBowler(); };
    });
  }

  // Regressão linear simples sobre os meses com dado real (>0), pra apontar
  // se o grupo está subindo, caindo ou estável ao longo do ano.
  function computeBowlerTrend(monthlyPct){
    const points = monthlyPct.map((v,i)=>({x:i,y:v})).filter(p=>p.y>0.01);
    if(points.length<2) return { label:'Dados insuficientes', icon:'➡️' };
    const n = points.length;
    const sumX = points.reduce((s,p)=>s+p.x,0);
    const sumY = points.reduce((s,p)=>s+p.y,0);
    const sumXY = points.reduce((s,p)=>s+p.x*p.y,0);
    const sumXX = points.reduce((s,p)=>s+p.x*p.x,0);
    const denom = (n*sumXX - sumX*sumX) || 1;
    const slope = (n*sumXY - sumX*sumY) / denom;
    if(Math.abs(slope)<0.6) return { label:'Estável', icon:'➡️' };
    return slope>0 ? { label:'Tendência de alta', icon:'📈' } : { label:'Tendência de queda', icon:'📉' };
  }

  function bowlerTrendChartSvg(monthlyPct, goalPct){
    const w=700, h=230, padL=32, padR=16, padT=24, padB=28;
    const chartW = w-padL-padR, chartH = h-padT-padB;
    const maxVal = Math.max(goalPct*1.25, ...monthlyPct, 10);
    const stepX = chartW/11;
    const yFor = (v) => padT + chartH - (Math.min(v,maxVal)/maxVal*chartH);
    const xFor = (i) => padL + i*stepX;
    const goalLine = goalPct>0 ? `<line x1="${padL}" y1="${yFor(goalPct).toFixed(1)}" x2="${w-padR}" y2="${yFor(goalPct).toFixed(1)}" stroke="var(--slate-mute)" stroke-dasharray="4,3" stroke-width="1"></line>
      <text x="${w-padR}" y="${(yFor(goalPct)-5).toFixed(1)}" font-size="9" fill="var(--slate-mute)" text-anchor="end" font-family="IBM Plex Sans, sans-serif">meta ${goalPct.toFixed(0)}%</text>` : '';
    const points = monthlyPct.map((v,i)=>`${xFor(i).toFixed(1)},${yFor(v).toFixed(1)}`).join(' ');
    const path = `<polyline points="${points}" fill="none" stroke="var(--brass)" stroke-width="2"></polyline>`;
    const dots = monthlyPct.map((v,i)=>{
      const over = goalPct>0 && v>goalPct;
      const color = goalPct===0 ? 'var(--brass)' : (over ? 'var(--rust)' : 'var(--forest)');
      return `<circle cx="${xFor(i).toFixed(1)}" cy="${yFor(v).toFixed(1)}" r="4" fill="${color}"></circle>
        ${v>0.01 ? `<text x="${xFor(i).toFixed(1)}" y="${(yFor(v)-9).toFixed(1)}" font-size="8.5" fill="${color}" text-anchor="middle" font-family="IBM Plex Mono, monospace">${v.toFixed(0)}%</text>` : ''}`;
    }).join('');
    const xLabels = MONTHS.map((m,i)=>`<text x="${xFor(i).toFixed(1)}" y="${h-8}" font-size="9.5" fill="var(--slate-mute)" text-anchor="middle" font-family="IBM Plex Sans, sans-serif">${m.slice(0,3)}</text>`).join('');
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:230px; display:block;">${goalLine}${path}${dots}${xLabels}</svg>`;
  }

  function renderGoalsDashboard(){
    if(!state.groupBudgets) state.groupBudgets = {};
    if(state.incomeGoal===undefined) state.incomeGoal = 0;
    if(!state.planningEvents) state.planningEvents = [];
    if(!state.planningNotes) state.planningNotes = {};
    if(!state.dismissedNotifications) state.dismissedNotifications = [];
    if(!state.budgets) state.budgets = {};
    const monthTx = txForMonth(currentYear, currentMonth).filter(t=>t.type==='expense');
    const expenseGroups = (state.groups||[]).filter(g=>g.type==='expense');

    // ---- Meta de receita (referência única pros percentuais por grupo) ----
    const incomeGoal = state.incomeGoal || 0;

    // ---- Metas por grupo, em % da meta de receita ----
    const spentByGroup = {};
    monthTx.forEach(t=>{
      const c = catById(t.categoryId);
      if(!c) return;
      spentByGroup[c.groupId] = (spentByGroup[c.groupId]||0) + Math.abs(t.amount);
    });
    const groupGoalRows = expenseGroups.map(g=>{
      const goalPct = state.groupBudgets[g.id] || 0; // agora é um percentual (0-100), não R$
      const spent = spentByGroup[g.id] || 0;
      const realizedPct = incomeGoal>0 ? (spent/incomeGoal*100) : 0;
      const over = goalPct>0 && realizedPct>goalPct;
      const farol = farolFor(goalPct>0 ? (realizedPct/goalPct*100) : 0, over);
      const goalReais = incomeGoal * (goalPct/100);
      return { g, goalPct, spent, realizedPct, over, farol, goalReais };
    });

    const groupGoalsHtml = groupGoalRows.map(r=>{
      const barPct = r.goalPct>0 ? Math.min(100, (r.realizedPct/r.goalPct*100)) : 0;
      const tag = r.goalPct>0
        ? miniTagHtml('group:'+r.g.id, `Meta: ${r.goalPct}% ✎`, r.goalPct, '0')
        : miniTagHtml('group:'+r.g.id, '+ meta', '', '0', true);
      return `<div class="goal-row">
        <div class="goal-row-top">
          <div class="goal-row-name"><span class="cat-icon" style="background:${r.g.color}"></span>${escapeHtml(r.g.name)} <span class="farol-dot" title="${r.over?'Estourou a meta':r.goalPct>0 && r.realizedPct/r.goalPct*100>=75?'Perto do limite':'Dentro da meta'}">${r.farol.emoji}</span></div>
          ${tag}
        </div>
        <div class="goal-track"><div class="goal-fill" style="width:${barPct}%; background:${r.farol.color}"></div></div>
        <div class="goal-row-bottom">
          <span>Realizado: <strong class="mono">${fmt(r.spent)}</strong> (${r.realizedPct.toFixed(1)}%)</span>
          <span>${r.goalPct>0 ? `Meta: ${r.goalPct}% ${incomeGoal>0?'· ≈ '+fmt(r.goalReais):''}` : 'Sem meta definida'}</span>
        </div>
      </div>`;
    }).join('') || `<div class="empty-state">Crie grupos de despesa pra poder definir metas.</div>`;

    // ---- Tabela Mês × Anual (comparação de meta com o realizado, no mês e acumulado no ano) ----
    const monthsElapsed = currentMonth + 1;
    const annualIncomeGoal = incomeGoal * monthsElapsed;
    const ytdSpentByGroup = {};
    for(let m=0; m<=currentMonth; m++){
      txForMonth(currentYear, m).filter(t=>t.type==='expense').forEach(t=>{
        const c = catById(t.categoryId);
        if(!c) return;
        ytdSpentByGroup[c.groupId] = (ytdSpentByGroup[c.groupId]||0) + Math.abs(t.amount);
      });
    }
    const compareRows = groupGoalRows.map(r=>{
      const ytdSpent = ytdSpentByGroup[r.g.id] || 0;
      const annualRealizedPct = annualIncomeGoal>0 ? (ytdSpent/annualIncomeGoal*100) : 0;
      const annualDiff = annualRealizedPct - r.goalPct;
      const annualOver = r.goalPct>0 && annualRealizedPct>r.goalPct;
      const annualFarol = farolFor(r.goalPct>0 ? (annualRealizedPct/r.goalPct*100) : 0, annualOver);
      return { g: r.g, goalPct: r.goalPct, monthPct: r.realizedPct, monthFarol: r.farol, annualPct: annualRealizedPct, annualDiff, annualFarol };
    });
    const totalGoalPct = compareRows.reduce((s,r)=>s+r.goalPct,0);
    const totalMonthPct = compareRows.reduce((s,r)=>s+r.monthPct,0);
    const totalAnnualPct = compareRows.reduce((s,r)=>s+r.annualPct,0);

    const pctFmt = (n) => `${n.toFixed(2).replace('.',',')}%`;
    const compareRowsHtml = compareRows.map(r=>`
      <tr>
        <td class="gct-name"><span class="cat-icon" style="background:${r.g.color}"></span>${escapeHtml(r.g.name)}</td>
        <td class="mono">${pctFmt(r.goalPct)}</td>
        <td class="mono">${pctFmt(r.monthPct)}</td>
        <td class="gct-farol">${r.monthFarol.emoji}</td>
        <td class="mono">${pctFmt(r.goalPct)}</td>
        <td class="mono">${pctFmt(r.annualPct)}</td>
        <td class="mono" style="color:${r.annualDiff<0?'var(--forest)':'var(--rust)'}">${r.annualDiff>=0?'+':''}${pctFmt(r.annualDiff)}</td>
        <td class="gct-farol">${r.annualFarol.emoji}</td>
      </tr>`).join('');
    const compareTableHtml = `
      <table class="goal-compare-table">
        <thead>
          <tr><th rowspan="2">Grupo</th><th colspan="3">Mês</th><th colspan="4">Anual</th></tr>
          <tr><th>Meta</th><th>Realizado</th><th></th><th>Meta</th><th>Realizado</th><th>Diferença</th><th></th></tr>
        </thead>
        <tbody>
          ${compareRowsHtml}
          <tr class="gct-total-row">
            <td>Despesas total</td>
            <td class="mono">${pctFmt(totalGoalPct)}</td>
            <td class="mono">${pctFmt(totalMonthPct)}</td>
            <td></td>
            <td class="mono">${pctFmt(totalGoalPct)}</td>
            <td class="mono">${pctFmt(totalAnnualPct)}</td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>`;
    const catGoalEntries = Object.entries(state.budgets||{}).map(([catId,goal])=>{
      const cat = catById(catId);
      if(!cat || !goal) return null;
      const spent = monthTx.filter(t=>t.categoryId===catId).reduce((s,t)=>s+Math.abs(t.amount),0);
      const variance = goal - spent; // positivo = folga, negativo = estourou (gargalo)
      const pctGoal = goal>0 ? (spent/goal*100) : 0;
      const over = spent>goal;
      return { cat, goal, spent, variance, farol: farolFor(pctGoal, over) };
    }).filter(Boolean).sort((a,b)=>a.variance-b.variance);
    const maxAbsVariance = Math.max(1, ...catGoalEntries.map(e=>Math.abs(e.variance)));

    const catDivergingHtml = catGoalEntries.map(e=>{
      const half = Math.min(50, Math.abs(e.variance)/maxAbsVariance*50);
      const isNeg = e.variance<0;
      return `<div class="divbar-row">
        <div class="divbar-label"><span class="farol-dot">${e.farol.emoji}</span>${escapeHtml(e.cat.name)}</div>
        <div class="divbar-track">
          <div class="divbar-center"></div>
          <div class="divbar-fill ${isNeg?'neg':'pos'}" style="width:${half.toFixed(1)}%;"></div>
        </div>
        <div class="divbar-value mono" style="color:${isNeg?'var(--rust)':'var(--forest)'}">${isNeg?'-':'+'}${fmt(Math.abs(e.variance))}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Defina metas por categoria em Orçamentos pra ver essa comparação aqui.</div>`;

    // ---- Balanço mês a mês (receita x despesa) ----
    const monthsBack = 6;
    const monthlyData = [];
    for(let i=monthsBack-1; i>=0; i--){
      let m = currentMonth - i, y = currentYear;
      while(m<0){ m+=12; y--; }
      const txs = txForMonth(y,m);
      const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const exp = Math.abs(txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
      monthlyData.push({y, m, inc, exp});
    }
    const balanceChartSvg = monthlyBalanceChartSvg(monthlyData);

    const incomeGoalTag = incomeGoal>0
      ? miniTagHtml('income', `Meta de receita: ${fmt(incomeGoal)} ✎`, incomeGoal, '0,00')
      : miniTagHtml('income', '+ Definir meta de receita', '', '0,00', true);

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Dashboard</h1><div class="subtitle">Metas, gargalos e o balanço dos últimos meses · ${incomeGoalTag}</div></div>
        ${monthSwitchHtml()}
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Metas por grupo</div>
        <div class="card-sub">${incomeGoal>0 ? 'Percentual da meta de receita reservado pra cada grupo — 🟢 dentro da meta, 🟡 perto do limite, 🔴 estourou' : 'Defina a meta de receita acima pra habilitar o cálculo em %'}</div>
        <div class="goal-list">${groupGoalsHtml}</div>
      </div>

      <div class="card" style="margin-bottom:16px; overflow-x:auto;">
        <div class="card-title">Mês × Anual, por grupo</div>
        <div class="card-sub">Meta e realizado comparados no mês atual e acumulado no ano (${currentYear})</div>
        ${compareTableHtml}
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Categorias: realizado × meta</div>
        <div class="card-sub">Do maior gargalo (estourou mais) ao melhor resultado (mais dentro da meta)</div>
        <div class="divbar-list">${catDivergingHtml}</div>
      </div>

      <div class="card">
        <div class="card-title">Balanço mês a mês</div>
        <div class="card-sub">Receita × despesa nos últimos ${monthsBack} meses</div>
        ${balanceChartSvg}
      </div>
    `;
    bindMonthSwitch();
    bindMiniTags(async (field, rawValue)=>{
      const val = parseFloat((rawValue||'').replace(',','.')) || 0;
      if(field==='income'){
        state.incomeGoal = val;
      } else if(field.startsWith('group:')){
        state.groupBudgets[field.slice(6)] = Math.min(100, Math.max(0, val));
      }
      await saveState();
      renderGoalsDashboard();
    });
  }

  function monthlyBalanceChartSvg(monthlyData){
    const w = 700, h = 260, padL = 10, padR = 10, padT = 34, padB = 30;
    const chartW = w-padL-padR, chartH = h-padT-padB;
    const maxVal = Math.max(1, ...monthlyData.flatMap(d=>[d.inc, d.exp]));
    const groupGap = chartW/monthlyData.length;
    const barW = Math.min(30, groupGap*0.3);
    let bars = '';
    monthlyData.forEach((d,i)=>{
      const gx = padL + i*groupGap + groupGap/2;
      const incH = (d.inc/maxVal)*chartH;
      const expH = (d.exp/maxVal)*chartH;
      const incX = gx - barW - 3;
      const expX = gx + 3;
      const incY = padT + chartH - incH;
      const expY = padT + chartH - expH;
      bars += `<rect x="${incX.toFixed(1)}" y="${incY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1,incH).toFixed(1)}" rx="2" fill="var(--forest)"></rect>`;
      bars += `<rect x="${expX.toFixed(1)}" y="${expY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1,expH).toFixed(1)}" rx="2" fill="var(--rust)"></rect>`;
      if(d.inc>0) bars += `<text x="${incX+barW/2}" y="${(incY-5).toFixed(1)}" font-size="8.5" fill="var(--forest)" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d.inc.toLocaleString('pt-BR',{maximumFractionDigits:0})}</text>`;
      if(d.exp>0) bars += `<text x="${expX+barW/2}" y="${(expY-5).toFixed(1)}" font-size="8.5" fill="var(--rust)" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d.exp.toLocaleString('pt-BR',{maximumFractionDigits:0})}</text>`;
      bars += `<text x="${gx.toFixed(1)}" y="${h-8}" font-size="10.5" fill="var(--slate-mute)" text-anchor="middle" font-family="IBM Plex Sans, sans-serif">${MONTHS[d.m].slice(0,3)}/${String(d.y).slice(2)}</text>`;
    });
    bars += `<line x1="${padL}" y1="${padT+chartH}" x2="${w-padR}" y2="${padT+chartH}" stroke="var(--line)" stroke-width="1"></line>`;
    const legend = `<g font-family="IBM Plex Sans, sans-serif" font-size="10.5">
      <rect x="${padL}" y="6" width="10" height="10" rx="2" fill="var(--forest)"></rect>
      <text x="${padL+14}" y="15" fill="var(--slate-mute)">Receita</text>
      <rect x="${padL+80}" y="6" width="10" height="10" rx="2" fill="var(--rust)"></rect>
      <text x="${padL+94}" y="15" fill="var(--slate-mute)">Despesa</text>
    </g>`;
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:260px; display:block;">${legend}${bars}</svg>`;
  }

  // ---------- PLANEJAMENTO (calendário de eventos, sem vínculo com dados reais) ----------
  const PLANNING_TYPES = [
    {id:'birthday', label:'Aniversário', emoji:'🎂', color:'#B8913C'},
    {id:'event', label:'Evento', emoji:'📅', color:'#3F6E92'},
    {id:'project', label:'Projeto', emoji:'💰', color:'#1F6E4A'},
    {id:'other', label:'Outro', emoji:'📌', color:'#8C6FB0'},
  ];
  function planningTypeInfo(id){ return PLANNING_TYPES.find(t=>t.id===id) || PLANNING_TYPES[3]; }

  function renderPlanning(){
    const monthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const firstDow = new Date(currentYear, currentMonth, 1).getDay();
    const monthEvents = state.planningEvents.filter(ev=> ev.date.slice(0,7)===monthKey).sort((a,b)=>a.date.localeCompare(b.date));
    const eventsByDay = {};
    monthEvents.forEach(ev=>{
      const day = parseInt(ev.date.slice(8,10),10);
      (eventsByDay[day] = eventsByDay[day]||[]).push(ev);
    });

    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="plan-cell plan-empty"></div>`;
    const todayStr = new Date().toISOString().slice(0,10);
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr===todayStr;
      const dayEvents = eventsByDay[d] || [];
      const shown = dayEvents.slice(0,3);
      const extra = dayEvents.length - shown.length;
      cells += `<div class="plan-cell ${isToday?'is-today':''} ${dayEvents.length>0?'has-plan-events':''}" data-plan-day="${dateStr}">
        <span class="plan-day-num">${d}</span>
        <div class="plan-chips">
          ${shown.map(ev=>{
            const info = planningTypeInfo(ev.eventType);
            return `<div class="plan-chip" draggable="true" data-plan-event="${ev.id}" style="background:${info.color}22; border-color:${info.color}80; color:${info.color};" title="${escapeHtml(ev.title)}">${info.emoji} ${escapeHtml(ev.title)}</div>`;
          }).join('')}
          ${extra>0 ? `<div class="plan-chip-more">+${extra}</div>` : ''}
        </div>
      </div>`;
    }
    const totalCells = firstDow + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let i=0;i<trailing;i++) cells += `<div class="plan-cell plan-empty"></div>`;

    const weekDayLabels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const upcomingHtml = monthEvents.map(ev=>{
      const info = planningTypeInfo(ev.eventType);
      const cat = ev.categoryId ? catById(ev.categoryId) : null;
      const dLabel = new Date(ev.date+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',weekday:'short'});
      return `<div class="plan-list-row" data-plan-event="${ev.id}">
        <div class="plan-list-date mono">${dLabel}</div>
        <div class="plan-list-info">
          <div class="plan-list-title">${info.emoji} ${escapeHtml(ev.title)}${cat?` <span class="tag">${escapeHtml(cat.name)}</span>`:''}</div>
          ${ev.notes ? `<div class="plan-list-notes">${escapeHtml(ev.notes)}</div>` : ''}
        </div>
        <div class="plan-list-value mono">${ev.value ? fmt(ev.value) : ''}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhum evento cadastrado em ${MONTHS[currentMonth]}.</div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Planejamento</h1><div class="subtitle">Datas, projetos e lembretes financeiros — não entra nos seus relatórios</div></div>
        <div style="display:flex; gap:10px; align-items:center;">
          ${monthSwitchHtml()}
          <button class="btn btn-primary" id="addPlanBtn">+ Novo evento</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Meta do mês <span style="text-transform:none; font-weight:400; font-size:12px; color:var(--slate-mute);">(só anotação, não afeta cálculos)</span></div>
        <textarea id="planGoalNote" class="plan-goal-note" placeholder="Ex: economizar pra reforma, juntar entrada do carro...">${escapeHtml(state.planningNotes[monthKey]||'')}</textarea>
      </div>

      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Calendário — ${MONTHS[currentMonth]}</div>
        <div class="card-sub">Arraste um evento pra outro dia pra remarcar · clique num dia vazio pra criar um novo</div>
        <div class="plan-weekdays">${weekDayLabels.map(w=>`<div>${w}</div>`).join('')}</div>
        <div class="plan-grid">${cells}</div>
      </div>

      <div class="card">
        <div class="card-title">Eventos de ${MONTHS[currentMonth]}</div>
        <div class="plan-list">${upcomingHtml}</div>
      </div>
    `;
    bindMonthSwitch();
    document.getElementById('addPlanBtn').onclick = ()=> openPlanningEventModal();
    document.getElementById('planGoalNote').onchange = async (e)=>{
      state.planningNotes[monthKey] = e.target.value;
      await saveState();
    };
    mainEl.querySelectorAll('[data-plan-day]').forEach(cell=>{
      cell.addEventListener('click', (e)=>{
        if(e.target.closest('[data-plan-event]')) return;
        openPlanningEventModal(null, cell.dataset.planDay);
      });
      cell.addEventListener('dragover', (e)=>{ e.preventDefault(); cell.classList.add('plan-drop-hover'); });
      cell.addEventListener('dragleave', ()=> cell.classList.remove('plan-drop-hover'));
      cell.addEventListener('drop', async (e)=>{
        e.preventDefault();
        cell.classList.remove('plan-drop-hover');
        const evId = e.dataTransfer.getData('text/plain');
        const ev = state.planningEvents.find(x=>x.id===evId);
        if(ev){ ev.date = cell.dataset.planDay; await saveState(); renderPlanning(); }
      });
    });
    mainEl.querySelectorAll('[data-plan-event]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        openPlanningEventModal(state.planningEvents.find(x=>x.id===el.dataset.planEvent));
      });
      el.addEventListener('dragstart', (e)=>{
        e.dataTransfer.setData('text/plain', el.dataset.planEvent);
        e.dataTransfer.effectAllowed = 'move';
      });
    });
  }

  function openPlanningEventModal(existing, presetDate){
    const isEdit = !!existing;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const catOptions = `<option value="">Nenhuma</option>` + [...state.categories].sort((a,b)=>a.name.localeCompare(b.name,'pt-BR')).map(c=>`<option value="${c.id}" ${isEdit&&existing.categoryId===c.id?'selected':''}>${c.icon?c.icon+' ':''}${escapeHtml(c.name)}</option>`).join('');
    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar evento':'Novo evento'}</h2>
        <div class="field"><label>Título</label><input type="text" id="pe-title" value="${isEdit?escapeHtml(existing.title):''}" placeholder="Ex: Aniversário da Maria"></div>
        <div class="field-row">
          <div class="field"><label>Data</label><input type="date" id="pe-date" value="${isEdit?existing.date:(presetDate||new Date().toISOString().slice(0,10))}"></div>
          <div class="field"><label>Tipo</label>
            <select id="pe-type">${PLANNING_TYPES.map(t=>`<option value="${t.id}" ${isEdit&&existing.eventType===t.id?'selected':''}>${t.emoji} ${t.label}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>Valor previsto (opcional)</label><input type="text" inputmode="decimal" id="pe-value" value="${isEdit&&existing.value?existing.value.toFixed(2).replace('.',','):''}" placeholder="0,00"></div>
          <div class="field"><label>Categoria (opcional)</label><select id="pe-cat">${catOptions}</select></div>
        </div>
        <div class="field"><label>Notas</label><textarea id="pe-notes" class="plan-goal-note" style="min-height:70px;" placeholder="Detalhes, lista de presença, o que precisa comprar...">${isEdit?escapeHtml(existing.notes||''):''}</textarea></div>
        <div class="modal-actions">
          ${isEdit?'<button class="btn btn-danger" id="pe-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="pe-cancel">Cancelar</button>
          <button class="btn btn-primary" id="pe-save">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    attachSmartCapitalize(document.getElementById('pe-title'));
    attachMoneyMask(document.getElementById('pe-value'));
    overlay.querySelector('#pe-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#pe-delete').onclick = async ()=>{
        state.planningEvents = state.planningEvents.filter(x=>x.id!==existing.id);
