<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Daily%20%E2%80%94%20planner%20do%20casal%22%2C%22short_name%22%3A%22Daily%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F3F4EF%22%2C%22theme_color%22%3A%22%233B6E64%22%7D">
<title>Daily — planner do casal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F4EF;
    --surface:#FFFFFF;
    --surface-2:#FBFAF7;
    --ink:#232B27;
    --ink-soft:#657167;
    --ink-faint:#9CA69C;
    --border:#E1DFD3;
    --primary:#3B6E64;
    --primary-dark:#2A4F48;
    --primary-tint:#E7EEEC;
    --secondary:#C99A3B;
    --secondary-tint:#F7EEDC;
    --urgent:#C0463C;
    --urgent-tint:#F6E4E2;
    --today:#DE9A3C;
    --today-tint:#FBEEDB;
    --mercado:#3B6E64; --mercado-tint:#E7EEEC;
    --farmacia:#B25D6B; --farmacia-tint:#F6E9EB;
    --escolar:#4C5B8A; --escolar-tint:#E9EBF3;
    --casa:#C99A3B; --casa-tint:#F7EEDC;
    --outras:#6B7A8F; --outras-tint:#E9ECF0;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 2px 14px rgba(35,43,39,0.07), 0 1px 2px rgba(35,43,39,0.06);
  }
  html[data-theme="dark"]{
    --bg:#181D1A;
    --surface:#212721;
    --surface-2:#272E28;
    --ink:#EAEDE8;
    --ink-soft:#A8B3A6;
    --ink-faint:#748075;
    --border:#37403A;
    --primary:#5B9C8F;
    --primary-dark:#7FB6A9;
    --primary-tint:#26332F;
    --secondary:#E0B563;
    --secondary-tint:#332C1D;
    --urgent:#E17F73;
    --urgent-tint:#3A2523;
    --today:#E7B667;
    --today-tint:#382D1B;
    --mercado:#5B9C8F; --mercado-tint:#22302B;
    --farmacia:#D48A97; --farmacia-tint:#332428;
    --escolar:#8B98CB; --escolar-tint:#252A38;
    --casa:#E0B563; --casa-tint:#332C1D;
    --outras:#93A3B8; --outras-tint:#262B32;
    --shadow: 0 2px 14px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.3);
  }
  html{ transition:background-color .2s ease; }
  body, .card, .project-card, nav.tabs, .today-pill{ transition:background-color .2s ease, border-color .2s ease, color .2s ease; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; overflow-x:hidden; width:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    min-height:100dvh;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3,.display{ font-family:'Fraunces',serif; letter-spacing:-0.01em; }
  button{ font-family:inherit; cursor:pointer; touch-action:manipulation; }
  input,select,textarea{ font-family:inherit; font-size:16px; color:var(--ink); background:var(--surface); }
  :focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }
  a{ color:var(--primary-dark); }

  #app{ max-width:920px; margin:0 auto; padding:0 16px calc(24px + env(safe-area-inset-bottom)); }

  .topbar{
    padding:max(22px, calc(14px + env(safe-area-inset-top))) 4px 14px;
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:9px;
    background:var(--primary); color:#fff; font-family:'Fraunces',serif; font-weight:600; font-size:17px;
    transform:rotate(-4deg);
  }
  .brand h1{ font-size:24px; margin:0; font-weight:700; color:var(--ink); }
  .brand .tag{ font-size:12.5px; color:var(--ink-faint); }
  .today-pill{
    font-size:12.5px; color:var(--ink-soft); background:var(--surface);
    border:1px solid var(--border); padding:6px 12px; border-radius:999px;
  }

  nav.tabs{
    display:flex; gap:6px; overflow-x:auto; padding:4px 2px 14px;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  nav.tabs button{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--border); color:var(--ink-soft);
    padding:9px 14px; border-radius:999px; font-size:13.5px; font-weight:600;
    transition:background .15s, color .15s, border-color .15s;
  }
  nav.tabs button svg{ width:15px; height:15px; }
  nav.tabs button.active{ background:var(--primary); border-color:var(--primary); color:#fff; }
  nav.tabs button:not(.active):hover{ border-color:var(--primary); color:var(--primary-dark); }

  .row-item{ min-height:44px; }
  .icon-btn{ min-width:32px; min-height:32px; }
  .item-name{ min-width:0; overflow-wrap:anywhere; }

  @media (max-width:640px){
    .card{ padding:15px; }
    .topbar{ padding-left:2px; padding-right:2px; }
    .brand h1{ font-size:21px; }

    nav.tabs{
      position:fixed; left:0; right:0; bottom:0; z-index:50;
      margin:0; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
      background:var(--surface); border-top:1px solid var(--border);
      justify-content:space-between; gap:2px; box-shadow:0 -2px 10px rgba(35,43,39,0.06);
    }
    nav.tabs button{
      flex-direction:column; gap:3px; flex:1; min-width:0; padding:7px 2px;
      border:none; background:none; border-radius:10px; font-size:10.2px; font-weight:600;
    }
    nav.tabs button svg{ width:20px; height:20px; }
    nav.tabs button.active{ background:var(--primary-tint); color:var(--primary-dark); }
    nav.tabs button:not(.active):hover{ border-color:transparent; }
    nav.tabs .tab-label{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }

    #app{ padding-bottom:calc(78px + env(safe-area-inset-bottom)); }
    .grid{ gap:12px; }
    .proj-grid{ gap:12px; }
  }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:18px;
  }
  .section-title{
    font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint);
    font-weight:700; margin:0 0 10px;
  }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:640px){ .grid{ grid-template-columns:1fr; } }
  .stack{ display:flex; flex-direction:column; gap:14px; }

  .alert{
    display:flex; align-items:flex-start; gap:10px;
    background:var(--today-tint); border:1px solid #EED7AC; color:#7A5417;
    padding:12px 14px; border-radius:var(--radius-sm); font-size:13.5px; margin-bottom:10px;
  }
  .alert button.link{ background:none;border:none;color:#7A5417; font-weight:700; text-decoration:underline; padding:0; font-size:13.5px;}
  .alert .x{ margin-left:auto; background:none;border:none;color:#7A5417; font-size:16px; line-height:1; padding:0 2px;}

  .empty{ color:var(--ink-faint); font-size:13.5px; padding:10px 2px; }

  .row-item{
    display:flex; align-items:center; gap:10px; padding:9px 0;
    border-bottom:1px solid var(--border);
  }
  .row-item:last-child{ border-bottom:none; }
  .chk{
    width:19px; height:19px; border-radius:6px; border:1.6px solid var(--ink-faint);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; background:var(--surface);
  }
  .chk.done{ background:var(--primary); border-color:var(--primary); color:#fff; font-size:12px; }
  .item-name{ flex:1; font-size:14px; }
  .item-name.done{ text-decoration:line-through; color:var(--ink-faint); }
  .badge{
    font-size:11px; font-weight:700; padding:3px 8px; border-radius:999px; white-space:nowrap;
  }
  .badge.urgente{ background:var(--urgent-tint); color:var(--urgent); }
  .badge.hoje{ background:var(--today-tint); color:#946018; }
  .badge.quando_puder{ background:var(--primary-tint); color:var(--primary-dark); }
  .badge.status{ background:var(--secondary-tint); color:#8A6A22; }
  .icon-btn{
    background:none; border:none; color:var(--ink-faint); font-size:15px; padding:4px 6px; border-radius:6px;
  }
  .icon-btn:hover{ background:var(--bg); color:var(--ink); }

  .btn{
    background:var(--primary); color:#fff; border:none; padding:9px 16px; border-radius:999px;
    font-weight:600; font-size:13.5px;
  }
  .btn:hover{ background:var(--primary-dark); }
  .btn.secondary{ background:var(--surface); color:var(--primary-dark); border:1.4px solid var(--primary); }
  .btn.small{ padding:6px 12px; font-size:12.5px; }
  .btn.ghost{ background:none; border:1px solid var(--border); color:var(--ink-soft); }
  .btn.danger{ background:var(--urgent); }

  form.inline{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  form.inline input, form.inline select{
    padding:9px 11px; border-radius:var(--radius-sm); border:1.4px solid var(--border); background:var(--surface);
  }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:12px; color:var(--ink-soft); font-weight:600; }
  .field input, .field select, .field textarea{
    padding:9px 11px; border-radius:var(--radius-sm); border:1.4px solid var(--border); background:var(--surface); width:100%;
  }
  .form-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:12px; }
  @media (max-width:640px){ .form-grid{ grid-template-columns:1fr; } }

  .subtabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .subtabs button{
    background:var(--surface-2); border:1px solid var(--border); color:var(--ink-soft);
    padding:7px 13px; border-radius:999px; font-size:13px; font-weight:600;
  }
  .subtabs button.active{ color:#fff; border-color:transparent; }

  .dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }

  .project-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:8px; text-align:left;
  }
  .progress-bar{ height:7px; background:var(--bg); border-radius:99px; overflow:hidden; }
  .progress-bar > div{ height:100%; background:var(--primary); }
  .proj-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  @media (max-width:760px){ .proj-grid{ grid-template-columns:1fr 1fr; } }
  @media (max-width:480px){ .proj-grid{ grid-template-columns:1fr; } }

  .timeline{ position:relative; padding-left:26px; }
  .timeline::before{ content:''; position:absolute; left:8px; top:4px; bottom:4px; width:2px; background:var(--border); }
  .tl-item{ position:relative; padding:0 0 18px; }
  .tl-item:last-child{ padding-bottom:0; }
  .tl-dot{
    position:absolute; left:-26px; top:2px; width:17px; height:17px; border-radius:50%;
    background:var(--surface); border:2.5px solid var(--secondary); display:flex; align-items:center; justify-content:center; font-size:9px;
  }
  .tl-item.done .tl-dot{ background:var(--primary); border-color:var(--primary); color:#fff; }
  .tl-item.overdue .tl-dot{ border-color:var(--urgent); }
  .tl-date{ font-size:11.5px; color:var(--ink-faint); font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .tl-label{ font-size:14px; margin-top:1px; }
  .name-input{
    font-family:'Fraunces',serif; font-size:22px; font-weight:700; border:none; background:none; color:var(--ink);
    padding:2px 4px; border-radius:8px; min-width:120px; flex:1;
  }
  .name-input:hover, .name-input:focus{ background:var(--surface-2); outline:1.4px solid var(--border); }
  .goal-box{
    display:flex; flex-direction:column; gap:4px; background:var(--surface-2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:10px 12px; flex:1; min-width:150px;
  }
  .goal-box label{ font-size:11.5px; color:var(--ink-faint); font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .goal-box input{ border:none; background:none; padding:2px 0; font-size:15px; font-weight:600; }

  .back-link{ background:none; border:none; color:var(--ink-soft); font-size:13.5px; margin-bottom:10px; padding:0; font-weight:600; }
  .pill-select{ display:flex; gap:6px; flex-wrap:wrap; }
  .pill-select button{ padding:6px 12px; border-radius:999px; border:1.4px solid var(--border); background:var(--surface); font-size:12.5px; font-weight:600; color:var(--ink-soft); }
  .pill-select button.sel{ color:#fff; border-color:transparent; }

  textarea{ min-height:90px; resize:vertical; }
  .divider{ height:1px; background:var(--border); margin:14px 0; }
  .contact-role{ font-size:12px; color:var(--ink-faint); }
  .fav-star{ color:var(--secondary); }

  .loading{ text-align:center; padding:60px 10px; color:var(--ink-faint); font-size:14px; }

  .lock-screen{
    min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .lock-card{
    width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow); padding:32px 28px; text-align:center;
  }
  .lock-card .mark{
    display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px;
    border-radius:14px; background:var(--primary); color:#fff; font-family:'Fraunces',serif;
    font-weight:600; font-size:24px; margin-bottom:14px; transform:rotate(-4deg);
  }
  .lock-card h2{ margin:0 0 4px; font-size:20px; }
  .lock-card p{ color:var(--ink-soft); font-size:13.5px; margin:0 0 20px; }
  .lock-card input{
    width:100%; padding:11px 13px; border-radius:var(--radius-sm); border:1.4px solid var(--border);
    margin-bottom:10px; text-align:center; letter-spacing:1px;
  }
  .lock-card .btn{ width:100%; padding:11px; margin-top:4px; }
  .lock-error{ color:var(--urgent); font-size:12.5px; margin:-2px 0 10px; }
</style>
</head>

<script>
const ICONS = {

};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayISO = () => new Date().toISOString().slice(0,10);
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
}
function fmtDateFull(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
}
function escapeHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtBRL(n){
  return (n||0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}
function daysDiff(dateA, dateB){
  const a = new Date(dateA); a.setHours(0,0,0,0);
  const b = new Date(dateB); b.setHours(0,0,0,0);
  return Math.round((a-b)/86400000);
}
function nextOccurrence(ev){
  const base = new Date(ev.date+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  let d = new Date(base);
  if(!ev.recurring || ev.recurring==='none') return d;
  if(ev.recurring==='yearly'){
    d.setFullYear(now.getFullYear());
    if(d<now) d.setFullYear(now.getFullYear()+1);
  } else if(ev.recurring==='monthly'){
    d = new Date(now.getFullYear(), now.getMonth(), base.getDate());
    if(d<now) d.setMonth(d.getMonth()+1);
  } else if(ev.recurring==='weekly'){
    while(d<now) d.setDate(d.getDate()+7);
  }
  return d;
}

  filtros:'Troca de filtros', documentos:'Vencimento de documentos',
};
const CONTACT_ROLES = ['Pediatra','Escola','Condomínio','Portaria','Trabalho','Outro'];

// Catálogo padrão de estoque — família com 2 adultos e 1 criança de 4 anos
const DEFAULT_STOCK = {

    'Arroz','Feijão','Macarrão','Farinha de trigo','Farinha de mandioca','Aveia','Açúcar','Sal',
    'Óleo de cozinha','Azeite de oliva','Ovos','Frango','Carne bovina','Peixe','Linguiça',
    'Leite','Leite de crescimento infantil','Iogurte','Queijo','Manteiga','Requeijão',
    'Pão de forma','Pão francês','Torradas','Biscoito/bolacha','Biscoito infantil',
    'Banana','Maçã','Laranja','Tomate','Cebola','Alho','Batata','Alface','Cenoura',
    'Café','Achocolatado','Suco','Água mineral','Molho de tomate','Vinagre','Temperos variados',
    'Petit suisse/papinha','Suco de caixinha infantil',

// ---------- PERSISTÊNCIA (Google Sheets via Apps Script) ----------
const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbx3Un4MF7we918-Vf4jVFIRDTyqBfuQyTf_3CzaY3UL6jtD7zFf8etfckgwoiOm19tXxg/exec';

async function sheetsGet(key, shared){
  const url = `${SHEETS_API_URL}?key=${encodeURIComponent(key)}&shared=${shared}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('sheets get http '+res.status);
  return res.json(); // null ou {key, shared, value}
}
async function sheetsSet(key, value, shared){
  const res = await fetch(SHEETS_API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // evita preflight CORS no Apps Script
    body: JSON.stringify({action:'set', key, value, shared})
  });
  if(!res.ok) throw new Error('sheets set http '+res.status);
  return res.json();
}

// ---------- LOGIN (perfil individual por e-mail) ----------
async function sha256Hex(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isValidEmail(str){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
}
function profileLabel(u){
  return u.name && u.name.trim() ? u.name : u.email;
}
async function bootAuth(){
  try{
    const local = await window.storage.get('daily:device-auth', false);
    if(local && local.value==='true'){
      try{
        const du = await window.storage.get('daily:device-user', false);
        if(du){
          const parsed = JSON.parse(du.value);
          state.currentUser = parsed.name || parsed.email;
          state.currentEmail = parsed.email;
        }
      }catch(e){}
      init();
      return;
    }
  }catch(e){}

  renderLock({status:'loading'});
  let stored = null;
  try{
    const res = await sheetsGet('daily:auth', true);
    stored = (res && res.value) ? JSON.parse(res.value) : null;
    window.storage.set('daily:auth-cache', res && res.value ? res.value : '', true).catch(()=>{});
  }catch(e){
    try{
      const cached = await window.storage.get('daily:auth-cache', true);
      stored = (cached && cached.value) ? JSON.parse(cached.value) : null;
    }catch(e2){}
  }
  const users = (stored && stored.users) ? stored.users : [];
  if(!users.length){
    renderLock({status:'create', users, isFirst:true});
  } else {
    renderLock({status:'select', users});
  }
}
async function saveAuthUsers(users){
  const value = JSON.stringify({users});
  try{ await sheetsSet('daily:auth', value, true); }catch(err){}
  window.storage.set('daily:auth-cache', value, true).catch(()=>{});
}
function renderLock(authState){
  const app = document.getElementById('app');
  let body = '';

    body = `<div class="loading">Verificando acesso…</div>`;
  } else if(authState.status==='select'){
    body = `
      <p>Quem é você?</p>

        ${authState.users.map(u=>`<button class="btn secondary" style="width:100%;margin-bottom:8px;text-align:left" data-select-user="${escapeHtml(u.email)}">
          <div style="font-weight:700">${escapeHtml(profileLabel(u))}</div>

        </button>`).join('')}

  } else if(authState.status==='password'){

    body = `
      <button type="button" class="back-link" data-back-select>← Voltar</button>

      <form id="lock-form">

        <div id="lock-error" class="lock-error"></div>
        <button class="btn" type="submit">Entrar</button>
      </form>
    `;
  } else if(authState.status==='create'){
    body = `
      ${!authState.isFirst? `<button type="button" class="back-link" data-back-select>← Voltar</button>` : ''}
      <p>${authState.isFirst? 'Este é o primeiro acesso ao Daily. Crie seu perfil pessoal com seu e-mail.' : 'Crie seu perfil pessoal para entrar no Daily.'}</p>
      <form id="lock-form">
        <input type="email" id="lock-email" placeholder="Seu e-mail" autocomplete="email" required>
        <input type="text" id="lock-name" placeholder="Como quer ser chamado (opcional)" autocomplete="name" maxlength="24">
        <input type="password" id="lock-pw1" placeholder="Criar senha" autocomplete="new-password" required minlength="4">
        <input type="password" id="lock-pw2" placeholder="Confirmar senha" autocomplete="new-password" required minlength="4">
        <div id="lock-error" class="lock-error"></div>
        <button class="btn" type="submit">Criar perfil e entrar</button>
      </form>
    `;
  }
  app.innerHTML = `
    <div class="lock-screen">
      <div class="lock-card">
        <span class="mark">D.</span>
        <h2>Daily</h2>
        ${body}
      </div>
    </div>
  `;
  if(authState.status==='select'){
    document.querySelectorAll('[data-select-user]').forEach(b=>b.addEventListener('click', ()=>{
      renderLock({status:'password', email:b.dataset.selectUser, users:authState.users});
    }));
    const newBtn = document.querySelector('[data-new-profile]');
    if(newBtn) newBtn.addEventListener('click', ()=> renderLock({status:'create', users:authState.users, isFirst:false}));
    return;
  }
  const backBtn = document.querySelector('[data-back-select]');
  if(backBtn) backBtn.addEventListener('click', ()=> renderLock({status:'select', users:authState.users}));

  const form = document.getElementById('lock-form');
  if(!form) return;
  form.addEventListener('submit', async e=>{
    e.preventDefault();
    const errorEl = document.getElementById('lock-error');
    const pw1 = document.getElementById('lock-pw1').value;

    if(authState.status==='create'){
      const email = document.getElementById('lock-email').value.trim().toLowerCase();
      const name = document.getElementById('lock-name').value.trim();
      const pw2 = document.getElementById('lock-pw2').value;
      if(!isValidEmail(email)){ errorEl.textContent = 'Digite um e-mail válido.'; return; }
      if(authState.users.some(u=>u.email.toLowerCase()===email)){ errorEl.textContent = 'Já existe um perfil com esse e-mail.'; return; }
      if(pw1 !== pw2){ errorEl.textContent = 'As senhas não coincidem.'; return; }
      const hash = await sha256Hex(pw1);
      const users = [...authState.users, {email, name, hash}];
      await saveAuthUsers(users);
      window.storage.set('daily:device-auth', 'true', false).catch(()=>{});
      window.storage.set('daily:device-user', JSON.stringify({email, name}), false).catch(()=>{});
      state.currentUser = name || email;
      state.currentEmail = email;
      init();
    } else if(authState.status==='password'){
      const hash = await sha256Hex(pw1);
      const user = authState.users.find(u=>u.email===authState.email);
      if(user && hash === user.hash){
        window.storage.set('daily:device-auth', 'true', false).catch(()=>{});
        window.storage.set('daily:device-user', JSON.stringify({email:user.email, name:user.name}), false).catch(()=>{});
        state.currentUser = user.name || user.email;
        state.currentEmail = user.email;
        init();
      } else {
        errorEl.textContent = 'Senha incorreta. Tente de novo.';
      }
    }
  });
}

async function loadKey(key){
  const storageKey = 'daily:'+key;
  try{
    const res = await sheetsGet(storageKey, true);
    if(res && res.value!=null){
      // guarda uma cópia local como cache de segurança
      window.storage.set(storageKey, res.value, true).catch(()=>{});
      state.syncStatus = 'ok';
      return JSON.parse(res.value);
    }
  }catch(e){
    console.warn('Sheets indisponível, usando cache local para', key, e);
    state.syncStatus = 'error';
  }
  // fallback: cache local (window.storage) ou valor padrão
  try{
    const cached = await window.storage.get(storageKey, true);
    if(cached) return JSON.parse(cached.value);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS[key]));
}
async function saveKey(key){
  const storageKey = 'daily:'+key;
  const value = JSON.stringify(state.data[key]);
  window.storage.set(storageKey, value, true).catch(()=>{}); // cache local, best-effort
  try{
    await sheetsSet(storageKey, value, true);
    state.syncStatus = 'ok';
  }catch(e){
    console.error('erro ao salvar no Google Sheets', key, e);
    state.syncStatus = 'error';
  }
}
async function loadTheme(){
  try{
    const res = await sheetsGet('daily:theme', false);
    if(res && res.value!=null) return JSON.parse(res.value);
  }catch(e){}
  try{
    const cached = await window.storage.get('daily:theme', false);
    if(cached) return JSON.parse(cached.value);
  }catch(e){}
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
async function toggleTheme(){

  if([1,2,3].includes(code)) return '⛅';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';

// ---------- SMART ALERTS ----------
function computeAlerts(){
  const alerts = [];
  const d = state.data;
  // stock acabou
  Object.entries(d.shopping.stock||{}).forEach(([name, entry])=>{
    if(entry.status==='acabou'){
      const key = 'stock:'+name;
      if(state.dismissedAlerts[key]) return;
      const already = Object.values(d.shopping.lists).flat().some(i=>i.name.toLowerCase()===name.toLowerCase() && !i.comprado);
      if(!already){
        alerts.push({key, type:'stock', text:`${name} acabou na última compra. Deseja adicionar à lista?`, itemName:name, category:entry.category||'mercado'});
      }
    }
  });
  // agenda tomorrow / today
  d.agenda.events.forEach(ev=>{
    const occ = nextOccurrence(ev);
    const diff = daysDiff(occ, new Date());
    const key = 'ev:'+ev.id+':'+occ.toDateString();
    if(state.dismissedAlerts[key]) return;
    if(diff===0){
      alerts.push({key, type:'info', text:`${EVENT_TYPES[ev.type]?.icon||''} ${ev.title} é hoje${ev.time? ' às '+ev.time:''}.`});
    } else if(diff===1){
      alerts.push({key, type:'info', text:`${EVENT_TYPES[ev.type]?.icon||''} ${ev.title} é amanhã${ev.time? ' às '+ev.time:''}.`});
    }
  });
  // overdue home tasks
  const overdue = d.home.tasks.filter(t=>!t.done && t.dueDate && daysDiff(t.dueDate, new Date())<0);
  if(overdue.length && !state.dismissedAlerts['overdue']){
    alerts.push({key:'overdue', type:'info', text:`Você tem ${overdue.length} tarefa(s) da casa atrasada(s).`});
  }
  return alerts;
}

function renderInicio(){

  const alerts = computeAlerts();
  const upcomingEvents = d.agenda.events
    .map(ev=>({ev, occ:nextOccurrence(ev)}))
    .sort((a,b)=>a.occ-b.occ);
  const nextCompromissos = upcomingEvents.filter(x=>x.ev.type!=='aniversario').slice(0,4);
  const birthdays = upcomingEvents.filter(x=>x.ev.type==='aniversario' && daysDiff(x.occ,new Date())<=60).slice(0,5);
  const events14 = upcomingEvents.filter(x=>x.ev.type==='evento' && daysDiff(x.occ,new Date())<=14).slice(0,5);

  const urgentMsgs = d.messages.messages.filter(m=>!m.done).sort((a,b)=>prioRank(a.priority)-prioRank(b.priority)).slice(0,4);
  const pendingTasks = d.home.tasks.filter(t=>!t.done).slice(0,4);
  const shoppingCounts = Object.entries(d.shopping.lists).map(([k,items])=>({k,pending:items.filter(i=>!i.comprado).length}));
  const totalPending = shoppingCounts.reduce((s,c)=>s+c.pending,0);

  return `
    ${alerts.length? `<div>${alerts.map(a=>`
      <div class="alert">
        <span>💡</span>
        <span style="flex:1">${escapeHtml(a.text)} ${a.type==='stock'?`<button class="link" data-add-stock="${escapeHtml(a.itemName)}" data-add-stock-cat="${a.category}">Adicionar à lista</button>`:''}</span>
        <button class="x" data-dismiss="${a.key}">×</button>
      </div>`).join('')}</div>` : ''}

    <div class="grid">
      <div class="card">
        <div class="section-title">Próximos compromissos</div>
        ${nextCompromissos.length? nextCompromissos.map(({ev,occ})=>`
          <div class="row-item"><span>${EVENT_TYPES[ev.type]?.icon||'📌'}</span>
            <span class="item-name">${escapeHtml(ev.title)}</span>
            <span class="contact-role">${fmtDate(occ.toISOString().slice(0,10))}${ev.time? ' · '+ev.time:''}</span>
          </div>`).join('') : `<div class="empty">Nada agendado por enquanto.</div>`}
      </div>
      <div class="card">
        <div class="section-title">Recados importantes</div>

const PHASE_LABELS = {ideia:'Ideia', planejamento:'Planejamento', andamento:'Em andamento', concluido:'Concluído'};
function renderPhaseStepper(status){
  const effective = status==='pausado' ? 'andamento' : status;
  const idx = PHASE_ORDER.indexOf(effective);

    <div style="display:flex;align-items:center;gap:2px;flex:1;min-width:180px">

function renderProjectsProgressCard(){

function occurrencesInMonth(ev, year, month){
  const start = new Date(ev.date+'T00:00:00');
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const results = [];
  if(!ev.recurring || ev.recurring==='none'){
    if(start>=first && start<=last) results.push(new Date(start));
    return results;
  }
  if(ev.recurring==='yearly'){
    if(start.getMonth()===month){
      const dd = new Date(year, month, start.getDate());
      if(dd>=start) results.push(dd);
    }
    return results;
  }
  if(ev.recurring==='monthly'){
    const dd = new Date(year, month, Math.min(start.getDate(), last.getDate()));
    if(dd>=first && dd<=last && dd>=start) results.push(dd);
    return results;
  }
  if(ev.recurring==='weekly'){
    let dd = new Date(start);
    while(dd < first) dd.setDate(dd.getDate()+7);
    while(dd <= last){
      if(dd>=start) results.push(new Date(dd));
      dd.setDate(dd.getDate()+7);
    }
    return results;
  }
  return results;
}
const WEEKDAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function isoLocal(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function renderCalendar(){
  const d = state.data;
  const year = state.calYear, month = state.calMonth;
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const startOffset = first.getDay();
  const totalDays = last.getDate();

  const dayMap = {};
  d.agenda.events.forEach(ev=>{
    occurrencesInMonth(ev, year, month).forEach(occ=>{
      const key = isoLocal(occ);
      (dayMap[key] = dayMap[key]||[]).push(ev);
    });
  });

  const todayKey = todayISO();
  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div></div>`;
  for(let day=1; day<=totalDays; day++){
    const dt = new Date(year, month, day);
    const key = isoLocal(dt);
    const evs = dayMap[key] || [];
    const isToday = key===todayKey;
    const isSelected = key===state.selectedDate;
    cells += `<button data-cal-day="${key}" style="
        aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
        border-radius:10px; border:1.4px solid ${isSelected?'var(--primary)':'transparent'};
        background:${isToday?'var(--today-tint)':'var(--surface-2)'}; color:var(--ink); font-size:12.5px; font-weight:${isToday?'700':'500'};
      ">
      <span>${day}</span>
      ${evs.length? `<span style="display:flex;gap:2px">${evs.slice(0,3).map(()=>`<span style="width:5px;height:5px;border-radius:50%;background:var(--primary)"></span>`).join('')}</span>` : ''}

      <div style="text-align:center;margin-top:10px"><button class="btn ghost small" data-cal-today>Hoje</button></div>
    </div>
    ${state.selectedDate ? `

      ${selEvs.length? `<div class="grid">
        ${selEvs.map(ev=>`
          <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:6px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">

        <button class="btn" type="submit">Criar projeto</button>
      </form>
      <div style="display:flex;gap:6px;flex-wrap:wrap">

function mergeTimeline(p){
  const items = [];
  p.timeline.forEach(t=>items.push({date:t.date, label:t.label, type:'milestone', id:t.id}));
  p.checklist.filter(c=>c.startDate || c.endDate).forEach(c=>items.push({
    date:c.endDate || c.startDate, startDate:c.startDate, endDate:c.endDate,
    label:c.text, type:'checklist', done:c.done, value:c.value, id:c.id
  }));
  return items.sort((a,b)=>new Date(a.date)-new Date(b.date));
}
function renderProjectCalendar(p){
  const items = mergeTimeline(p);
  const year = state.projCalYear, month = state.projCalMonth;
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const startOffset = first.getDay();
  const dayMap = {}; const startMap = {};
  items.forEach(it=>{ (dayMap[it.date] = dayMap[it.date]||[]).push(it); });
  items.filter(it=>it.type==='checklist' && it.startDate && it.startDate!==it.date)
    .forEach(it=>{ (startMap[it.startDate] = startMap[it.startDate]||[]).push(it); });
  const todayKey = todayISO();
  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div></div>`;
  for(let day=1; day<=last.getDate(); day++){
    const dt = new Date(year, month, day);
    const key = isoLocal(dt);
    const evs = dayMap[key] || [];
    const starts = startMap[key] || [];
    const isToday = key===todayKey;
    const isGoal = key===p.deadlineGoal;
    const titleParts = [...evs.map(e=>e.label), ...starts.map(e=>`início: ${e.label}`)];
    cells += `<div style="
        aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
        border-radius:10px; border:1.4px solid ${isGoal?'var(--urgent)':'transparent'};
        background:${isToday?'var(--today-tint)':'var(--surface-2)'}; font-size:12px; font-weight:${isToday?'700':'500'};
      " title="${titleParts.join(', ')}">
      <span>${day}</span>
      ${(evs.length||starts.length)? `<span style="display:flex;gap:2px">${starts.slice(0,2).map(()=>`<span style="width:5px;height:5px;border-radius:50%;border:1.3px solid var(--primary);background:none"></span>`).join('')}${evs.slice(0,3).map(e=>`<span style="width:5px;height:5px;border-radius:50%;background:${e.type==='milestone'?'var(--secondary)':(e.done?'var(--primary)':'var(--urgent)')}"></span>`).join('')}</span>` : (isGoal?`<span style="font-size:8px">🎯</span>`:'')}
    </div>`;
  }
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button class="icon-btn" data-proj-cal-nav="-1" style="font-size:18px">‹</button>
      <b class="display" style="font-size:15px">${MONTHS_PT[month]} ${year}</b>
      <button class="icon-btn" data-proj-cal-nav="1" style="font-size:18px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${WEEKDAYS_PT.map(w=>`<div style="text-align:center;font-size:10.5px;color:var(--ink-faint);font-weight:700">${w}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
  `;
}

function logActivity(p, text){
  p.activities.push({id:uid(), text, date:todayISO()});
}
function autoUpdateStatus(p){
  const total = p.checklist.length;
  const done = p.checklist.filter(c=>c.done).length;
  const pct = total ? (done/total*100) : 0;
  if(total>0 && pct===100){
    if(p.status!=='concluido'){ p.status='concluido'; logActivity(p, `Status alterado automaticamente para ${PROJECT_STATUS.concluido} (100% do checklist)`); }
    return;
  }
  if(p.status==='pausado') return; // respeita a pausa manual enquanto não está 100% concluído
  if(pct>0){
    if(p.status!=='andamento'){ p.status='andamento'; logActivity(p, `Status alterado automaticamente para ${PROJECT_STATUS.andamento} (${Math.round(pct)}% do checklist)`); }
  }
}

// ---------- HANDLERS ----------
function attachHandlers(){
  const root = document.getElementById('view-root');
  if(!root) return;

  root.querySelectorAll('[data-dismiss]').forEach(b=>b.addEventListener('click', ()=>dismissAlert(b.dataset.dismiss)));
  root.querySelectorAll('[data-add-stock]').forEach(b=>b.addEventListener('click', ()=>addStockToList(b.dataset.addStock, b.dataset.addStockCat)));
  root.querySelectorAll('[data-open-project-from-home]').forEach(b=>b.addEventListener('click', ()=>{
    state.view='projetos'; state.currentProject=b.dataset.openProjectFromHome; render();
  }));

  // shopping
  root.querySelectorAll('[data-shop-sub]').forEach(b=>b.addEventListener('click', ()=>{ state.shopSubtab=b.dataset.shopSub; render(); }));
  const addItemForm = root.querySelector('[data-form="add-item"]');
  if(addItemForm) addItemForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const name = fd.get('name').trim(); if(!name) return;
    state.data.shopping.lists[state.shopSubtab].push({id:uid(), name, qty:parseInt(fd.get('qty'))||1, comprado:false});
    await saveKey('shopping'); render();
  });
  root.querySelectorAll('[data-quick-item]').forEach(el=>el.addEventListener('click', async ()=>{
    const idx = el.dataset.quickItem.indexOf(':');
    const list = el.dataset.quickItem.slice(0,idx);
    const name = el.dataset.quickItem.slice(idx+1);
    state.data.shopping.lists[list].push({id:uid(), name, qty:1, comprado:false});
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-price]').forEach(el=>el.addEventListener('change', async ()=>{
    const name = el.dataset.price.toLowerCase();
    const val = parseFloat(el.value);
    if(isNaN(val) || val<0){ delete state.data.shopping.prices[name]; }
    else state.data.shopping.prices[name] = val;
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-transfer]').forEach(el=>el.addEventListener('change', async ()=>{
    const target = el.value; if(!target) return;
    const [list,id] = el.dataset.transfer.split(':');
    const idx = state.data.shopping.lists[list].findIndex(i=>i.id===id);
    if(idx>-1){
      const [item] = state.data.shopping.lists[list].splice(idx,1);
      item.id = uid();
      state.data.shopping.lists[target].push(item);
    }
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-toggle-item]').forEach(el=>el.addEventListener('click', async ()=>{
    const [list,id] = el.dataset.toggleItem.split(':');
    const item = state.data.shopping.lists[list].find(i=>i.id===id);
    item.comprado = !item.comprado;
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-del-item]').forEach(el=>el.addEventListener('click', async ()=>{
    const [list,id] = el.dataset.delItem.split(':');
    state.data.shopping.lists[list] = state.data.shopping.lists[list].filter(i=>i.id!==id);
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-fav]').forEach(el=>el.addEventListener('click', async ()=>{
    const name = el.dataset.fav;
    if(!isFav(name)) state.data.shopping.favorites.push(name);
    else state.data.shopping.favorites = state.data.shopping.favorites.filter(f=>f.toLowerCase()!==name.toLowerCase());
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-unfav]').forEach(el=>el.addEventListener('click', async ()=>{
    state.data.shopping.favorites = state.data.shopping.favorites.filter(f=>f!==el.dataset.unfav);
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-quick-add]').forEach(el=>el.addEventListener('change', async ()=>{
    const list = el.value; if(!list) return;
    const name = el.dataset.quickAdd;
    state.data.shopping.lists[list].push({id:uid(), name, qty:1, comprado:false});
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-finish-list]').forEach(el=>el.addEventListener('click', async ()=>{
    const list = el.dataset.finishList;
    const bought = state.data.shopping.lists[list].filter(i=>i.comprado);
    if(!bought.length) return;
    state.data.shopping.history.push({id:uid(), list, date:todayISO(), items:bought.map(i=>({name:i.name, qty:i.qty}))});
    bought.forEach(i=>{
      const existing = state.data.shopping.stock[i.name];
      state.data.shopping.stock[i.name] = {status:'tem', category: existing ? existing.category : list};
    });
    state.data.shopping.lists[list] = state.data.shopping.lists[list].filter(i=>!i.comprado);
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-qty]').forEach(el=>el.addEventListener('change', async ()=>{
    const [list,id] = el.dataset.qty.split(':');
    const item = state.data.shopping.lists[list].find(i=>i.id===id);
    const val = parseInt(el.value);
    item.qty = (isNaN(val) || val<1) ? 1 : val;
    await saveKey('shopping'); render();
  }));
  const addStockForm = root.querySelector('[data-form="add-stock"]');
  if(addStockForm) addStockForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const name = fd.get('name').trim(); if(!name) return;
    state.data.shopping.stock[name] = {status:'tem', category:fd.get('category')};
    const priceVal = parseFloat(fd.get('price'));
    if(!isNaN(priceVal) && priceVal>=0) state.data.shopping.prices[name.toLowerCase()] = priceVal;
    await saveKey('shopping'); render();
  });
  root.querySelectorAll('[data-stock-category]').forEach(el=>el.addEventListener('change', async ()=>{
    state.data.shopping.stock[el.dataset.stockCategory].category = el.value;
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-stock]').forEach(el=>el.addEventListener('click', async ()=>{
    const [name,status] = el.dataset.stock.split(':');
    state.data.shopping.stock[name].status = status;
    await saveKey('shopping'); render();
  }));
  root.querySelectorAll('[data-del-stock]').forEach(el=>el.addEventListener('click', async ()=>{
    delete state.data.shopping.stock[el.dataset.delStock];
    await saveKey('shopping'); render();
  }));

  // agenda
  const addEventForm = root.querySelector('[data-form="add-event"]');
  if(addEventForm) addEventForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.agenda.events.push({id:uid(), title:fd.get('title'), type:fd.get('type'), date:fd.get('date'), time:fd.get('time'), person:fd.get('person'), recurring:fd.get('recurring')});
    await saveKey('agenda'); render();
  });
  root.querySelectorAll('[data-del-event]').forEach(el=>el.addEventListener('click', async ()=>{
    state.data.agenda.events = state.data.agenda.events.filter(ev=>ev.id!==el.dataset.delEvent);
    await saveKey('agenda'); render();
  }));
  root.querySelectorAll('[data-agenda-view]').forEach(el=>el.addEventListener('click', ()=>{
    state.agendaView = el.dataset.agendaView; render();
  }));
  root.querySelectorAll('[data-cal-nav]').forEach(el=>el.addEventListener('click', ()=>{
    const delta = parseInt(el.dataset.calNav);
    let m = state.calMonth + delta, y = state.calYear;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    state.calMonth=m; state.calYear=y; render();
  }));
  const calTodayBtn = root.querySelector('[data-cal-today]');
  if(calTodayBtn) calTodayBtn.addEventListener('click', ()=>{
    const n = new Date();
    state.calYear=n.getFullYear(); state.calMonth=n.getMonth(); state.selectedDate=todayISO(); render();
  });
  root.querySelectorAll('[data-cal-day]').forEach(el=>el.addEventListener('click', ()=>{
    state.selectedDate = state.selectedDate===el.dataset.calDay ? null : el.dataset.calDay;
    render();
  }));

  // recados
  const addMsgForm = root.querySelector('[data-form="add-message"]');
  if(addMsgForm) addMsgForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.messages.messages.push({id:uid(), text:fd.get('text'), priority:fd.get('priority'), author:fd.get('author'), done:false, date:todayISO()});
    await saveKey('messages'); render();
  });
  root.querySelectorAll('[data-toggle-msg]').forEach(el=>el.addEventListener('click', async ()=>{
    const m = state.data.messages.messages.find(m=>m.id===el.dataset.toggleMsg);
    m.done = !m.done; await saveKey('messages'); render();
  }));
  root.querySelectorAll('[data-del-msg]').forEach(el=>el.addEventListener('click', async ()=>{
    state.data.messages.messages = state.data.messages.messages.filter(m=>m.id!==el.dataset.delMsg);
    await saveKey('messages'); render();
  }));

  // casa
  const addTaskForm = root.querySelector('[data-form="add-task"]');
  if(addTaskForm) addTaskForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.home.tasks.push({id:uid(), title:fd.get('title'), responsavel:fd.get('responsavel'), category:fd.get('category'), dueDate:fd.get('dueDate')||null, done:false});
    await saveKey('home'); render();
  });
  root.querySelectorAll('[data-toggle-task]').forEach(el=>el.addEventListener('click', async ()=>{
    const t = state.data.home.tasks.find(t=>t.id===el.dataset.toggleTask);
    if(t){ t.done = !t.done; await saveKey('home'); render(); }
  }));
  root.querySelectorAll('[data-del-task]').forEach(el=>el.addEventListener('click', async ()=>{
    state.data.home.tasks = state.data.home.tasks.filter(t=>t.id!==el.dataset.delTask);
    await saveKey('home'); render();
  }));

  // contatos
  const addContactForm = root.querySelector('[data-form="add-contact"]');
  if(addContactForm) addContactForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.contacts.contacts.push({id:uid(), name:fd.get('name'), role:fd.get('role'), phone:fd.get('phone'), notes:fd.get('notes')});
    await saveKey('contacts'); render();
  });
  root.querySelectorAll('[data-del-contact]').forEach(el=>el.addEventListener('click', async ()=>{
    state.data.contacts.contacts = state.data.contacts.contacts.filter(c=>c.id!==el.dataset.delContact);
    await saveKey('contacts'); render();
  }));

  // projetos
  const addProjectForm = root.querySelector('[data-form="add-project"]');
  if(addProjectForm) addProjectForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const name = new FormData(e.target).get('name').trim(); if(!name) return;
    await createProject(name);
  });
  root.querySelectorAll('[data-quick-project]').forEach(el=>el.addEventListener('click', async ()=>{
    await createProject(el.dataset.quickProject);
  }));
  root.querySelectorAll('[data-open-project]').forEach(el=>el.addEventListener('click', ()=>{
    state.currentProject = el.dataset.openProject; render();
  }));
  const backBtn = root.querySelector('[data-back-projects]');
  if(backBtn) backBtn.addEventListener('click', ()=>{ state.currentProject=null; render(); });

  root.querySelectorAll('[data-change-status]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.changeStatus);
    p.status = el.value; logActivity(p, `Status alterado para ${PROJECT_STATUS[p.status]}`);
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-change-priority]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.changePriority);
    p.priority = el.value; await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-project-name]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.projectName);
    const val = el.value.trim(); if(!val) { el.value = p.name; return; }
    p.name = val; await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-budget-goal]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.budgetGoal);
    const val = parseFloat(el.value);
    p.budgetGoal = (isNaN(val)||val<0) ? null : val;
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-deadline-goal]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.deadlineGoal);
    p.deadlineGoal = el.value || null;
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-objective]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.objective);
    p.objective = el.value; await saveKey('projects');
  }));
  root.querySelectorAll('[data-notes]').forEach(el=>el.addEventListener('change', async ()=>{
    const p = state.data.projects.projects.find(p=>p.id===el.dataset.notes);
    p.notes = el.value; await saveKey('projects');
  }));
  const addChecklistForm = root.querySelector('[data-form="add-checklist"]');
  if(addChecklistForm) addChecklistForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const p = state.data.projects.projects.find(p=>p.id===e.target.dataset.pid);
    const fd = new FormData(e.target);
    const text = fd.get('text').trim(); if(!text) return;
    const valRaw = parseFloat(fd.get('value'));
    p.checklist.push({id:uid(), text, done:false, value:(isNaN(valRaw)?null:valRaw), startDate:fd.get('startDate')||null, endDate:fd.get('endDate')||null});
    autoUpdateStatus(p);
    await saveKey('projects'); render();
  });
  root.querySelectorAll('[data-toggle-checklist]').forEach(el=>el.addEventListener('click', async ()=>{
    const [pid,cid] = el.dataset.toggleChecklist.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    const c = p.checklist.find(c=>c.id===cid);
    c.done = !c.done;
    if(c.done) logActivity(p, `Concluído: ${c.text}`);
    autoUpdateStatus(p);
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-checklist-value]').forEach(el=>el.addEventListener('change', async ()=>{
    const [pid,cid] = el.dataset.checklistValue.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    const c = p.checklist.find(c=>c.id===cid);
    const val = parseFloat(el.value);
    c.value = (isNaN(val)||val<0) ? null : val;
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-checklist-start]').forEach(el=>el.addEventListener('change', async ()=>{
    const [pid,cid] = el.dataset.checklistStart.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    const c = p.checklist.find(c=>c.id===cid);
    c.startDate = el.value || null;
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-checklist-end]').forEach(el=>el.addEventListener('change', async ()=>{
    const [pid,cid] = el.dataset.checklistEnd.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    const c = p.checklist.find(c=>c.id===cid);
    c.endDate = el.value || null;
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-del-checklist]').forEach(el=>el.addEventListener('click', async ()=>{
    const [pid,cid] = el.dataset.delChecklist.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    p.checklist = p.checklist.filter(c=>c.id!==cid);
    autoUpdateStatus(p);
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-proj-cal-nav]').forEach(el=>el.addEventListener('click', ()=>{
    const delta = parseInt(el.dataset.projCalNav);
    let m = state.projCalMonth + delta, y = state.projCalYear;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    state.projCalMonth=m; state.projCalYear=y; render();
  }));
  const addMilestoneForm = root.querySelector('[data-form="add-milestone"]');
  if(addMilestoneForm) addMilestoneForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const p = state.data.projects.projects.find(p=>p.id===e.target.dataset.pid);
    const fd = new FormData(e.target);
    p.timeline.push({id:uid(), label:fd.get('label'), date:fd.get('date')});
    await saveKey('projects'); render();
  });
  root.querySelectorAll('[data-del-milestone]').forEach(el=>el.addEventListener('click', async ()=>{
    const [pid,tid] = el.dataset.delMilestone.split(':');
    const p = state.data.projects.projects.find(p=>p.id===pid);
    p.timeline = p.timeline.filter(t=>t.id!==tid);
    await saveKey('projects'); render();
  }));
  root.querySelectorAll('[data-del-project]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('Excluir este projeto? Essa ação não pode ser desfeita.')) return;
    state.data.projects.projects = state.data.projects.projects.filter(p=>p.id!==el.dataset.delProject);
    state.currentProject = null;
    await saveKey('projects'); render();
  }));
}
async function createProject(name){
  state.data.projects.projects.push({
    id:uid(), name, status:'ideia', priority:'media', objective:'', checklist:[], timeline:[], activities:[], notes:'',
    budgetGoal:null, deadlineGoal:null
  });
  await saveKey('projects'); render();
}

bootAuth();
</script>
</body>
</html>
