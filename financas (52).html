  function rowHtml(t){
    const dateFmt = new Date(t.date+'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
    if(t.type==='transfer'){
      const from = accById(t.fromAccountId);
      const to = accById(t.toAccountId);
      return `<div class="ledger-row" data-id="${t.id}">
        <div class="cat-stamp" style="background:var(--brass)"></div>
        <div>
          <div class="desc">${escapeHtml(t.desc || 'Transferência')}</div>
          <div class="meta">${from?from.name:'?'} → ${to?to.name:'?'}</div>
        </div>
        <div class="amount mono" style="color:var(--ink);">${fmt(t.amount)}</div>
        <div class="date">${dateFmt}</div>
        <div class="row-actions">
          <button class="icon-btn edit-tx" title="Editar">✎</button>
          <button class="icon-btn del-tx" title="Excluir">✕</button>
        </div>
      </div>`;
    }
    const c = catById(t.categoryId);
    const a = accById(t.accountId);
    const sub = c && t.subcategoryId ? (c.subcategories||[]).find(s=>s.id===t.subcategoryId) : null;
    const badge = t.recurrenceType==='installment' ? `<span class="tag">${t.installmentIndex}/${t.installmentTotal}</span>`
      : t.recurrenceType==='period' ? `<span class="tag">${t.installmentIndex}/${t.installmentTotal}</span>`
      : t.recurrenceType==='fixed' ? `<span class="tag">Fixa</span>` : '';
    const isCardExpense = t.type==='expense' && a && a.type==='Crédito';
    const payPill = t.paid!==undefined
      ? (isCardExpense
          ? `<span class="paid-pill ${t.paid?'paid':'pending'} readonly" title="Pago junto com a fatura do cartão">${t.paid?'✓ Pago':'○ Pendente'}</span>`
          : `<button class="paid-pill ${t.paid?'paid':'pending'}" data-toggle-paid="${t.id}">${t.paid?'✓ Pago':'○ Pendente'}</button>`)
      : '';
    return `<div class="ledger-row" data-id="${t.id}">
      <div class="cat-stamp" style="background:${c?c.color:'#888'}"></div>
      <div>
        <div class="desc">${escapeHtml(t.desc)}${badge}</div>
        <div class="meta">${c?c.name:'Sem categoria'}${sub?' › '+escapeHtml(sub.name):''} · ${a?a.name:''}${payPill}</div>
      </div>
      <div class="amount ${t.type==='income'?'pos':'neg'} mono">${t.type==='income'?'+':''}${fmt(t.amount)}</div>
      <div class="date">${dateFmt}</div>
      <div class="row-actions">
        <button class="icon-btn edit-tx" title="Editar">✎</button>
        <button class="icon-btn del-tx" title="Excluir">✕</button>
      </div>
    </div>`;
  }

  function bindLedgerRowActions(){
    mainEl.querySelectorAll('.ledger-row').forEach(row=>{
      const id = row.dataset.id;
      const editBtn = row.querySelector('.edit-tx');
      const delBtn = row.querySelector('.del-tx');
      const payPill = row.querySelector('.paid-pill[data-toggle-paid]');
      row.style.cursor = 'pointer';
      row.onclick = ()=> openTxModal(state.transactions.find(t=>t.id===id));
      if(editBtn) editBtn.onclick = (e)=>{ e.stopPropagation(); openTxModal(state.transactions.find(t=>t.id===id)); };
      if(delBtn) delBtn.onclick = async (e)=>{
        e.stopPropagation();
        state.transactions = state.transactions.filter(t=>t.id!==id);
        await saveState(); render();
      };
      if(payPill) payPill.onclick = async (e)=>{
        e.stopPropagation();
        const t = state.transactions.find(x=>x.id===id);
        t.paid = !t.paid;
        await saveState(); render();
      };
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  // Descrições mais usadas recentemente, pra sugerir no autocompletar (ajuda
  // bastante a digitar rápido no celular).
  function recentDescriptions(){
    const counts = {};
    [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,300).forEach(t=>{
      if(!t.desc) return;
      counts[t.desc] = (counts[t.desc]||0) + 1;
    });
    return Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,25);
  }

  // ---------- TRANSACTIONS ----------
  function renderTransactions(){
    const allGroups = state.groups||[];
    const catsForGroup = (groupId) => state.categories.filter(c => groupId==='all' || c.groupId===groupId);
    const availableCats = catsForGroup(txFilter.groupId);
    if(txFilter.categoryId!=='all' && !availableCats.some(c=>c.id===txFilter.categoryId)){
      txFilter.categoryId = 'all'; txFilter.subcategoryId = 'all';
    }
    const subsForFilter = () => {
      if(txFilter.categoryId!=='all'){
        const c = catById(txFilter.categoryId);
        return (c && c.subcategories) || [];
      }
      const subs = [];
      availableCats.forEach(c=> (c.subcategories||[]).forEach(s=> subs.push({...s, catName:c.name})));
      return subs;
    };
    const availableSubs = subsForFilter();
    if(txFilter.subcategoryId!=='all' && !availableSubs.some(s=>s.id===txFilter.subcategoryId)){
      txFilter.subcategoryId = 'all';
    }

    let list = txForMonth(currentYear, currentMonth);
    if(txFilter.groupId!=='all') list = list.filter(t=>{ const c=catById(t.categoryId); return c && c.groupId===txFilter.groupId; });
    if(txFilter.categoryId!=='all') list = list.filter(t=>t.categoryId===txFilter.categoryId);
    if(txFilter.subcategoryId!=='all') list = list.filter(t=>t.subcategoryId===txFilter.subcategoryId);
    if(txFilter.accountId!=='all') list = list.filter(t=> t.type==='transfer' ? (t.fromAccountId===txFilter.accountId || t.toAccountId===txFilter.accountId) : t.accountId===txFilter.accountId);
    if(txFilter.search.trim()) {
      const q = txFilter.search.toLowerCase();
      list = list.filter(t=>t.desc.toLowerCase().includes(q));
    }
    list = [...list].sort((a,b)=> b.date.localeCompare(a.date));

    const groupOptions = `<option value="all">Todos os grupos</option>` + allGroups.map(g=>`<option value="${g.id}" ${txFilter.groupId===g.id?'selected':''}>${g.icon||'📁'} ${g.name}</option>`).join('');
    const catOptions = `<option value="all">Todas categorias</option>` + availableCats.map(c=>`<option value="${c.id}" ${txFilter.categoryId===c.id?'selected':''}>${c.icon?c.icon+' ':''}${c.name}</option>`).join('');
    const subOptions = `<option value="all">Todas subcategorias</option>` + availableSubs.map(s=>`<option value="${s.id}" ${txFilter.subcategoryId===s.id?'selected':''}>${escapeHtml(s.name)}${s.catName?' — '+escapeHtml(s.catName):''}</option>`).join('');
    const accOptions = state.accounts.map(a=>`<option value="${a.id}" ${txFilter.accountId===a.id?'selected':''}>${a.name}</option>`).join('');

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Transações</h1><div class="subtitle">Todos os lançamentos do mês</div></div>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          ${monthSwitchHtml()}
          <div class="type-toggle" id="txViewToggle" style="width:auto;">
            <button type="button" data-view="list" class="${txViewMode==='list'?'active income':''}">Lista</button>
            <button type="button" data-view="hierarchy" class="${txViewMode==='hierarchy'?'active income':''}">Hierarquia</button>
          </div>
          <button class="btn btn-primary new-tx-btn" id="addTxBtn">+ Nova transação</button>
        </div>
      </div>
      <div class="card">
        <div class="toolbar">
          <div class="toolbar-left">
            <input type="text" class="search" id="searchBox" placeholder="Buscar descrição..." value="${txFilter.search}">
            <select class="filter" id="groupFilter">${groupOptions}</select>
            <select class="filter" id="catFilter">${catOptions}</select>
            <select class="filter" id="subFilter">${subOptions}</select>
            <select class="filter" id="accFilter"><option value="all">Todas contas</option>${accOptions}</select>
          </div>
          <div class="subtitle">${list.length} lançamento(s)</div>
        </div>
        ${txViewMode==='list'
          ? `<div class="ledger">${list.map(rowHtml).join('') || `<div class="empty-state"><div class="display">Nada encontrado</div>Tente ajustar os filtros ou o mês.</div>`}</div>`
          : renderExpenseHierarchy(list)}
      </div>
    `;
    bindMonthSwitch();
    document.getElementById('addTxBtn').onclick = ()=> openTxModal();
    document.getElementById('searchBox').oninput = (e)=>{ txFilter.search = e.target.value; renderTransactions(); };
    document.getElementById('groupFilter').onchange = (e)=>{ txFilter.groupId = e.target.value; txFilter.categoryId='all'; txFilter.subcategoryId='all'; renderTransactions(); };
    document.getElementById('catFilter').onchange = (e)=>{ txFilter.categoryId = e.target.value; txFilter.subcategoryId='all'; renderTransactions(); };
    document.getElementById('subFilter').onchange = (e)=>{ txFilter.subcategoryId = e.target.value; renderTransactions(); };
    document.getElementById('accFilter').onchange = (e)=>{ txFilter.accountId = e.target.value; renderTransactions(); };
    document.querySelectorAll('#txViewToggle button').forEach(btn=>{
      btn.onclick = ()=>{ txViewMode = btn.dataset.view; renderTransactions(); };
    });
    if(txViewMode==='list'){
      bindLedgerRowActions();
    } else {
      bindHierarchyEvents();
    }
  }

  // Monta a árvore Grupo > Categoria > Subcategoria com o valor de cada nível,
  // a partir das despesas já filtradas (mês + filtros ativos).
  function buildExpenseHierarchy(list){
    const tree = {};
    list.filter(t=>t.type==='expense').forEach(t=>{
      const cat = catById(t.categoryId);
      const groupId = cat ? (cat.groupId || '__none__') : '__none__';
      const group = groupId!=='__none__' ? groupById(groupId) : null;
      tree[groupId] = tree[groupId] || { group, total: 0, cats: {} };
      tree[groupId].total += Math.abs(t.amount);
      const catId = t.categoryId || '__none__';
      tree[groupId].cats[catId] = tree[groupId].cats[catId] || { cat, total: 0, subs: {} };
      tree[groupId].cats[catId].total += Math.abs(t.amount);
      const subId = t.subcategoryId || '__none__';
      const subName = subId==='__none__' ? 'Sem subcategoria' : (((cat&&cat.subcategories)||[]).find(s=>s.id===subId)||{}).name || 'Subcategoria removida';
      tree[groupId].cats[catId].subs[subId] = tree[groupId].cats[catId].subs[subId] || { name: subName, total: 0 };
      tree[groupId].cats[catId].subs[subId].total += Math.abs(t.amount);
    });
    return tree;
  }

  function renderExpenseHierarchy(list){
    const tree = buildExpenseHierarchy(list);
    const groupEntries = Object.entries(tree).sort((a,b)=>b[1].total-a[1].total);
    if(groupEntries.length===0) return `<div class="empty-state"><div class="display">Nenhuma despesa encontrada</div>Tente ajustar os filtros ou o mês.</div>`;
    const grandTotal = groupEntries.reduce((s,[,g])=>s+g.total,0);

    const rows = groupEntries.map(([groupId, g])=>{
      const gKey = 'g:'+groupId;
      const gCollapsed = hierarchyCollapsed.has(gKey);
      const gPct = grandTotal>0 ? (g.total/grandTotal*100) : 0;
      const gColor = g.group ? g.group.color : '#6E6E6E';
      const catEntries = Object.entries(g.cats).sort((a,b)=>b[1].total-a[1].total);

      const catRowsHtml = catEntries.map(([catId, cEntry])=>{
        const cKey = 'c:'+groupId+':'+catId;
        const cCollapsed = hierarchyCollapsed.has(cKey);
        const cPct = g.total>0 ? (cEntry.total/g.total*100) : 0;
        const cColor = cEntry.cat ? cEntry.cat.color : gColor;
        const subEntries = Object.entries(cEntry.subs).sort((a,b)=>b[1].total-a[1].total);
        const hasRealSubs = subEntries.length>0 && !(subEntries.length===1 && subEntries[0][0]==='__none__');

        const subRowsHtml = subEntries.map(([subId, sEntry])=>{
          const sPct = cEntry.total>0 ? (sEntry.total/cEntry.total*100) : 0;
          return `<div class="hier-row hier-sub">
            <div class="hier-row-main">
              <span class="hier-label">${escapeHtml(sEntry.name)}</span>
              <span class="hier-value mono">${fmt(sEntry.total)}</span>
            </div>
            <div class="hier-bar-track"><div class="hier-bar-fill" style="width:${sPct.toFixed(0)}%; background:${cColor}"></div></div>
          </div>`;
        }).join('');

        return `<div class="hier-row hier-cat">
          <div class="hier-row-main ${hasRealSubs?'clickable':''}" ${hasRealSubs?`data-hier-toggle="${cKey}"`:''}>
            <span class="hier-label">${hasRealSubs?`<span class="hier-chev ${cCollapsed?'':'open'}">›</span>`:'<span class="hier-chev-spacer"></span>'}<span class="cat-icon" style="background:${cEntry.cat?cEntry.cat.color:'#999'}"></span>${cEntry.cat?escapeHtml(cEntry.cat.name):'Sem categoria'}</span>
            <span class="hier-value mono">${fmt(cEntry.total)}</span>
          </div>
          <div class="hier-bar-track"><div class="hier-bar-fill" style="width:${cPct.toFixed(0)}%; background:${cColor}"></div></div>
          ${hasRealSubs && !cCollapsed ? `<div class="hier-children">${subRowsHtml}</div>` : ''}
        </div>`;
      }).join('');

      return `<div class="hier-row hier-group">
        <div class="hier-row-main clickable" data-hier-toggle="${gKey}">
          <span class="hier-label"><span class="hier-chev ${gCollapsed?'':'open'}">›</span><span class="cat-icon" style="background:${g.group?g.group.color:'#999'}"></span>${g.group?escapeHtml(g.group.name):'Sem grupo'}</span>
          <span class="hier-value mono">${fmt(g.total)}</span>
        </div>
        <div class="hier-bar-track"><div class="hier-bar-fill" style="width:${gPct.toFixed(0)}%; background:${gColor}"></div></div>
        ${!gCollapsed ? `<div class="hier-children">${catRowsHtml}</div>` : ''}
      </div>`;
    }).join('');

    return `
      <div class="hier-total-row">
        <span>Total das despesas filtradas</span>
        <span class="mono">${fmt(grandTotal)}</span>
      </div>
      <div class="hier-tree">${rows}</div>
    `;
  }

  function bindHierarchyEvents(){
    mainEl.querySelectorAll('[data-hier-toggle]').forEach(el=>{
      el.onclick = (e)=>{
        e.stopPropagation();
        const key = el.dataset.hierToggle;
        if(hierarchyCollapsed.has(key)) hierarchyCollapsed.delete(key); else hierarchyCollapsed.add(key);
        renderTransactions();
      };
    });
  }

  // ---------- ANÁLISE (gasto diário por grupo/categoria/subcategoria) ----------
  function renderAnalysis(){
    const groups = (state.groups||[]).filter(g=>g.type==='expense');
    const catsForGroup = (groupId) => state.categories.filter(c=>c.type==='expense' && (groupId==='all' || c.groupId===groupId));
    const availableCats = catsForGroup(analysisFilter.groupId);
    // Se a categoria escolhida não existe mais nesse grupo, volta pra "todas".
    if(analysisFilter.categoryId!=='all' && !availableCats.some(c=>c.id===analysisFilter.categoryId)){
      analysisFilter.categoryId = 'all'; analysisFilter.subcategoryId = 'all';
    }
    const subsForCat = () => {
      if(analysisFilter.categoryId!=='all'){
        const c = catById(analysisFilter.categoryId);
        return (c && c.subcategories) || [];
      }
      // sem categoria específica: junta subcategorias de todas as categorias visíveis
      const subs = [];
      availableCats.forEach(c=> (c.subcategories||[]).forEach(s=> subs.push({...s, catName:c.name})));
      return subs;
    };
    const availableSubs = subsForCat();
    if(analysisFilter.subcategoryId!=='all' && !availableSubs.some(s=>s.id===analysisFilter.subcategoryId)){
      analysisFilter.subcategoryId = 'all';
    }
    const selectedAccount = analysisFilter.accountId!=='all' ? accById(analysisFilter.accountId) : null;
    const isCardAccount = selectedAccount && selectedAccount.type==='Crédito';
    // Faturas disponíveis pra conta escolhida (só existe pra cartão de crédito).
    const faturaDates = isCardAccount
      ? [...new Set(state.transactions.filter(t=>t.type==='expense' && t.accountId===selectedAccount.id).map(t=>t.date))].sort()
      : [];
    if(!isCardAccount) analysisFilter.faturaDate = 'all';
    else if(analysisFilter.faturaDate!=='all' && !faturaDates.includes(analysisFilter.faturaDate)) analysisFilter.faturaDate = 'all';

    const groupOptsHtml = `<option value="all">Todos os grupos</option>` + groups.map(g=>`<option value="${g.id}" ${analysisFilter.groupId===g.id?'selected':''}>${g.icon||'📁'} ${g.name}</option>`).join('');
    const catOptsHtml = `<option value="all">Todas categorias</option>` + availableCats.map(c=>`<option value="${c.id}" ${analysisFilter.categoryId===c.id?'selected':''}>${c.icon?c.icon+' ':''}${c.name}</option>`).join('');
    const subOptsHtml = `<option value="all">Todas subcategorias</option>` + availableSubs.map(s=>`<option value="${s.id}" ${analysisFilter.subcategoryId===s.id?'selected':''}>${escapeHtml(s.name)}${s.catName?' — '+escapeHtml(s.catName):''}</option>`).join('');
    const accOptsHtml = `<option value="all">Todas contas</option>` + state.accounts.map(a=>`<option value="${a.id}" ${analysisFilter.accountId===a.id?'selected':''}>${a.name}</option>`).join('');
    const faturaOptsHtml = `<option value="all">Todas faturas</option>` + faturaDates.map(d=>{
      const dObj = new Date(d+'T00:00:00');
      return `<option value="${d}" ${analysisFilter.faturaDate===d?'selected':''}>${dObj.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}</option>`;
    }).join('');

    // Transações que batem com os filtros, dentro do mês selecionado.
    const filteredTx = txForMonth(currentYear, currentMonth).filter(t=>{
      if(t.type!=='expense') return false;
      const cat = catById(t.categoryId);
      if(analysisFilter.groupId!=='all' && (!cat || cat.groupId!==analysisFilter.groupId)) return false;
      if(analysisFilter.categoryId!=='all' && t.categoryId!==analysisFilter.categoryId) return false;
      if(analysisFilter.subcategoryId!=='all' && t.subcategoryId!==analysisFilter.subcategoryId) return false;
      if(analysisFilter.accountId!=='all' && t.accountId!==analysisFilter.accountId) return false;
      if(analysisFilter.faturaDate!=='all' && t.date!==analysisFilter.faturaDate) return false;
      return true;
    });

    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    const totals = new Array(daysInMonth+1).fill(0);
    filteredTx.forEach(t=>{
      const day = new Date(t.date+'T00:00:00').getDate();
      totals[day] = (totals[day]||0) + Math.abs(t.amount);
    });
    const totalSpent = filteredTx.reduce((s,t)=>s+Math.abs(t.amount),0);
    const daysWithSpend = totals.slice(1, daysInMonth+1).filter(v=>v>0).length;
    const avgPerActiveDay = daysWithSpend>0 ? totalSpent/daysWithSpend : 0;
    let peakDay = 0, peakVal = 0;
    for(let d=1; d<=daysInMonth; d++){ if(totals[d]>peakVal){ peakVal = totals[d]; peakDay = d; } }

    const chartColor = analysisFilter.categoryId!=='all' ? (catById(analysisFilter.categoryId)||{}).color
      : analysisFilter.groupId!=='all' ? (groupById(analysisFilter.groupId)||{}).color
      : 'var(--brass)';
    const chartSvg = dailyChartSvg(totals, daysInMonth, chartColor||'var(--brass)');

    const dayRows = [];
    for(let d=1; d<=daysInMonth; d++){
      if(totals[d]>0) dayRows.push({day:d, val:totals[d]});
    }
    const maxDayVal = Math.max(1, ...dayRows.map(r=>r.val));
    const txByDay = {};
    filteredTx.forEach(t=>{
      const day = new Date(t.date+'T00:00:00').getDate();
      (txByDay[day] = txByDay[day]||[]).push(t);
    });
    const dayRowsHtml = dayRows.map(r=>{
      const dateObj = new Date(currentYear, currentMonth, r.day);
      const weekday = dateObj.toLocaleDateString('pt-BR', {weekday:'short'});
      const items = (txByDay[r.day]||[]).sort((a,b)=>Math.abs(b.amount)-Math.abs(a.amount));
      const itemsHtml = items.map(t=>{
        const cat = catById(t.categoryId);
        const sub = cat && t.subcategoryId ? (cat.subcategories||[]).find(s=>s.id===t.subcategoryId) : null;
        return `<div class="day-tx-item">
          <span class="day-tx-desc">${escapeHtml(t.desc)}${sub?` <span class="day-tx-sub">— ${escapeHtml(sub.name)}</span>`:''}</span>
          <span class="day-tx-amount mono">${fmt(Math.abs(t.amount))}</span>
        </div>`;
      }).join('');
      return `<div class="bar-row">
        <div class="bar-head"><span class="name">Dia ${String(r.day).padStart(2,'0')}/${String(currentMonth+1).padStart(2,'0')} <span style="color:var(--slate-mute); font-weight:400;">(${weekday})</span></span><span class="mono">${fmt(r.val)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(r.val/maxDayVal*100).toFixed(0)}%; background:${chartColor||'var(--brass)'}"></div></div>
        <div class="day-tx-list">${itemsHtml}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma despesa encontrada com esses filtros neste mês.</div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Análise</h1><div class="subtitle">Acompanhamento diário de gastos</div></div>
        ${monthSwitchHtml()}
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Filtros</div>
        <div class="card-sub">Escolha grupo, categoria, subcategoria, conta e/ou fatura — os filtros se combinam</div>
        <div class="toolbar-left" style="margin-top:4px;">
          <select class="filter" id="an-group">${groupOptsHtml}</select>
          <select class="filter" id="an-cat">${catOptsHtml}</select>
          <select class="filter" id="an-sub">${subOptsHtml}</select>
          <select class="filter" id="an-acc">${accOptsHtml}</select>
          ${isCardAccount ? `<select class="filter" id="an-fatura">${faturaOptsHtml}</select>` : ''}
        </div>
      </div>
      <div class="grid-4">
        <div class="card stat-card">
          <div class="stat-label">Total no período</div>
          <div class="stat-value neg mono">${fmt(totalSpent)}</div>
          <div class="stat-note">${filteredTx.length} lançamento(s)</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Média nos dias com gasto</div>
          <div class="stat-value mono">${fmt(avgPerActiveDay)}</div>
          <div class="stat-note">${daysWithSpend} de ${daysInMonth} dias</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Dia de maior gasto</div>
          <div class="stat-value mono" style="color:var(--rust);">${peakVal>0?fmt(peakVal):'—'}</div>
          <div class="stat-note">${peakVal>0?`Dia ${String(peakDay).padStart(2,'0')}/${String(currentMonth+1).padStart(2,'0')}`:'Sem dados'}</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Média do mês inteiro</div>
          <div class="stat-value mono">${fmt(totalSpent/daysInMonth)}</div>
          <div class="stat-note">Considerando todos os ${daysInMonth} dias</div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Calendário — ${MONTHS[currentMonth]}</div>
        <div class="card-sub">${analysisFilter.subcategoryId!=='all' ? escapeHtml((availableSubs.find(s=>s.id===analysisFilter.subcategoryId)||{}).name||'') : analysisFilter.categoryId!=='all' ? escapeHtml((catById(analysisFilter.categoryId)||{}).name||'') : analysisFilter.groupId!=='all' ? escapeHtml((groupById(analysisFilter.groupId)||{}).name||'') : 'Todas as despesas'} · dias em destaque gastaram acima da média</div>
        ${renderMonthCalendar(totals, daysInMonth, currentYear, currentMonth, avgPerActiveDay)}
        <div class="cal-avg-row">
          <span>Média diária (nos dias com gasto, com os filtros acima)</span>
          <span class="mono">${fmt(avgPerActiveDay)}</span>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">Gasto por dia — ${MONTHS[currentMonth]}</div>
        <div class="card-sub">${analysisFilter.subcategoryId!=='all' ? escapeHtml((availableSubs.find(s=>s.id===analysisFilter.subcategoryId)||{}).name||'') : analysisFilter.categoryId!=='all' ? escapeHtml((catById(analysisFilter.categoryId)||{}).name||'') : analysisFilter.groupId!=='all' ? escapeHtml((groupById(analysisFilter.groupId)||{}).name||'') : 'Todas as despesas'}</div>
        ${chartSvg}
      </div>
      <div class="card">
        <div class="card-title">Detalhe por dia</div>
        <div class="card-sub">Só os dias com gasto registrado</div>
        <div class="ledger">${dayRowsHtml}</div>
      </div>
    `;
    bindMonthSwitch();
    document.getElementById('an-group').onchange = (e)=>{ analysisFilter.groupId = e.target.value; analysisFilter.categoryId='all'; analysisFilter.subcategoryId='all'; renderAnalysis(); };

        currentYear = d.getFullYear();
        currentMonth = d.getMonth();
      }
      renderAnalysis();
    };
  }

  // Monta a grade do calendário do mês, com o valor gasto em cada dia (já
  // considerando os filtros ativos) e um destaque nos dias acima da média.
  function renderMonthCalendar(totals, daysInMonth, year, month, avgValue){
    const weekDayLabels = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const firstDow = new Date(year, month, 1).getDay();
    const maxVal = Math.max(1, ...totals.slice(1, daysInMonth+1));
    const todayStr = new Date().toISOString().slice(0,10);
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="cal-cell cal-empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const val = totals[d]||0;
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr===todayStr;
      const aboveAvg = avgValue>0 && val>avgValue;
      const intensity = val>0 ? Math.min(1, val/maxVal) : 0;
      const style = val>0 ? `--cal-alpha:${(0.06+intensity*0.22).toFixed(2)};` : '';
      cells += `<div class="cal-cell ${val>0?'has-spend':''} ${isToday?'is-today':''} ${aboveAvg?'above-avg':''}" style="${style}">
        <span class="cal-day-num">${d}</span>
        ${val>0 ? `<span class="cal-day-val mono">${val.toLocaleString('pt-BR',{maximumFractionDigits:0})}</span>` : ''}
      </div>`;
    }
    const totalCells = firstDow + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let i=0;i<trailing;i++) cells += `<div class="cal-cell cal-empty"></div>`;

    return `
      <div class="cal-weekdays">${weekDayLabels.map(w=>`<div>${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    `;
  }

  function dailyChartSvg(totals, daysInMonth, color){
    const max = Math.max(1, ...totals.slice(1, daysInMonth+1));
    const w = 700, h = 232, padL = 8, padR = 8, padT = 54, padB = 22;
    const chartW = w-padL-padR, chartH = h-padT-padB;
    const gap = chartW/daysInMonth;
    const barW = Math.max(2, gap*0.62);
    let bars = '';
    for(let d=1; d<=daysInMonth; d++){
      const val = totals[d]||0;
      const barH = val>0 ? Math.max(2, (val/max)*chartH) : 0;
      const x = padL + (d-1)*gap + (gap-barW)/2;
      const y = padT + chartH - barH;
      bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="2" fill="${val>0?color:'var(--line)'}"></rect>`;
      if(val>0){
        const cx = x+barW/2, ly = y-5;
        const label = val.toLocaleString('pt-BR',{maximumFractionDigits:0});
        bars += `<text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="8.5" fill="var(--slate-mute)" text-anchor="start" font-family="IBM Plex Mono, monospace" transform="rotate(-90 ${cx.toFixed(1)} ${ly.toFixed(1)})">${label}</text>`;
      }
      if(d===1 || d%5===0 || d===daysInMonth){
        bars += `<text x="${(x+barW/2).toFixed(1)}" y="${h-6}" font-size="9.5" fill="var(--slate-mute)" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d}</text>`;
      }
    }
    bars += `<line x1="${padL}" y1="${padT+chartH}" x2="${w-padR}" y2="${padT+chartH}" stroke="var(--line)" stroke-width="1"></line>`;
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:230px; display:block;">${bars}</svg>`;
  }

  // ---------- BUDGETS ----------
  function renderBudgets(){
    const monthTx = txForMonth(currentYear, currentMonth).filter(t=>t.type==='expense');
    const spentByCat = {};
    monthTx.forEach(t=>{ spentByCat[t.categoryId] = (spentByCat[t.categoryId]||0) + Math.abs(t.amount); });

    const expenseCats = state.categories.filter(c=>c.type==='expense');
    const rows = expenseCats.map(c=>{
      const limit = state.budgets[c.id] || 0;
      const spent = spentByCat[c.id] || 0;
      const pct = limit>0 ? Math.min(100, (spent/limit*100)) : 0;
      const over = limit>0 && spent>limit;
      const barColor = over ? 'var(--rust)' : (pct>75 ? 'var(--amber)' : 'var(--forest)');
      return `<div class="budget-item">
        <div class="budget-top">
          <div class="name"><span class="swatch" style="width:14px;height:14px;background:${c.color}"></span>${c.name}</div>
          <div class="figures mono">
            <span style="color:${over?'var(--rust)':'var(--ink)'}">${fmt(spent)}</span> / 
            <input type="text" inputmode="decimal" class="budget-input" data-cat="${c.id}" value="${limit || ''}" placeholder="0,00">
          </div>
        </div>
        <div class="budget-track"><div class="budget-fill" style="width:${pct}%; background:${barColor}"></div></div>
        ${over ? `<div style="color:var(--rust); font-size:11.5px; margin-top:5px;">Estourou o orçamento em ${fmt(spent-limit)}</div>` : ''}
      </div>`;
    }).join('');

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Orçamentos</h1><div class="subtitle">Defina limites mensais por categoria</div></div>
        ${monthSwitchHtml()}
      </div>
      <div class="card">
        <div class="card-title">Limites de ${MONTHS[currentMonth]}</div>
        <div class="card-sub">Clique no valor para editar o limite mensal de cada categoria</div>
        ${rows}
      </div>

      inp.onchange = async (e)=>{
        const val = parseFloat(e.target.value.replace(',','.')) || 0;
        state.budgets[e.target.dataset.cat] = val;
        await saveState(); renderBudgets();
      };
    });
  }

      btn.onclick = ()=> openCategoryModal(null, btn.dataset.group);
    });
    mainEl.querySelectorAll('.del-group').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.dataset.id;
        if(state.categories.some(c=>c.groupId===id)){
          alert('Não é possível excluir: existem categorias dentro deste grupo.');
          return;
        }
        state.groups = state.groups.filter(g=>g.id!==id);
        await saveState(); renderCategories();

    mainEl.querySelectorAll('.del-cat').forEach(btn=>{
      btn.onclick = async ()=>{

        if(state.transactions.some(t=>t.categoryId===id) || state.bills.some(b=>b.categoryId===id)){
          alert('Não é possível excluir: existem lançamentos vinculados a esta categoria.');

        await saveState(); renderCategories();

        cat.subcategories = (cat.subcategories||[]).filter(s=>s.id!==subId);
        await saveState(); renderCategories();
      };
    });
  }

      const key = document.getElementById('sb-key').value.trim();
      if(!url || !key){ alert('Preencha a URL e a chave.'); return; }
      state.settings.supabaseUrl = sbOrigin(url);
      state.settings.supabaseKey = key;
      await saveState();
      closeModal();
      if(!authSession){
        // Sem sessão válida: mostra a tela de login agora mesmo, sem precisar recarregar a página.
        renderLoginScreen();
      } else {
        alert('Conectado! Os próximos lançamentos vão sincronizar automaticamente com o Supabase.');
      }
    };
  }

  function openTxModal(existing){
    const isEdit = !!existing;
    const type = existing ? existing.type : 'expense';
    // Se a transação editada é uma despesa lançada numa conta do tipo Crédito,
    // trata como "Cartão de crédito" na hora de abrir o formulário.
    const existingAcc = existing ? accById(existing.accountId) : null;
    const isExistingCreditCard = !!(existing && existing.type==='expense' && existingAcc && existingAcc.type==='Crédito');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const catOpts = (t) => state.categories.filter(c=>c.type===t).map(c=>`<option value="${c.id}" ${existing&&existing.categoryId===c.id?'selected':''}>${c.icon?c.icon+' ':''}${c.name}</option>`).join('');
    const accOpts = (selectedId, mode) => state.accounts.filter(a=>{
      if(mode==='creditOnly') return a.type==='Crédito';
      if(mode==='excludeCredit') return a.type!=='Crédito';
      return true;
    }).map(a=>`<option value="${a.id}" ${selectedId===a.id?'selected':''}>${a.name}</option>`).join('');
    // Lista global de subcategorias (de todas as categorias do tipo), pra poder
    // escolher a subcategoria primeiro e puxar categoria/grupo automaticamente.
    const subOptsGlobal = (t, selectedId) => {
      const opts = [];
      state.categories.filter(c=>c.type===t).forEach(c=>{
        (c.subcategories||[]).forEach(s=>{
          opts.push(`<option value="${s.id}" ${selectedId===s.id?'selected':''}>${escapeHtml(s.name)} — ${escapeHtml(c.name)}</option>`);
        });
      });
      return '<option value="">Nenhuma (escolher categoria abaixo)</option>' + opts.join('');
    };

    const seriesNote = isEdit && existing.recurrenceGroupId
      ? `<div class="fab-hint" style="margin-top:-6px;">Parte de um lançamento recorrente${existing.installmentTotal?` (${existing.installmentIndex}/${existing.installmentTotal})`:''}.</div>`
      : '';

    const recurrenceBlock = !isEdit ? `
      <div class="field">
        <label>Recorrência</label>
        <select id="f-recurrence">
          <option value="none">Única</option>
          <option value="installment">Parcelada</option>
          <option value="fixed">Fixa (todo mês)</option>
          <option value="period">Por tempo determinado</option>
        </select>
      </div>
      <div id="f-recurrence-extra"></div>
    ` : '';

    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar transação':'Nova transação'}</h2>
        <div class="type-toggle">
          <button type="button" data-type="expense" class="${type==='expense'&&!isExistingCreditCard?'active expense':''}">Despesa</button>
          <button type="button" data-type="income" class="${type==='income'?'active income':''}">Receita</button>
          <button type="button" data-type="transfer" class="${type==='transfer'?'active transfer':''}">Transferência</button>
          <button type="button" data-type="creditcard" class="${isExistingCreditCard?'active creditcard':''}">Cartão de crédito</button>
        </div>
        ${!isEdit ? `<div id="f-quickpicks" class="quickpicks"></div>` : ''}
        <div class="field" style="margin-top:16px;">
          <label>Descrição</label>
          <input type="text" id="f-desc" value="${existing?escapeHtml(existing.desc||''):''}" placeholder="${type==='transfer'?'Ex: Pagamento da fatura':'Ex: Supermercado'}" autocomplete="off" list="f-desc-suggestions" autofocus>
          <datalist id="f-desc-suggestions">${recentDescriptions().map(d=>`<option value="${escapeHtml(d)}">`).join('')}</datalist>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Valor (R$)${!isEdit?' <span id="f-amount-hint" style="text-transform:none; font-weight:400;"></span>':''}</label>
            <input type="text" inputmode="decimal" id="f-amount" value="${existing?Math.abs(existing.amount).toFixed(2).replace('.',','):''}" placeholder="0,00">
          </div>
          <div class="field">
            <label id="f-date-label">Data</label>
            <div id="f-date-field-inner">
              <div style="display:flex; gap:6px;">
                <input type="date" id="f-date" style="flex:1;" value="${existing?existing.date:new Date(currentYear,currentMonth,Math.min(new Date().getDate(),28)).toISOString().slice(0,10)}">
                <button type="button" id="f-date-today" class="btn btn-ghost btn-small" style="flex-shrink:0;">Hoje</button>
              </div>
            </div>
          </div>
        </div>
        <div id="f-normal-fields" style="display:${type==='transfer'?'none':'block'}">
          <div class="field">
            <label>Grupo</label>
            <div id="f-group-display" class="group-display"></div>
          </div>
          <div class="field">
            <label>Categoria</label>
            <select id="f-cat">${catOpts(type==='transfer'?'expense':type)}</select>
          </div>
          <div class="field">
            <label>Subcategoria</label>
            <select id="f-subcat">${subOptsGlobal(type==='transfer'?'expense':type, existing?existing.subcategoryId:null)}</select>
          </div>
          <div class="field">
            <label id="f-acc-label">Conta</label>
            <select id="f-acc">${accOpts(existing?existing.accountId:null, isExistingCreditCard?'creditOnly':'excludeCredit')}</select>
          </div>
          ${seriesNote}
          ${recurrenceBlock}
        </div>
        <div id="f-transfer-fields" style="display:${type==='transfer'?'block':'none'}">
          <div class="field-row">
            <div class="field">
              <label>Da conta</label>
              <select id="f-from-acc">${accOpts(existing?existing.fromAccountId:null)}</select>
            </div>
            <div class="field">
              <label>Para a conta</label>
              <select id="f-to-acc">${accOpts(existing?existing.toAccountId:null)}</select>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          ${isEdit && existing.recurrenceGroupId ? '<button class="btn btn-danger" id="f-delete-series">Excluir esta e as futuras</button>' : ''}
          ${isEdit?'<button class="btn btn-danger" id="f-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="f-cancel">Cancelar</button>
          <button class="btn btn-primary" id="f-save">Salvar</button>
        </div>
      </div>
    `;
    root.appendChild(overlay);
    const descInput = document.getElementById('f-desc');
    if(descInput) setTimeout(()=> descInput.focus(), 50);
    let selType = isExistingCreditCard ? 'creditcard' : type;

    // Atalhos rápidos: as últimas combinações usadas (descrição + categoria +
    // subcategoria + conta) para o tipo atual, prontas pra preencher com 1 toque.
    function renderQuickPicks(){
      const wrap = document.getElementById('f-quickpicks');
      if(!wrap) return;
      if(selType==='transfer'){ wrap.innerHTML=''; return; }
      const wantAccType = selType==='creditcard' ? 'Crédito' : null;
      const wantTxType = selType==='income' ? 'income' : 'expense';
      const seen = new Set();
      const picks = [];
      [...state.transactions].sort((a,b)=> b.date.localeCompare(a.date)).forEach(t=>{
        if(picks.length>=6 || t.type!==wantTxType || !t.categoryId) return;
        const acc = accById(t.accountId);
        if(wantAccType && (!acc || acc.type!==wantAccType)) return;
        const key = t.categoryId+'|'+(t.subcategoryId||'')+'|'+t.desc;
        if(seen.has(key)) return;
        seen.add(key);
        picks.push(t);
      });
      if(picks.length===0){ wrap.innerHTML=''; return; }
      wrap.innerHTML = picks.map((t,i)=>{
        const c = catById(t.categoryId);
        return `<button type="button" class="quickpick-chip" data-idx="${i}">${c&&c.icon?c.icon+' ':''}${escapeHtml(t.desc)}</button>`;
      }).join('');
      wrap.querySelectorAll('.quickpick-chip').forEach(btn=>{
        btn.onclick = ()=>{
          const t = picks[Number(btn.dataset.idx)];
          document.getElementById('f-desc').value = t.desc;
          document.getElementById('f-cat').value = t.categoryId;
          document.getElementById('f-subcat').value = t.subcategoryId || '';
          if(document.getElementById('f-acc').querySelector(`option[value="${t.accountId}"]`)){
            document.getElementById('f-acc').value = t.accountId;
          }
          updateGroupDisplay();
          document.getElementById('f-amount').focus();
        };
      });
    }

    function bindDateTodayButton(){
      const btn = document.getElementById('f-date-today');
      if(btn) btn.onclick = ()=>{ document.getElementById('f-date').value = new Date().toISOString().slice(0,10); };
    }
    bindDateTodayButton();
    overlay.addEventListener('keydown', (e)=>{
      if(e.key==='Enter' && !['TEXTAREA','SELECT'].includes(e.target.tagName)){
        e.preventDefault();
        const saveBtn = document.getElementById('f-save');
        if(saveBtn) saveBtn.click();
      }
    });
    setTimeout(()=>{ const d = document.getElementById('f-desc'); if(d) d.focus(); }, 50);

    // Faturas: quando é compra no cartão de crédito, a data vira "em qual
    // fatura isso cai" em vez da data literal da compra. A próxima fatura
    // (a mais próxima que ainda não fechou) fica sempre pré-selecionada.
    const MONTHS_SHORT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    // Sempre oferece: fatura do mês anterior, a próxima (padrão) e mais algumas seguintes.
    function invoiceDates(account, count){
      const day = (account && account.dueDay) || 1;
      const today = new Date(); today.setHours(0,0,0,0);
      let next = new Date(today.getFullYear(), today.getMonth(), day);
      if(next < today) next = new Date(next.getFullYear(), next.getMonth()+1, day);
      const start = new Date(next.getFullYear(), next.getMonth()-1, day); // um mês antes da "próxima"
      const dates = [];
      for(let i=0;i<count;i++) dates.push(new Date(start.getFullYear(), start.getMonth()+i, day));
      return dates; // dates[1] é sempre a "próxima fatura" (padrão)
    }
    function faturaLabel(d){
      return `Fatura de ${MONTHS_SHORT[d.getMonth()]} — vence ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    function refreshDateOrFaturaField(){
      const isCreditCard = selType==='creditcard';
      const label = document.getElementById('f-date-label');
      const inner = document.getElementById('f-date-field-inner');
      if(isCreditCard){
        const accSel = document.getElementById('f-acc');
        const acc = accSel ? accById(accSel.value) : null;
        const dates = invoiceDates(acc, 5);
        const existingDate = (existing && existing.type==='expense') ? existing.date : null;
        let matchIdx = existingDate ? dates.findIndex(d=> d.toISOString().slice(0,10)===existingDate) : -1;
        if(matchIdx===-1) matchIdx = 1; // padrão: a próxima fatura (índice 1, já que o índice 0 é a do mês anterior)
        label.textContent = 'Fatura';
        inner.innerHTML = `<select id="f-fatura">${dates.map((d,i)=>`<option value="${d.toISOString().slice(0,10)}" ${i===matchIdx?'selected':''}>${faturaLabel(d)}</option>`).join('')}</select>`;
      } else {
        label.textContent = 'Data';
        inner.innerHTML = `<div style="display:flex; gap:6px;">
          <input type="date" id="f-date" style="flex:1;" value="${existing?existing.date:new Date(currentYear,currentMonth,Math.min(new Date().getDate(),28)).toISOString().slice(0,10)}">
          <button type="button" id="f-date-today" class="btn btn-ghost btn-small" style="flex-shrink:0;">Hoje</button>
        </div>`;
        bindDateTodayButton();
      }
    }

    function updateGroupDisplay(){
      const catId = document.getElementById('f-cat').value;
      const cat = catById(catId);
      const group = cat ? groupById(cat.groupId) : null;
      const el = document.getElementById('f-group-display');
      el.innerHTML = group ? `<span class="cat-icon" style="background:${group.color}"></span>${escapeHtml(group.name)}` : '—';
    }
    function subcatParentCategory(subId){
      return state.categories.find(c=> (c.subcategories||[]).some(s=>s.id===subId));
    }
    // Depois que a categoria fica definida (de um jeito ou de outro), a lista de
    // subcategorias passa a mostrar só as daquela categoria — nada de outras categorias.
    function rebuildSubcatOptionsForCategory(catId, keepSelectedId){
      const subSel = document.getElementById('f-subcat');
      const cat = catById(catId);
      const subs = (cat && cat.subcategories) || [];
      subSel.innerHTML = '<option value="">Nenhuma</option>' + subs.map(s=>`<option value="${s.id}" ${keepSelectedId===s.id?'selected':''}>${escapeHtml(s.name)}</option>`).join('');
    }
    // Escolher a subcategoria primeiro puxa a categoria (e o grupo) automaticamente,
    // e a partir daí a lista de subcategorias já fica restrita a essa categoria.
    function onSubcatChange(){
      const subId = document.getElementById('f-subcat').value;
      if(subId){
        const parent = subcatParentCategory(subId);
        if(parent){
          document.getElementById('f-cat').value = parent.id;
          rebuildSubcatOptionsForCategory(parent.id, subId);
        }
      }
      updateGroupDisplay();
    }
    // Escolher a categoria direto também atualiza o grupo, e filtra a lista de
    // subcategorias pra mostrar só as que pertencem a essa categoria.
    function onCatChange(){
      const catId = document.getElementById('f-cat').value;
      rebuildSubcatOptionsForCategory(catId, null);
      updateGroupDisplay();
    }
    function refreshFieldsForType(){
      const isCreditCard = selType==='creditcard';
      const t = (selType==='transfer' || isCreditCard) ? 'expense' : selType;
      document.getElementById('f-subcat').innerHTML = subOptsGlobal(t, existing?existing.subcategoryId:null);
      document.getElementById('f-cat').innerHTML = catOpts(t);
      document.getElementById('f-acc').innerHTML = accOpts(existing?existing.accountId:null, isCreditCard?'creditOnly':'excludeCredit');
      document.getElementById('f-acc-label').textContent = isCreditCard ? 'Cartão de crédito' : 'Conta';
      refreshDateOrFaturaField();
      updateGroupDisplay();
    }
    refreshDateOrFaturaField();
    updateGroupDisplay();
    renderQuickPicks();
    // Editando um lançamento existente: já mostra a lista de subcategorias
    // restrita à categoria dele, em vez da lista global de todas as categorias.
    if(isEdit && existing.categoryId && selType!=='transfer'){
      rebuildSubcatOptionsForCategory(existing.categoryId, existing.subcategoryId);
    }
    overlay.querySelector('#f-subcat') && overlay.querySelector('#f-subcat').addEventListener('change', onSubcatChange);
    overlay.querySelector('#f-cat') && overlay.querySelector('#f-cat').addEventListener('change', onCatChange);
    overlay.querySelector('#f-acc') && overlay.querySelector('#f-acc').addEventListener('change', ()=>{ if(selType==='creditcard') refreshDateOrFaturaField(); });

    function refreshRecurrenceExtra(){
      const sel = document.getElementById('f-recurrence');
      const hint = document.getElementById('f-amount-hint');
      if(!sel) return;
      const mode = sel.value;
      const extra = document.getElementById('f-recurrence-extra');
      if(mode==='installment'){
        extra.innerHTML = `<div class="field"><label>Número de parcelas</label><input type="text" inputmode="numeric" id="f-installments" value="2" placeholder="Ex: 3"></div>
          <div class="fab-hint">O valor acima é o total da compra; vamos dividir entre as parcelas e lançar uma por mês.</div>`;
        if(hint) hint.textContent = '(total da compra)';
      } else if(mode==='period'){
        extra.innerHTML = `<div class="field"><label>Repetir por quantos meses</label><input type="text" inputmode="numeric" id="f-months" value="3" placeholder="Ex: 6"></div>
          <div class="fab-hint">O mesmo valor será lançado todo mês, pelo número de meses informado.</div>`;
        if(hint) hint.textContent = '(valor mensal)';
      } else if(mode==='fixed'){
        extra.innerHTML = `<div class="fab-hint">Vamos repetir esse valor todo mês automaticamente, sem data para acabar.</div>`;
        if(hint) hint.textContent = '(valor mensal)';
      } else {
        extra.innerHTML = '';
        if(hint) hint.textContent = '';
      }
    }
    refreshRecurrenceExtra();
    const recSel = document.getElementById('f-recurrence');
    if(recSel) recSel.addEventListener('change', refreshRecurrenceExtra);

    overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
      btn.onclick = ()=>{
        selType = btn.dataset.type;
        overlay.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active','expense','income','transfer','creditcard'));
        btn.classList.add('active', selType);
        const isTransfer = selType==='transfer';
        document.getElementById('f-normal-fields').style.display = isTransfer ? 'none' : 'block';
        document.getElementById('f-transfer-fields').style.display = isTransfer ? 'block' : 'none';
        if(!isTransfer) refreshFieldsForType();
        renderQuickPicks();
      };
    });
    overlay.querySelector('#f-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#f-delete').onclick = async ()=>{
        state.transactions = state.transactions.filter(t=>t.id!==existing.id);
        await saveState(); closeModal(); render();
      };
      if(existing.recurrenceGroupId){
        overlay.querySelector('#f-delete-series').onclick = async ()=>{
          state.transactions = state.transactions.filter(t=> !(t.recurrenceGroupId===existing.recurrenceGroupId && t.date>=existing.date));
          await saveState(); closeModal(); render();
        };
      }
    }
    overlay.querySelector('#f-save').onclick = async ()=>{
      const desc = document.getElementById('f-desc').value.trim();
      const rawAmount = document.getElementById('f-amount').value.replace(',','.');
      const amount = parseFloat(rawAmount);
      const faturaEl = document.getElementById('f-fatura');
      const date = faturaEl ? faturaEl.value : document.getElementById('f-date').value;

      if(isNaN(amount) || amount<=0 || !date){
        alert('Preencha valor e data.');
        return;
      }

      if(selType==='transfer'){
        const fromAccountId = document.getElementById('f-from-acc').value;
        const toAccountId = document.getElementById('f-to-acc').value;
        if(!fromAccountId || !toAccountId || fromAccountId===toAccountId){
          alert('Escolha duas contas diferentes para a transferência.');
          return;
        }
        const finalDesc = desc || 'Transferência';
        if(isEdit){
          Object.assign(existing, {desc: finalDesc, amount: Math.abs(amount), date, type: 'transfer', fromAccountId, toAccountId, categoryId: undefined, accountId: undefined});
        } else {
          state.transactions.push({id: uid(), desc: finalDesc, amount: Math.abs(amount), date, type: 'transfer', fromAccountId, toAccountId});
        }
      } else {
        const categoryId = document.getElementById('f-cat').value;
        const subcategoryId = document.getElementById('f-subcat') ? (document.getElementById('f-subcat').value || undefined) : undefined;
        const accountId = document.getElementById('f-acc').value;
        if(!desc || !accountId){
          alert('Preencha descrição, valor, data e conta.');
          return;
        }
        const storedType = selType==='creditcard' ? 'expense' : selType;
        const signedAmount = selType==='income' ? Math.abs(amount) : -Math.abs(amount);
        const recurrenceMode = document.getElementById('f-recurrence') ? document.getElementById('f-recurrence').value : 'none';
        const today = new Date().toISOString().slice(0,10);
        // Despesa comum: "pago" segue a data (passado/hoje = pago, futuro = pendente).
        // Despesa de cartão: sempre nasce "pendente" — só vira "pago" quando a fatura é paga.
        const tracksPaid = storedType==='expense';
        const paidFor = (d) => {
          if(!tracksPaid) return undefined;
          if(selType==='creditcard') return false;
          return d<=today;
        };

        if(isEdit){
          Object.assign(existing, {desc, amount: signedAmount, date, type: storedType, categoryId, subcategoryId, accountId, fromAccountId: undefined, toAccountId: undefined});
        } else if(recurrenceMode==='installment'){
          const n = clampInt(document.getElementById('f-installments').value, 2, 48);
          const per = Math.round((amount/n)*100)/100;
          const groupId = uid();
          let allocated = 0;
          for(let i=0;i<n;i++){
            const instAmt = (i===n-1) ? Math.round((amount-allocated)*100)/100 : per;
            allocated += per;
            const signed = selType==='income' ? Math.abs(instAmt) : -Math.abs(instAmt);
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc: `${desc} (${i+1}/${n})`, amount: signed, date: d,
              type: storedType, categoryId, subcategoryId, accountId, paid: paidFor(d),
              recurrenceType:'installment', recurrenceGroupId: groupId, installmentIndex:i+1, installmentTotal:n
            });
          }
        } else if(recurrenceMode==='period'){
          const n = clampInt(document.getElementById('f-months').value, 1, 60);
          const groupId = uid();
          for(let i=0;i<n;i++){
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc, amount: signedAmount, date: d,
              type: storedType, categoryId, subcategoryId, accountId, paid: paidFor(d),
              recurrenceType:'period', recurrenceGroupId: groupId, installmentIndex:i+1, installmentTotal:n
            });
          }
        } else if(recurrenceMode==='fixed'){
          const groupId = uid();
          for(let i=0;i<24;i++){
            const d = addMonthsToDateStr(date,i);
            state.transactions.push({
              id: uid(), desc, amount: signedAmount, date: d,
              type: storedType, categoryId, subcategoryId, accountId, paid: paidFor(d),
              recurrenceType:'fixed', recurrenceGroupId: groupId
            });
          }
        } else {
          state.transactions.push({id: uid(), desc, amount: signedAmount, date, type: storedType, categoryId, subcategoryId, accountId, paid: paidFor(date)});
        }
      }
      await saveState();
      closeModal();
      render();
    };
  }

  function openBillModal(existing){
    const isEdit = !!existing;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    const catOpts = state.categories.filter(c=>c.type==='expense').map(c=>`<option value="${c.id}" ${existing&&existing.categoryId===c.id?'selected':''}>${c.name}</option>`).join('');
    overlay.innerHTML = `
      <div class="modal">
        <h2>${isEdit?'Editar conta a pagar':'Nova conta a pagar'}</h2>
        <div class="field"><label>Descrição</label><input type="text" id="b-desc" value="${isEdit?escapeHtml(existing.desc):''}" placeholder="Ex: Internet"></div>
        <div class="field-row">
          <div class="field"><label>Valor (R$)</label><input type="text" inputmode="decimal" id="b-amount" value="${isEdit?existing.amount.toFixed(2).replace('.',','):''}" placeholder="0,00"></div>
          <div class="field"><label>Vencimento</label><input type="date" id="b-due" value="${isEdit?existing.dueDate:''}"></div>
        </div>
        <div class="field"><label>Categoria</label><select id="b-cat">${catOpts}</select></div>
        <div class="modal-actions">
          ${isEdit?'<button class="btn btn-danger" id="b-delete">Excluir</button>':''}
          <button class="btn btn-ghost" id="b-cancel">Cancelar</button>
          <button class="btn btn-primary" id="b-save">Salvar</button>
        </div>
      </div>`;
    root.appendChild(overlay);
    overlay.querySelector('#b-cancel').onclick = closeModal;
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
    if(isEdit){
      overlay.querySelector('#b-delete').onclick = async ()=>{
        state.bills = state.bills.filter(b=>b.id!==existing.id);
        await saveState(); closeModal(); renderBills();

  // Lista as despesas de um cartão (todas, só pagas, ou só pendentes),
  // reaproveitando o mesmo visual de linha usado na aba Transações.
  function openCardTransactionsModal(account){
    let filter = 'all';
    let modalYear = currentYear, modalMonth = currentMonth;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    root.appendChild(overlay);
    overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

    function draw(){
      const list = state.transactions
        .filter(t=>t.type==='expense' && t.accountId===account.id)
        .filter(t=>{ const d = new Date(t.date+'T00:00:00'); return d.getFullYear()===modalYear && d.getMonth()===modalMonth; })
        .filter(t=> filter==='all' ? true : filter==='paid' ? !!t.paid : !t.paid)
        .sort((a,b)=> b.date.localeCompare(a.date));
      overlay.innerHTML = `
        <div class="modal" style="width:480px;">
          <h2>${escapeHtml(account.name)}</h2>
          <div class="month-switch" style="margin-bottom:14px; width:100%;">
            <button type="button" id="cardtx-prev">‹</button>
            <div class="label display" style="text-transform:capitalize;">${MONTHS[modalMonth]} ${modalYear}</div>
            <button type="button" id="cardtx-next">›</button>
          </div>
          <div class="type-toggle" style="margin-bottom:14px;">
            <button type="button" data-f="all" class="${filter==='all'?'active income':''}">Todas</button>
            <button type="button" data-f="paid" class="${filter==='paid'?'active income':''}">Pagas</button>
            <button type="button" data-f="pending" class="${filter==='pending'?'active expense':''}">Pendentes</button>
          </div>
          <div class="ledger" style="max-height:48vh; overflow-y:auto;">
            ${list.map(rowHtml).join('') || '<div class="empty-state">Nenhum lançamento aqui.</div>'}
          </div>
          <div class="modal-actions">
            <button class="btn btn-ghost" id="cardtx-close">Fechar</button>
          </div>
        </div>`;
      overlay.querySelector('#cardtx-prev').onclick = ()=>{ modalMonth--; if(modalMonth<0){modalMonth=11; modalYear--;} draw(); };
      overlay.querySelector('#cardtx-next').onclick = ()=>{ modalMonth++; if(modalMonth>11){modalMonth=0; modalYear++;} draw(); };
      overlay.querySelectorAll('.type-toggle button').forEach(btn=>{
        btn.onclick = ()=>{ filter = btn.dataset.f; draw(); };
      });
      overlay.querySelector('#cardtx-close').onclick = closeModal;
      overlay.querySelectorAll('.ledger-row').forEach(row=>{
        row.style.cursor = 'pointer';
        row.onclick = ()=>{
          const t = state.transactions.find(x=>x.id===row.dataset.id);
          closeModal();
          openTxModal(t);
        };
      });
    }
    draw();
  }

          <input type="text" inputmode="decimal" id="cx-amount" placeholder="0,00">

        btn.classList.add('active', dir==='in'?'income':'expense');
      };

    overlay.querySelector('#cx-save').onclick = async ()=>{
      const amount = parseFloat(document.getElementById('cx-amount').value.replace(',','.'));
      if(isNaN(amount) || amount<=0){ alert('Informe um valor válido.'); return; }
      if(dir==='in'){
        if(amount>available+0.001){ alert('Saldo insuficiente disponível na conta.'); return; }

  function renderLoginScreen(){
    root.classList.add('login-mode');
    const configured = !!(state.settings.supabaseUrl && state.settings.supabaseKey);
    if(!configured){
      mainEl.innerHTML = `
        <div class="login-card">
          <div class="login-title">Rumo</div>
          <div class="login-sub">Para ativar o login, primeiro conecte o app a um projeto Supabase.</div>
          <button class="btn btn-primary" id="loginConfigureBtn" style="width:100%; justify-content:center;">Configurar Supabase</button>
        </div>`;
      document.getElementById('loginConfigureBtn').onclick = ()=> openSupabaseModal();
      return;
    }
    let mode = 'login';
    function draw(){
      mainEl.innerHTML = `
        <div class="login-card">
          <div class="login-title">Rumo</div>
          <div class="login-sub">${mode==='login' ? 'Entre com seu e-mail e senha' : 'Crie sua conta'}</div>
          <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="voce@email.com"></div>
          <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
          <div class="login-error" id="login-error"></div>
          <button class="btn btn-primary" id="login-submit" style="width:100%; justify-content:center;">${mode==='login'?'Entrar':'Criar conta'}</button>
          <div class="login-switch">${mode==='login' ? 'Não tem conta? <a href="#" id="switchMode">Criar uma</a>' : 'Já tem conta? <a href="#" id="switchMode">Entrar</a>'}</div>
          <div class="login-switch" style="margin-top:8px;"><a href="#" id="loginSbSettings">Configurações do Supabase</a></div>
        </div>`;
      document.getElementById('loginSbSettings').onclick = (e)=>{ e.preventDefault(); openSupabaseModal(); };
      document.getElementById('switchMode').onclick = (e)=>{ e.preventDefault(); mode = mode==='login'?'signup':'login'; draw(); };
      const submit = async ()=>{
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-error');
        errEl.style.color = 'var(--rust)';
        errEl.textContent = '';
        if(!email || !pass){ errEl.textContent = 'Preencha e-mail e senha.'; return; }
        try{
          const data = mode==='login' ? await signInWithPassword(email, pass) : await signUpWithPassword(email, pass);
          if(!data.access_token){
            errEl.style.color = 'var(--forest)';
            errEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar antes de entrar.';
            mode = 'login'; draw();
            return;
          }
          setAuthSession(data);
          await afterLogin();
        } catch(e){
          errEl.textContent = e.message;
        }
      };
      document.getElementById('login-submit').onclick = submit;
      mainEl.querySelectorAll('#login-email, #login-pass').forEach(inp=>{
        inp.addEventListener('keydown', ev=>{ if(ev.key==='Enter') submit(); });
      });
    }
    draw();
  }

  async function afterLogin(){
    root.classList.remove('login-mode');
    mainEl.innerHTML = `<div style="padding:60px; text-align:center; color:var(--slate-mute);">Carregando seus dados...</div>`;
    try {
      const remote = await pullFromSupabase(state.settings.supabaseUrl, state.settings.supabaseKey);
      if(remote){
        remote.settings = remote.settings || {};
        remote.settings.supabaseUrl = state.settings.supabaseUrl;
        remote.settings.supabaseKey = state.settings.supabaseKey;
        state = remote;
      }
    } catch(e){ console.error('supabase pull failed', e); }
    updateAccountFoot();
    await finishBoot();
  }

  async function onLogoutClick(){
    await clearAuthSession();
    updateAccountFoot();
    closeMoreSheet();
    renderLoginScreen();
  }
  document.getElementById('logoutBtn').addEventListener('click', onLogoutClick);
  document.getElementById('logoutBtnMobile').addEventListener('click', onLogoutClick);

  // ---------- INIT ----------
  async function init(){
    mainEl.innerHTML = `<div style="padding:60px; text-align:center; color:var(--slate-mute);">Carregando seus dados...</div>`;
    await loadState();
    await loadAuthSession();
    const configured = !!(state.settings.supabaseUrl && state.settings.supabaseKey);

    if(configured && authSession && authSession.expires_at && Date.now() > authSession.expires_at - 30000){
      const ok = await refreshAuthSession();
      if(!ok) authSession = null;
    }

    if(configured && !authSession){
      renderLoginScreen();
      return;
    }
    if(configured && authSession){
      updateAccountFoot();
      await afterLogin();
      return;
    }
    // Supabase não configurado — segue localmente, sem exigir login.
    await finishBoot();
  }
  init();
})();
</script>
</body>
</html>
