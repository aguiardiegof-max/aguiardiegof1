<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0D12">
<title>Rumo — Finanças pessoais</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

html, body { margin: 0; padding: 0; background: #EEF0F3; overflow-x: hidden; }

#rumo-root, #rumo-root * { box-sizing: border-box; }
#rumo-root {
  /* Light mode (default) */
  --ink: #12151B;
  --sidebar-bg: #0B0D12;
  --sidebar-bg-2: #171B22;
  --sidebar-bg-3: #1C2740;
  --paper: #EEF0F3;
  --paper-card: #FFFFFF;
  --paper-2: #F5F6F8;
  --line: #E1E4E9;
  --line-strong: #C7CCD4;
  --brass: #16305C;
  --brass-light: #3E6FB8;
  --forest: #1E8A5B;
  --forest-deep: #146644;
  --rust: #C4392F;
  --amber: #C4842A;
  --slate: #171A20;
  --slate-mute: #6B7280;
  --shadow-card: 0 1px 2px rgba(15,17,20,0.04), 0 10px 24px rgba(15,17,20,0.05);
  --shadow-modal: 0 24px 70px rgba(6,8,12,0.35);

  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--slate);
  background: var(--paper);
  min-height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.45;
  transition: background .2s, color .2s;
}
#rumo-root[data-theme="dark"] {
  --ink: #F4F5F7;
  --paper: #0B0D12;
  --paper-card: #171A20;
  --paper-2: #1D2129;
  --line: #262B34;
  --line-strong: #3A4150;
  --brass: #3E6FB8;
  --brass-light: #6C9AE0;
  --forest: #34B37E;
  --forest-deep: #1F8A5B;
  --rust: #E0574A;
  --amber: #D99A45;
  --slate: #EEF0F3;
  --slate-mute: #8A93A3;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 10px 24px rgba(0,0,0,0.35);
  --shadow-modal: 0 24px 70px rgba(0,0,0,0.6);
}
#rumo-root .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
#rumo-root .display { font-family: 'Fraunces', serif; }

/* Scrollbar subtle */
#rumo-root ::-webkit-scrollbar { width: 8px; height: 8px; }
#rumo-root ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

/* ---------- SIDEBAR ---------- */
#rumo-sidebar {
  width: 226px;
  min-width: 226px;
  background: var(--sidebar-bg);
  color: #C7CCD6;
  display: flex;
  flex-direction: column;
  padding: 28px 18px;
}
#rumo-sidebar .brand {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 24px;
  letter-spacing: 0.02em;
  color: #FFFFFF;
  margin-bottom: 4px;
}
#rumo-sidebar .brand-sub {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #6C9AE0;
  margin-bottom: 26px;
  border-bottom: 1px solid var(--sidebar-bg-3);
  padding-bottom: 18px;
}
#rumo-sidebar nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
#rumo-sidebar .nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 7px;
  cursor: pointer;
  color: #ABB3C0;
  font-size: 13.5px;
  font-weight: 500;
  transition: background .15s, color .15s;
  user-select: none;
}
#rumo-sidebar .nav-item:hover { background: var(--sidebar-bg-2); color: #FFFFFF; }
#rumo-sidebar .nav-item.active { background: var(--sidebar-bg-3); color: #7CA9E8; }
#rumo-sidebar .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .55; flex-shrink:0; }
#rumo-sidebar .foot {
  font-size: 10.5px; color: #5C6474; border-top: 1px solid var(--sidebar-bg-3);
  padding-top: 14px; letter-spacing: .04em;
}

/* ---------- THEME TOGGLE ---------- */
.theme-toggle {
  display:flex; background: var(--sidebar-bg-2); border-radius: 8px; padding: 3px; margin-bottom: 18px; gap:2px;
}
.theme-toggle button {
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  background:none; border:none; cursor:pointer; color:#8A93A3;
  font-size: 12px; font-weight:600; padding: 7px 4px; border-radius: 6px;
  font-family: 'IBM Plex Sans', sans-serif;
}
.theme-toggle button.active { background: var(--sidebar-bg-3); color: #FFFFFF; }
.sheets-settings-btn {
  width:100%; background: var(--sidebar-bg-2); border: 1px solid var(--sidebar-bg-3); color: #ABB3C0;
  font-size: 11.5px; font-weight:600; padding: 9px; border-radius: 8px; cursor:pointer; margin-bottom: 18px;
  font-family: 'IBM Plex Sans', sans-serif;
}
.sheets-settings-btn:hover { color: #FFFFFF; border-color: var(--brass-light); }
.account-foot { display: none; margin-bottom: 14px; }
.account-foot.visible { display: block; }
.account-email { font-size: 11px; color: #8A93A3; word-break: break-all; margin-bottom: 6px; }
.logout-btn {
  width:100%; background: none; border: 1px solid var(--sidebar-bg-3); color: #ABB3C0;
  font-size: 11.5px; font-weight:600; padding: 7px; border-radius: 8px; cursor:pointer;
  font-family: 'IBM Plex Sans', sans-serif;
}
.logout-btn:hover { color: var(--rust); border-color: var(--rust); }

/* ---------- LOGIN ---------- */
#rumo-root.login-mode #rumo-sidebar { display: none; }
#rumo-root.login-mode #rumo-main { display:flex; align-items:center; justify-content:center; padding: 20px; min-height: 100vh; }
.login-card {
  width: 380px; max-width: 100%; background: var(--paper-card); border: 1px solid var(--line);
  border-radius: 16px; padding: 32px 30px; box-shadow: var(--shadow-modal);
}
.login-title { font-family:'Fraunces',serif; font-weight:700; font-size: 26px; color: var(--ink); margin-bottom: 4px; text-align:center; }
.login-sub { font-size: 12.5px; color: var(--slate-mute); text-align:center; margin-bottom: 22px; }
.login-error { font-size: 12px; color: var(--rust); margin: -8px 0 14px; min-height: 1px; }
.login-switch { text-align:center; font-size: 12.5px; color: var(--slate-mute); margin-top: 16px; }
.login-switch a { color: var(--brass); font-weight:600; text-decoration:none; }
.login-switch a:hover { text-decoration:underline; }



/* ---------- MAIN ---------- */
#rumo-main { flex: 1; padding: 30px 40px 60px; max-width: 1280px; margin: 0 auto; width: 100%; }
#rumo-header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 28px; flex-wrap: wrap; gap: 14px;
}
#rumo-header h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; color: var(--ink); margin: 0 0 2px; }
#rumo-header .subtitle { color: var(--slate-mute); font-size: 12.5px; }

.month-switch { display: flex; align-items: center; gap: 10px; background: var(--paper-card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 6px; }
.month-switch button { background: none; border: none; cursor: pointer; color: var(--slate); font-size: 15px; padding: 4px 8px; border-radius: 5px; }
.month-switch button:hover { background: var(--paper); }
.month-switch .label { font-weight: 600; font-size: 13px; min-width: 122px; text-align: center; text-transform: capitalize; }

.btn {
  font-family: 'IBM Plex Sans', sans-serif;
  border: none; cursor: pointer; border-radius: 7px;
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 7px;
  transition: transform .1s, opacity .15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--brass); color: #FFFFFF; box-shadow: 0 4px 14px rgba(20,41,77,0.28); }
.btn-primary:hover { background: var(--brass-light); }
.btn-ghost { background: transparent; color: var(--slate); border: 1px solid var(--line-strong); }
.btn-ghost:hover { background: var(--paper-card); }
.btn-danger { background: transparent; color: var(--rust); }
.btn-danger:hover { text-decoration: underline; }
.btn-small { padding: 6px 10px; font-size: 12px; }
.mobile-fab {
  display: none; position: fixed; right: 20px; bottom: 20px; z-index: 500;
  width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
  background: var(--brass); color: #fff; font-size: 28px; line-height: 1;
  box-shadow: 0 8px 24px rgba(20,41,77,0.4);
}
@media (max-width: 720px) { .mobile-fab { display: block; } }
#rumo-root.login-mode .mobile-fab { display: none; }

/* ---------- CARDS / GRID ---------- */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 26px; }
.grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
@media (max-width: 980px) { .grid-4 { grid-template-columns: repeat(2,1fr); } .grid-2 { grid-template-columns: 1fr; } }

.card {
  background: var(--paper-card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px 22px;
  box-shadow: var(--shadow-card);
}
.stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--slate-mute); margin-bottom: 10px; font-weight: 600; }
.stat-card .stat-value { font-family: 'Fraunces', serif; font-weight: 600; font-size: 25px; color: var(--ink); }
.stat-card .stat-value.total { border-bottom: 3px double var(--brass); padding-bottom: 6px; display: inline-block; }
.stat-card .stat-value.pos { color: var(--forest); }
.stat-card .stat-value.neg { color: var(--rust); }
.stat-card .stat-note { font-size: 11.5px; color: var(--slate-mute); margin-top: 6px; }

.card-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; color: var(--ink); margin: 0 0 4px; }
.card-sub { font-size: 11.5px; color: var(--slate-mute); margin-bottom: 16px; }

/* ---------- LEDGER LIST (signature element) ---------- */
.ledger { border-top: 1px solid var(--line-strong); }
.ledger-row {
  display: grid;
  grid-template-columns: 34px 1fr auto auto 30px;
  align-items: center;
  gap: 12px;
  padding: 11px 2px;
  border-bottom: 1px dashed var(--line);
  font-size: 13px;
}
.ledger-row:hover { background: rgba(184,145,60,0.06); }
@media (hover: none) {
  .ledger-row .row-actions, .bill-row .row-actions { opacity: 1; }
}
.cat-stamp {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  font-family: 'IBM Plex Mono', monospace;
}
.ledger-row .desc { font-weight: 500; color: var(--ink); }
.ledger-row .meta { font-size: 11px; color: var(--slate-mute); margin-top: 1px; }
.ledger-row .amount { font-weight: 600; text-align: right; white-space: nowrap; }
.ledger-row .amount.pos { color: var(--forest); }
.ledger-row .amount.neg { color: var(--rust); }
.ledger-row .date { color: var(--slate-mute); font-size: 12px; text-align: right; white-space: nowrap; }
.ledger-row .row-actions { display:flex; gap:4px; opacity:0; transition: opacity .12s; }
.ledger-row:hover .row-actions { opacity: 1; }
.icon-btn { background:none; border:none; cursor:pointer; color: var(--slate-mute); font-size:14px; padding:2px 5px; border-radius:4px; }
.icon-btn:hover { background: var(--paper); color: var(--ink); }
.tag {
  font-size: 10px; background: var(--paper); border: 1px solid var(--line-strong);
  padding: 1px 7px; border-radius: 10px; margin-left: 7px; color: var(--slate-mute);
  font-weight: 700; vertical-align: middle; letter-spacing: .02em;
}

/* ---------- SUBCATEGORIES ---------- */
.subcat-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); }
.subchip {
  display:inline-flex; align-items:center; gap:5px; background: var(--paper);
  border: 1px solid var(--line-strong); border-radius: 20px; padding: 3px 4px 3px 10px;
  font-size: 11.5px; color: var(--slate);
}
.subchip button { background:none; border:none; cursor:pointer; color: var(--slate-mute); font-size:12px; padding: 1px 5px; border-radius:50%; line-height:1; }
.subchip button:hover { background: var(--line); color: var(--rust); }
.subchip-add {
  background:none; border: 1px dashed var(--line-strong); border-radius:20px; padding: 3px 12px;
  font-size: 11.5px; color: var(--slate-mute); cursor:pointer; font-weight:600;
}
.subchip-add:hover { border-color: var(--brass); color: var(--brass); }

/* ---------- GROUPS ---------- */
.group-block { margin-bottom: 22px; }
.group-block:last-child { margin-bottom: 0; }
.group-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
.group-title { display:flex; align-items:center; gap:10px; font-weight:700; font-size:14px; color: var(--ink); }
.group-title .swatch { width: 28px; height: 28px; border-radius: 8px; font-size: 15px; }

.empty-state { text-align: center; padding: 40px 10px; color: var(--slate-mute); }
.empty-state .display { font-size: 15px; color: var(--slate); margin-bottom: 4px; }

/* ---------- BAR LIST (expenses by category) ---------- */
.bar-row { margin-bottom: 13px; }
.bar-row .bar-head { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
.bar-row .bar-head .name { font-weight: 600; color: var(--ink); }
.bar-track { height: 7px; background: var(--paper); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-head.clickable { cursor: pointer; user-select: none; }
.bar-head.clickable:hover .name { color: var(--brass); }
.cat-icon { display:inline-block; margin-right: 6px; font-size: 13px; vertical-align: -1px; }
.chev { display:inline-block; margin-right: 5px; font-size: 10px; color: var(--slate-mute); transition: transform .15s; }
.chev.open { transform: rotate(90deg); }
.sub-breakdown { margin: 8px 0 4px 13px; padding-left: 11px; border-left: 2px solid var(--line); display:flex; flex-direction:column; gap:9px; }
.sub-breakdown .bar-head .name { font-weight: 500; color: var(--slate-mute); }
.bar-track.sub { height: 5px; }

/* ---------- BUDGET PROGRESS ---------- */
.budget-item { padding: 14px 0; border-bottom: 1px dashed var(--line); }
.budget-item:last-child { border-bottom: none; }
.budget-top { display: flex; justify-content: space-between; align-items:center; margin-bottom: 8px; }
.budget-top .name { font-weight: 600; color: var(--ink); display:flex; align-items:center; gap:8px; }
.budget-top .figures { font-size: 12px; }
.budget-track { height: 9px; background: var(--paper); border-radius: 5px; overflow: hidden; border: 1px solid var(--line); }
.budget-fill { height: 100%; }
.budget-input { width: 90px; border: 1px solid var(--line-strong); border-radius: 5px; padding: 4px 7px; font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:right; background: var(--paper-2); }

/* ---------- TABLE / TRANSACTIONS PAGE ---------- */
.toolbar { display:flex; gap:10px; margin-bottom: 18px; flex-wrap: wrap; align-items:center; justify-content: space-between; }
.toolbar-left { display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
input[type=text].search, select.filter {
  border: 1px solid var(--line-strong); background: var(--paper-2); border-radius: 7px;
  padding: 8px 12px; font-size: 12.5px; font-family: inherit; color: var(--slate);
}
input[type=text].search { min-width: 200px; }

/* ---------- ACCOUNTS / CATEGORIES GRID ---------- */
.account-card, .cat-card {
  background: var(--paper-card); border:1px solid var(--line); border-radius: 14px; padding: 16px 18px;
  display:flex; flex-direction:column; gap:8px; box-shadow: var(--shadow-card); transition: box-shadow .15s, transform .1s;
}
.account-card:hover { box-shadow: 0 1px 2px rgba(15,17,20,0.06), 0 16px 32px rgba(15,17,20,0.1); }
.accounts-grid, .cats-grid { display:grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 8px;}
.accounts-grid.roomy { grid-template-columns: repeat(2,1fr); }
@media (max-width: 980px){ .accounts-grid, .cats-grid { grid-template-columns: repeat(2,1fr);} }
.account-card .acc-name { font-weight:600; color: var(--ink); font-size: 14px; }
.account-card .acc-type { font-size: 11px; color: var(--slate-mute); text-transform: uppercase; letter-spacing:.06em; }
.account-card .acc-balance { font-family:'Fraunces',serif; font-weight:600; font-size: 20px; margin-top:4px; }

.cat-card { flex-direction: row; align-items:center; justify-content: space-between; }
.cat-left { display:flex; align-items:center; gap:10px; }
.swatch { width: 26px; height: 26px; border-radius: 6px; flex-shrink:0; }
.swatch.icon-swatch { display:flex; align-items:center; justify-content:center; font-size: 14px; }

/* ---------- CAIXINHAS (money jars inside an account) ---------- */
.available-note { font-size: 11.5px; color: var(--slate-mute); margin-top: 2px; }
.caixinhas-wrap { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line); }
.caixinhas-head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; }
.caixinhas-head span { font-size: 11px; text-transform: uppercase; letter-spacing:.07em; color: var(--slate-mute); font-weight:700; }
.add-caixinha {
  background:none; border: 1px dashed var(--line-strong); border-radius:20px; padding: 2px 10px;
  font-size: 11px; color: var(--slate-mute); cursor:pointer; font-weight:600;
}
.add-caixinha:hover { border-color: var(--brass); color: var(--brass); }
.caixinha-row {
  display:flex; align-items:center; gap:10px; padding: 8px 0;
}
.caixinha-info { display:flex; align-items:center; gap:9px; flex:1; min-width:0; }
.caixinha-info .swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink:0; }
.caixinha-name { font-size: 12.5px; font-weight:600; color: var(--ink); }
.caixinha-track { height: 5px; width: 90px; background: var(--paper); border: 1px solid var(--line); border-radius:3px; margin-top:4px; overflow:hidden; }
.caixinha-fill { height:100%; background: var(--brass); }
.caixinha-balance { font-size: 12px; white-space:nowrap; }
.caixinha-actions { display:flex; gap:2px; }

/* ---------- DASHBOARD ACCOUNTS / CREDIT CARDS ---------- */
.acc-mini-list { display:flex; flex-direction:column; }
.acc-mini-row {
  display:flex; align-items:center; gap:11px;
  padding: 11px 2px; border-bottom: 1px dashed var(--line);
}
.acc-mini-row:last-child { border-bottom: none; }
.acc-mini-row .swatch { width: 12px; height: 12px; border-radius: 50%; }

.credit-tiles { display:flex; flex-direction:column; gap:12px; }
.credit-tile {
  background: linear-gradient(135deg, var(--sidebar-bg) 0%, var(--sidebar-bg-3) 100%);
  border-radius: 12px; padding: 16px 18px; color: #EDE7D2;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-card);
}
.credit-tile::after {
  content: ''; position:absolute; right:-30px; top:-30px; width:110px; height:110px;
  border-radius: 50%; background: rgba(110,154,224,0.12);
}
.credit-tile-top { display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600; letter-spacing:.02em; color: #FFFFFF; }
.credit-tile-top .chip { width: 26px; height: 19px; border-radius: 4px; background: linear-gradient(135deg, #8FB4E8, #3E6FB8); display:block; }
.credit-tile-label { font-size: 10.5px; text-transform: uppercase; letter-spacing:.09em; color: #7CA9E8; margin-top: 16px; }
.credit-tile-amount { font-family:'Fraunces',serif; font-weight:600; font-size: 22px; margin-top: 4px; color: #FFFFFF; }

/* ---------- BILLS ---------- */
.bill-row {
  display:grid; grid-template-columns: 40px 1fr auto auto 90px 56px; align-items:center; gap:12px;
  padding: 12px 2px; border-bottom: 1px dashed var(--line); font-size: 13px;
}
.bill-row .row-actions { opacity: 0; }
.bill-row:hover .row-actions { opacity: 1; }
.bill-row.overdue .due { color: var(--rust); font-weight:700; }
.pill { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-align:center; }
.pill.paid { background: rgba(31,110,74,0.14); color: var(--forest-deep); }
.pill.pending { background: rgba(174,59,44,0.1); color: var(--rust); }
.checkbtn { width:20px; height:20px; border-radius:5px; border: 2px solid var(--line-strong); cursor:pointer; background: var(--paper-card); }
.checkbtn.checked { background: var(--forest); border-color: var(--forest); position:relative; }
.checkbtn.checked::after { content:'✓'; color:#fff; font-size:12px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }

/* ---------- MODAL ---------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(8,10,14,0.62);
  display:flex; align-items:center; justify-content:center; z-index: 1000; padding: 20px;
}
.modal {
  background: var(--paper-card); border-radius: 16px; padding: 26px 28px 26px; width: 420px; max-width: 100%;
  max-height: 88vh; overflow-y:auto; overflow-x:hidden; border: 1px solid var(--line);
  box-shadow: var(--shadow-modal);
}
.modal h2 {
  font-family:'IBM Plex Sans', sans-serif; font-size:18px; font-weight:600; letter-spacing:-.01em; color: #FFFFFF; margin: -26px -28px 20px;
  padding: 22px 28px 18px; background: linear-gradient(135deg, var(--sidebar-bg) 0%, var(--brass) 130%);
}
.field { margin-bottom: 14px; }
.field label { display:block; font-size: 11.5px; font-weight:600; text-transform: uppercase; letter-spacing:.05em; color: var(--slate-mute); margin-bottom: 6px; }
.field input, .field select {
  width: 100%; border: 1px solid var(--line-strong); border-radius: 8px; padding: 9px 11px;

}

.field-row { display:flex; gap: 10px; }
.field-row .field { flex:1; }

.type-toggle button.active.expense { background: var(--rust); color:#fff; }
.type-toggle button.active.income { background: var(--forest); color:#fff; }

.fab-hint { font-size: 11px; color: var(--slate-mute); margin-top: -20px; margin-bottom: 20px; }

}
.icon-pick.active { border-color: var(--brass); background: rgba(62,111,184,0.12); box-shadow: 0 0 0 2px rgba(62,111,184,0.2) inset; }

  <main id="rumo-main"></main>

</div>

<script>
(function(){
  const STORAGE_KEY = 'rumo-finance-state-v1';

  // window.storage only exists when this file is viewed inside Claude's
  // artifact preview. When the file is downloaded and opened directly in a
  // browser (double-click, file://), that API doesn't exist — so we fall
  // back to plain localStorage, which works in both cases.
  const hasClaudeStorage = typeof window.storage !== 'undefined';
  async function storageGet(key){
    if(hasClaudeStorage){
      try { return await window.storage.get(key, false); } catch(e){ return null; }
    }
    try { const v = localStorage.getItem(key); return v ? {value: v} : null; }
    catch(e){ return null; }
  }
  async function storageSet(key, value){
    if(hasClaudeStorage){
      try { await window.storage.set(key, value, false); } catch(e){ /* ignore */ }
      return;
    }
    try { localStorage.setItem(key, value); } catch(e){ /* ignore */ }
  }
  async function storageDelete(key){
    if(hasClaudeStorage){
      try { await window.storage.delete(key, false); } catch(e){ /* ignore */ }
      return;
    }
    try { localStorage.removeItem(key); } catch(e){ /* ignore */ }
  }
  const root = document.getElementById('rumo-root');
  const navEl = document.getElementById('rumo-nav');
  const mainEl = document.getElementById('rumo-main');

  const PAGES = [
    {id:'dashboard', label:'Painel'},
    {id:'transactions', label:'Transações'},
    {id:'budgets', label:'Orçamentos'},
    {id:'bills', label:'Contas a pagar'},
    {id:'accounts', label:'Contas'},
    {id:'categories', label:'Categorias'},
  ];

  const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  let state = null;
  let currentPage = 'dashboard';
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let modal = null; // {type, data}
  let txFilter = { search: '', categoryId: 'all', accountId: 'all' };
  let expandedDashboardCat = null;

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function fmt(n){
    const sign = n < 0 ? '-' : '';
    return sign + 'R$ ' + Math.abs(n).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function monthKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }

  function addMonthsToDateStr(dateStr, n){
    const d = new Date(dateStr+'T00:00:00');
    const day = d.getDate();
    const target = new Date(d.getFullYear(), d.getMonth()+n, 1);
    const lastDay = new Date(target.getFullYear(), target.getMonth()+1, 0).getDate();
    target.setDate(Math.min(day, lastDay));
    return target.toISOString().slice(0,10);
  }
  function monthsBetween(d1,d2){ return (d2.getFullYear()-d1.getFullYear())*12 + (d2.getMonth()-d1.getMonth()); }
  function clampInt(n, min, max){ n = parseInt(n,10); if(isNaN(n)) n = min; return Math.min(max, Math.max(min, n)); }

  function defaultState(){
    const accounts = [
      {id: uid(), name:'Carteira', type:'Dinheiro', balance: 320.00, color:'#B8913C'},
      {id: uid(), name:'Conta Corrente', type:'Banco', balance: 4210.55, color:'#1F6E4A', caixinhas:[{id:uid(), name:'Reserva de emergência', goal:5000, balance:1200, color:'#1F6E4A'}]},
      {id: uid(), name:'Cartão de Crédito', type:'Crédito', balance: -680.30, color:'#AE3B2C', dueDay: 10},
    ];
    const categories = [
      {id: uid(), name:'Moradia', type:'expense', color:'#5B7065', icon:'🏠'},
      {id: uid(), name:'Alimentação', type:'expense', color:'#B8913C', icon:'🍽️', subcategories:[{id:uid(),name:'Mercado'},{id:uid(),name:'Restaurante'}]},
      {id: uid(), name:'Transporte', type:'expense', color:'#7C8880', icon:'🚗', subcategories:[{id:uid(),name:'Combustível'},{id:uid(),name:'App de transporte'}]},
      {id: uid(), name:'Saúde', type:'expense', color:'#AE3B2C', icon:'💊'},
      {id: uid(), name:'Lazer', type:'expense', color:'#8C6FB0', icon:'🎮'},
      {id: uid(), name:'Educação', type:'expense', color:'#3F6E92', icon:'🎓'},
      {id: uid(), name:'Compras', type:'expense', color:'#B0704F', icon:'🛍️'},
      {id: uid(), name:'Outros', type:'expense', color:'#6E6E6E', icon:'📦'},
      {id: uid(), name:'Salário', type:'income', color:'#1F6E4A', icon:'💼'},
      {id: uid(), name:'Freelance', type:'income', color:'#2E8B6E', icon:'💻'},
      {id: uid(), name:'Investimentos', type:'income', color:'#3F8E5C', icon:'📈'},
    ];
    const cat = n => categories.find(c=>c.name===n).id;
    const acc = n => accounts.find(a=>a.name===n).id;
    const y = currentYear, m = currentMonth;
    const d = (day) => new Date(y, m, day).toISOString().slice(0,10);
    const transactions = [
      {id:uid(), date:d(2), desc:'Salário', amount:5200, type:'income', categoryId:cat('Salário'), accountId:acc('Conta Corrente')},
      {id:uid(), date:d(3), desc:'Aluguel', amount:-1450, type:'expense', categoryId:cat('Moradia'), accountId:acc('Conta Corrente')},
      {id:uid(), date:d(5), desc:'Supermercado', amount:-380.40, type:'expense', categoryId:cat('Alimentação'), accountId:acc('Cartão de Crédito')},
      {id:uid(), date:d(6), desc:'Uber', amount:-42.90, type:'expense', categoryId:cat('Transporte'), accountId:acc('Carteira')},
      {id:uid(), date:d(9), desc:'Cinema', amount:-68, type:'expense', categoryId:cat('Lazer'), accountId:acc('Cartão de Crédito')},
      {id:uid(), date:d(12), desc:'Farmácia', amount:-95.20, type:'expense', categoryId:cat('Saúde'), accountId:acc('Carteira')},
      {id:uid(), date:d(15), desc:'Projeto freelance', amount:900, type:'income', categoryId:cat('Freelance'), accountId:acc('Conta Corrente')},
      {id:uid(), date:d(18), desc:'Curso online', amount:-129, type:'expense', categoryId:cat('Educação'), accountId:acc('Cartão de Crédito')},
      {id:uid(), date:d(21), desc:'Restaurante', amount:-156.50, type:'expense', categoryId:cat('Alimentação'), accountId:acc('Cartão de Crédito')},
      {id:uid(), date:d(24), desc:'Roupas', amount:-210, type:'expense', categoryId:cat('Compras'), accountId:acc('Cartão de Crédito')},
    ];
    const budgets = {};
    budgets[cat('Moradia')] = 1500;
    budgets[cat('Alimentação')] = 700;
    budgets[cat('Transporte')] = 250;
    budgets[cat('Lazer')] = 200;
    budgets[cat('Saúde')] = 200;
    budgets[cat('Compras')] = 300;

    const bills = [
      {id:uid(), desc:'Internet', amount:99.90, dueDate:d(10), paid:true, categoryId:cat('Moradia')},
      {id:uid(), desc:'Energia elétrica', amount:210.30, dueDate:d(15), paid:false, categoryId:cat('Moradia')},
      {id:uid(), desc:'Fatura do cartão', amount:680.30, dueDate:d(28), paid:false, categoryId:cat('Compras')},
      {id:uid(), desc:'Plano de saúde', amount:340, dueDate:d(5), paid:true, categoryId:cat('Saúde')},
    ];

    return {accounts, categories, transactions, budgets, bills, settings: {theme:'light'}};
  }

  function applyTheme(){
    root.setAttribute('data-theme', state.settings.theme);
    document.querySelectorAll('#themeToggle [data-theme-btn]').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.themeBtn===state.settings.theme);
    });
  }

  function groupById(id){ return (state.groups||[]).find(g=>g.id===id); }

  // One-time migration: the app used to have a 2-level Category > Subcategory
  // model. Now it's 3-level: Group > Category > Subcategory. Every category
  // that already had subcategories is promoted to a group, and each of its
  // subcategories becomes a real category underneath it. Nothing is deleted;
  // transactions, bills and budgets are remapped to point at the right level.
  function migrateToGroupHierarchy(){
    if(state.groups) return false;
    state.groups = [];
    const fallback = {};
    function fallbackGroup(type){
      if(!fallback[type]){
        const g = {id: uid(), name: type==='income' ? 'Receitas' : 'Geral', type, color:'#6B7280', icon:'📁'};
        state.groups.push(g);
        fallback[type] = g.id;
      }
      return fallback[type];
    }
    const oldCategories = state.categories;
    const newCategories = [];
    const catIdRemap = {};
    const promotedIds = new Set();

    oldCategories.forEach(cat=>{
      const subs = cat.subcategories || [];
      if(subs.length > 0){
        const group = {id: uid(), name: cat.name, type: cat.type, color: cat.color, icon: cat.icon};
        state.groups.push(group);
        promotedIds.add(cat.id);
        subs.forEach(sub=>{
          newCategories.push({ id: sub.id, name: sub.name, type: cat.type, groupId: group.id, color: cat.color, icon: cat.icon, subcategories: [] });
        });
        catIdRemap[cat.id] = { groupId: group.id, subIds: new Set(subs.map(s=>s.id)) };
      } else {
        cat.groupId = fallbackGroup(cat.type);
        newCategories.push(cat);
      }
    });

    function fallbackCategoryFor(groupId, type, color, icon){
      let fc = newCategories.find(c=>c.groupId===groupId && c.name==='Outros');
      if(!fc){
        fc = {id: uid(), name:'Outros', type, groupId, color, icon, subcategories:[]};
        newCategories.push(fc);
      }
      return fc.id;
    }
    function remap(catId, subId){
      if(!catId) return {categoryId: catId, subcategoryId: subId};
      const info = catIdRemap[catId];
      if(!info) return {categoryId: catId, subcategoryId: subId};
      if(subId && info.subIds.has(subId)) return {categoryId: subId, subcategoryId: undefined};
      const oldCat = oldCategories.find(c=>c.id===catId);
      return {categoryId: fallbackCategoryFor(info.groupId, oldCat.type, oldCat.color, oldCat.icon), subcategoryId: undefined};
    }

    state.transactions.forEach(t=>{
      if(t.categoryId){ const r = remap(t.categoryId, t.subcategoryId); t.categoryId = r.categoryId; t.subcategoryId = r.subcategoryId; }
    });
    state.bills.forEach(b=>{
      if(b.categoryId){ b.categoryId = remap(b.categoryId, null).categoryId; }
    });
    const newBudgets = {};
    Object.entries(state.budgets||{}).forEach(([catId, val])=>{ if(!promotedIds.has(catId)) newBudgets[catId] = val; });
    state.budgets = newBudgets;
    state.categories = newCategories;
    return true;
  }

  // Groups/categories that should always exist (merged non-destructively).
  const REQUESTED_GROUPS = [
    { name:'Fixos', type:'expense', icon:'📌', color:'#3F6E92', cats:['CNPJ / TAXAS / IMPOSTOS','MORADIA','EDUCACAO','SERVICOS','ASSINATURAS','TRANSPORTE'] },
    { name:'Alimentação', type:'expense', icon:'🍽️', color:'#B8913C', cats:['RESTAURANTE','REST GOURMET','SUPERMERCADO','COMEMORAÇÕES','HORTIFRUTI'] },
    { name:'Variaveis', type:'expense', icon:'🔄', color:'#8C6FB0', cats:['CASA','EMPRESTIMO','AMORTIZACAO / ENTRADA','VIAGEM','VESTUARIO','PRESENTES','FESTA DO NOAH'] },
    { name:'Esporadico', type:'expense', icon:'🎲', color:'#B0704F', cats:['COSMETICOS','ELETRONICOS','DIARISTA','AJUSTES','LAZER','FARMA','BELEZA','DOACAO','DOCUMENTOS','OUTROS','PLANORA - CUSTOS','SAUDE','CARRO','REEMBOLSOS'] },
    { name:'Buffer', type:'expense', icon:'🧯', color:'#7C8880', cats:['BUFFER'] },
    { name:'Investimentos', type:'expense', icon:'📈', color:'#1F6E4A', cats:['AP Novo - Mens INCC','AP Novo - Mens Ev Obra','AP Novo - Mens Contrato','AP Novo - Provisão'] },
  ];
  function ensureRequestedGroups(){
    let changed = false;
    REQUESTED_GROUPS.forEach(def=>{
      let group = state.groups.find(g=> g.type===def.type && g.name.trim().toLowerCase()===def.name.trim().toLowerCase());
      if(!group){
        group = {id: uid(), name: def.name, type: def.type, color: def.color, icon: def.icon};
        state.groups.push(group);
        changed = true;
      }
      def.cats.forEach(catName=>{
        const exists = state.categories.some(c=> c.groupId===group.id && c.name.trim().toLowerCase()===catName.trim().toLowerCase());
        if(!exists){
          state.categories.push({id: uid(), name: catName, type: def.type, groupId: group.id, color: def.color, icon: def.icon, subcategories: []});
          changed = true;
        }
      });
    });
    return changed;
  }

  // The example the user gave: Grupo Fixos > Categoria Moradia > Subcategorias.
  function ensureMoradiaExampleSubs(){
    let changed = false;
    const fixos = state.groups.find(g=>g.name.trim().toLowerCase()==='fixos');
    if(fixos){
      const moradia = state.categories.find(c=>c.groupId===fixos.id && c.name.trim().toLowerCase()==='moradia');
      if(moradia){
        moradia.subcategories = moradia.subcategories || [];
        ['Condomínio','Água','Gás'].forEach(name=>{
          if(!moradia.subcategories.some(s=>s.name.trim().toLowerCase()===name.trim().toLowerCase())){
            moradia.subcategories.push({id: uid(), name});
            changed = true;
          }
        });
      }
    }
    return changed;
  }

  // One-time reset: replace whatever accounts exist with the requested set.
  // Transactions/transfers that pointed at the old accounts are moved onto
  // the first new account instead of being orphaned (invalid transfers,
  // where both sides would collapse into the same account, are dropped).
  function resetAccountsOnce(){
    if(state._accountsResetV1) return false;
    const REQUESTED_ACCOUNTS = ['Caixa','Nubank ALN','Itaú ALN','Itaú DGO','Mercado Pago DGO'];
    const colors = ['#1F6E4A','#B8913C','#3F6E92','#8C6FB0','#AE3B2C'];
    const newAccounts = REQUESTED_ACCOUNTS.map((name,i)=>({
      id: uid(), name, type: name==='Caixa' ? 'Dinheiro' : 'Banco', balance: 0, color: colors[i%colors.length]
    }));
    const fallbackId = newAccounts[0].id;
    state.transactions.forEach(t=>{
      if(t.accountId) t.accountId = fallbackId;
      if(t.fromAccountId) t.fromAccountId = fallbackId;
      if(t.toAccountId) t.toAccountId = fallbackId;
    });
    state.transactions = state.transactions.filter(t=> !(t.type==='transfer' && t.fromAccountId===t.toAccountId));
    state.accounts = newAccounts;
    state._accountsResetV1 = true;
    return true;
  }

  // Follow-up tweak: Caixa becomes a bank account, plus two new credit cards.
  function updateAccountsV2Once(){
    if(state._accountsUpdateV2) return false;
    const caixa = state.accounts.find(a=>a.name.trim().toLowerCase()==='caixa');
    if(caixa) caixa.type = 'Banco';
    const existingNames = state.accounts.map(a=>a.name.trim().toLowerCase());
    const toAdd = [];
    if(!existingNames.includes('itaú uniclass')) toAdd.push('Itaú Uniclass');
    if(!existingNames.includes('nubank')) toAdd.push('Nubank');
    const colors = ['#AE3B2C','#8C6FB0'];
    toAdd.forEach((name,i)=>{
      state.accounts.push({id: uid(), name, type:'Crédito', balance: 0, color: colors[i%colors.length]});
    });
    state._accountsUpdateV2 = true;
    return true;
  }

  // Add Swile card and set every credit card's due day to the 1st.
  function updateAccountsV3Once(){
    if(state._accountsUpdateV3) return false;
    const existingNames = state.accounts.map(a=>a.name.trim().toLowerCase());
    if(!existingNames.includes('swile')){
      state.accounts.push({id: uid(), name:'Swile', type:'Crédito', balance: 0, color:'#3F6E92'});
    }
    state.accounts.forEach(a=>{ if(a.type==='Crédito') a.dueDay = 1; });
    state._accountsUpdateV3 = true;
    return true;
  }

  const AUTH_KEY = 'rumo-auth-session-v1';
  let authSession = null;

  async function loadAuthSession(){
    try {
      const res = await storageGet(AUTH_KEY);
      if(res && res.value) authSession = JSON.parse(res.value);
    } catch(e){ authSession = null; }
  }
  function setAuthSession(data){
    authSession = {
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      user_id: data.user ? data.user.id : (data.id || null),
      email: (data.user && data.user.email) || data.email || null,
      expires_at: Date.now() + (data.expires_in ? data.expires_in*1000 : 3600*1000)
    };
    storageSet(AUTH_KEY, JSON.stringify(authSession));
  }
  async function clearAuthSession(){
    authSession = null;
    await storageDelete(AUTH_KEY);
  }
  // Sanitiza a URL do Supabase, mantendo só o domínio — protege contra o
  // usuário colar sem querer algo com /rest/v1, /auth/v1 etc no final.
  function sbOrigin(url){
    try { return new URL(url.trim()).origin; }
    catch(e){ return (url||'').trim().replace(/\/$/,''); }
  }

  async function authRequest(path, body){
    let res;
    try {
      res = await fetch(sbOrigin(state.settings.supabaseUrl) + path, {
        method: 'POST',
        headers: {'Content-Type':'application/json', apikey: state.settings.supabaseKey},
        body: JSON.stringify(body)
      });
    } catch(e){
      throw new Error('Não consegui alcançar o servidor do Supabase. Confira a URL (deve começar com https://) e sua conexão.');
    }
    const rawText = await res.text();
    let data = {};
    try { data = rawText ? JSON.parse(rawText) : {}; } catch(e){ /* resposta não era JSON */ }
    if(!res.ok){
      const msg = data.error_description || data.msg || (data.error&&data.error.message) || data.error
        || (rawText ? rawText.slice(0,200) : ('HTTP ' + res.status));
      throw new Error(msg);
    }
    return data;
  }
  async function signInWithPassword(email, password){ return authRequest('/auth/v1/token?grant_type=password', {email, password}); }
  async function signUpWithPassword(email, password){ return authRequest('/auth/v1/signup', {email, password}); }
  async function refreshAuthSession(){
    if(!authSession || !authSession.refresh_token) return false;
    try {
      const data = await authRequest('/auth/v1/token?grant_type=refresh_token', {refresh_token: authSession.refresh_token});
      setAuthSession(data);
      return true;
    } catch(e){ return false; }
  }

  async function pullFromSupabase(url, key){
    if(!authSession) return null;
    const res = await fetch(sbOrigin(url) + '/rest/v1/app_state?id=eq.'+encodeURIComponent(authSession.user_id)+'&select=data', {
      headers: { apikey: key, Authorization: 'Bearer '+authSession.access_token }
    });
    if(res.status===401){ const ok = await refreshAuthSession(); return ok ? pullFromSupabase(url,key) : null; }
    if(!res.ok) return null;
    const rows = await res.json();
    return (rows && rows[0] && rows[0].data) ? rows[0].data : null;
  }

  async function loadState(){
    try {
      const res = await storageGet(STORAGE_KEY);
      if (res && res.value) { state = JSON.parse(res.value); }
    } catch(e){ /* not found */ }
    if(!state){ state = defaultState(); await saveState(); }
    if(!state.settings) state.settings = {theme:'light'};
  }

  // Runs the one-time data migrations, applies the theme and renders the app.
  // Called once we know we have a valid state to work with (either local-only,
  // or after a successful login + pull from Supabase).
  async function finishBoot(){
    let changed = migrateToGroupHierarchy();
    changed = ensureRequestedGroups() || changed;
    changed = ensureMoradiaExampleSubs() || changed;
    changed = resetAccountsOnce() || changed;
    changed = updateAccountsV2Once() || changed;
    changed = updateAccountsV3Once() || changed;
    applyTheme();
    if(changed) await saveState();
    render();
  }

  async function saveState(){
    try { await storageSet(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.error('storage error', e); }
    syncToSupabase();
  }
  function syncToSupabase(){
    const s = state && state.settings;
    if(!s || !s.supabaseUrl || !s.supabaseKey || !authSession) return;
    fetch(sbOrigin(s.supabaseUrl) + '/rest/v1/app_state?on_conflict=id', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        apikey: s.supabaseKey,
        Authorization: 'Bearer '+authSession.access_token,
        Prefer: 'resolution=merge-duplicates'
      },
      body: JSON.stringify({id: authSession.user_id, data: state, updated_at: new Date().toISOString()})
    }).then(async (res)=>{
      if(res.status===401){ const ok = await refreshAuthSession(); if(ok) syncToSupabase(); }
    }).catch(()=>{ /* offline ou config errada — ignora silenciosamente */ });
  }

  document.getElementById('themeToggle').addEventListener('click', async (e)=>{
    const btn = e.target.closest('[data-theme-btn]');
    if(!btn || !state) return;
    state.settings.theme = btn.dataset.themeBtn;
    applyTheme();
    await saveState();
  });
  document.getElementById('supabaseSettingsBtn').addEventListener('click', ()=>{
    if(state) openSupabaseModal();
  });
  document.getElementById('mobileFab').addEventListener('click', ()=>{
    if(state && !root.classList.contains('login-mode')) openTxModal();
  });

  function catById(id){ return state.categories.find(c=>c.id===id); }
  function accById(id){ return state.accounts.find(a=>a.id===id); }

  // Current balance = opening balance stored on the account + every transaction
  // that has ever touched it (income/expense directly, or transfers in/out).
  function computeAccountBalance(accountId){
    const acc = accById(accountId);
    let bal = acc ? (acc.balance || 0) : 0;
    state.transactions.forEach(t=>{
      if(t.type==='transfer'){
        if(t.fromAccountId===accountId) bal -= t.amount;
        if(t.toAccountId===accountId) bal += t.amount;
      } else if(t.accountId===accountId){
        bal += t.amount;
      }
    });
    return bal;
  }

  function txForMonth(y,m){
    return state.transactions.filter(t=>{
      const dt = new Date(t.date+'T00:00:00');
      return dt.getFullYear()===y && dt.getMonth()===m;
    });
  }

  // "Fixed" (indefinite) recurring expenses are generated in rolling batches:
  // whenever the viewed month approaches the edge of what's been generated,
  // we top up further months automatically.
  async function ensureFixedCoverage(){
    const groups = {};
    state.transactions.filter(t=>t.recurrenceType==='fixed').forEach(t=>{
      (groups[t.recurrenceGroupId] = groups[t.recurrenceGroupId] || []).push(t);
    });
    let changed = false;
    Object.values(groups).forEach(list=>{
      list.sort((a,b)=>a.date.localeCompare(b.date));
      const last = list[list.length-1];
      const lastMonthDate = new Date(last.date+'T00:00:00');
      const targetMonthDate = new Date(currentYear, currentMonth+12, 1);
      const n = monthsBetween(new Date(lastMonthDate.getFullYear(), lastMonthDate.getMonth(),1), targetMonthDate);
      for(let i=1;i<=n;i++){
        state.transactions.push({
          id: uid(), desc: last.desc, amount: last.amount, date: addMonthsToDateStr(last.date, i),
          type: last.type, categoryId: last.categoryId, subcategoryId: last.subcategoryId, accountId: last.accountId,
          recurrenceType: 'fixed', recurrenceGroupId: last.recurrenceGroupId
        });
        changed = true;
      }
    });
    if(changed) await saveState();
  }

  async function render(){
    await ensureFixedCoverage();
    renderNav();
    renderPage();
  }

  function renderNav(){
    navEl.innerHTML = PAGES.map(p => `
      <div class="nav-item ${p.id===currentPage?'active':''}" data-page="${p.id}">
        <span class="dot"></span>${p.label}
      </div>`).join('');
    navEl.querySelectorAll('.nav-item').forEach(el=>{
      el.addEventListener('click', ()=>{ currentPage = el.dataset.page; render(); });
    });
  }

  function monthSwitchHtml(){
    return `
      <div class="month-switch">
        <button id="prevMonth">‹</button>
        <div class="label display">${MONTHS[currentMonth]} ${currentYear}</div>
        <button id="nextMonth">›</button>
      </div>`;
  }
  function bindMonthSwitch(){
    document.getElementById('prevMonth').onclick = ()=>{
      currentMonth--; if(currentMonth<0){currentMonth=11; currentYear--;} render();
    };
    document.getElementById('nextMonth').onclick = ()=>{
      currentMonth++; if(currentMonth>11){currentMonth=0; currentYear++;} render();
    };

  function renderPage(){
    if(currentPage==='dashboard') return renderDashboard();
    if(currentPage==='transactions') return renderTransactions();
    if(currentPage==='budgets') return renderBudgets();
    if(currentPage==='bills') return renderBills();

  // ---------- DASHBOARD ----------
  function renderDashboard(){
    const monthTx = txForMonth(currentYear, currentMonth);
    const income = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const savings = income + expense;
    const totalBalance = state.accounts.reduce((s,a)=>s+computeAccountBalance(a.id),0);

    const byCat = {};
    const bySubCat = {};
    monthTx.filter(t=>t.type==='expense').forEach(t=>{
      byCat[t.categoryId] = (byCat[t.categoryId]||0) + Math.abs(t.amount);
      const subKey = t.subcategoryId || '__none__';
      bySubCat[t.categoryId] = bySubCat[t.categoryId] || {};
      bySubCat[t.categoryId][subKey] = (bySubCat[t.categoryId][subKey]||0) + Math.abs(t.amount);
    });
    const maxCat = Math.max(1, ...Object.values(byCat));

    function subBreakdownHtml(cid, c){
      const subMap = bySubCat[cid] || {};
      const entries = Object.entries(subMap).sort((a,b)=>b[1]-a[1]);
      const maxSub = Math.max(1, ...entries.map(e=>e[1]));
      const rows = entries.map(([subId,val])=>{
        const subName = subId==='__none__' ? 'Sem subcategoria' : ((c.subcategories||[]).find(s=>s.id===subId)||{}).name || 'Subcategoria removida';
        return `<div class="bar-row" style="margin-bottom:0;">
          <div class="bar-head"><span class="name">${escapeHtml(subName)}</span><span class="mono">${fmt(val)}</span></div>
          <div class="bar-track sub"><div class="bar-fill" style="width:${(val/maxSub*100).toFixed(0)}%; background:${c.color}"></div></div>
        </div>`;
      }).join('');
      return `<div class="sub-breakdown">${rows}</div>`;
    }

    const catRows = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cid, val])=>{
      const c = catById(cid);
      const hasSubs = !!(c && c.subcategories && c.subcategories.length>0);
      const expanded = hasSubs && expandedDashboardCat===cid;
      const chev = hasSubs ? `<span class="chev ${expanded?'open':''}">›</span>` : '';
      return `<div class="bar-row">
        <div class="bar-head ${hasSubs?'clickable':''}" ${hasSubs?`data-toggle-cat="${cid}"`:''}><span class="name">${chev}<span class="cat-icon">${c&&c.icon?c.icon:'💰'}</span>${c?c.name:'Outros'}</span><span class="mono">${fmt(val)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(val/maxCat*100).toFixed(0)}%; background:${c?c.color:'#999'}"></div></div>
        ${expanded ? subBreakdownHtml(cid, c) : ''}
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma despesa lançada neste mês ainda.</div>`;

    const recent = [...monthTx].sort((a,b)=> b.date.localeCompare(a.date)).slice(0,7);
    const recentRows = recent.map(rowHtml).join('') || `<div class="empty-state"><div class="display">Tudo em branco por aqui</div>Lance sua primeira transação do mês.</div>`;

    const accRows = state.accounts.map(a=>{
      const bal = computeAccountBalance(a.id);
      return `<div class="acc-mini-row" data-edit-acc="${a.id}">
        <span class="swatch" style="background:${a.color}"></span>
        <div style="flex:1;">
          <div style="font-weight:600;color:var(--ink);font-size:13px;">${escapeHtml(a.name)}</div>
          <div class="meta">${a.type}${a.dueDay?' · vence dia '+a.dueDay:''}</div>
        </div>
        <div class="mono" style="font-weight:600;color:${bal>=0?'var(--forest)':'var(--rust)'}">${fmt(bal)}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhuma conta cadastrada.</div>`;

    const creditCards = state.accounts.filter(a=>a.type==='Crédito');
    const creditTiles = creditCards.map(a=>{
      const bal = computeAccountBalance(a.id);
      return `<div class="credit-tile" data-edit-acc="${a.id}">
        <div class="credit-tile-top"><span>${escapeHtml(a.name)}</span><span class="chip"></span></div>
        <div class="credit-tile-label">Fatura atual${a.dueDay?' · vence dia '+a.dueDay:''}</div>
        <div class="credit-tile-amount mono">${fmt(Math.abs(bal))}</div>
      </div>`;
    }).join('') || `<div class="empty-state">Nenhum cartão de crédito cadastrado.<br><a href="#" id="goAddCard" style="color:var(--brass); font-weight:600;">Adicionar cartão</a></div>`;

    mainEl.innerHTML = `
      <div id="rumo-header">
        <div><h1>Painel</h1><div class="subtitle">Visão geral do seu mês</div></div>
        <div style="display:flex; gap:10px; align-items:center;">
          ${monthSwitchHtml()}
          <button class="btn btn-primary" id="addTxBtn">+ Nova transação</button>
        </div>
      </div>

      <div class="grid-4">
        <div class="card stat-card">
          <div class="stat-label">Saldo total</div>
          <div class="stat-value total mono">${fmt(totalBalance)}</div>
          <div class="stat-note">Soma de todas as contas</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Receitas do mês</div>
          <div class="stat-value pos mono">${fmt(income)}</div>
          <div class="stat-note">${monthTx.filter(t=>t.type==='income').length} lançamento(s)</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Despesas do mês</div>
          <div class="stat-value neg mono">${fmt(expense)}</div>
          <div class="stat-note">${monthTx.filter(t=>t.type==='expense').length} lançamento(s)</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Economia do mês</div>
          <div class="stat-value mono ${savings>=0?'pos':'neg'}">${fmt(savings)}</div>
          <div class="stat-note">Receitas − Despesas</div>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Lançamentos recentes</div>
          <div class="card-sub">Últimas movimentações de ${MONTHS[currentMonth]}</div>
          <div class="ledger">${recentRows}</div>
        </div>
        <div class="card">
          <div class="card-title">Despesas por categoria</div>
          <div class="card-sub">Para onde seu dinheiro está indo</div>
          ${catRows}
        </div>
      </div>

      <div class="grid-2" style="margin-top:16px;">
        <div class="card">
          <div class="card-title">Contas</div>
          <div class="card-sub">Saldo atualizado de cada conta</div>
          <div class="acc-mini-list">${accRows}</div>
        </div>
        <div class="card">
          <div class="card-title">Cartões de crédito</div>
          <div class="card-sub">Fatura atual de cada cartão</div>
          <div class="credit-tiles">${creditTiles}</div>
        </div>
      </div>
    `;
    bindMonthSwitch();
    document.getElementById('addTxBtn').onclick = ()=> openTxModal();
    bindLedgerRowActions();
    const goAddCard = document.getElementById('goAddCard');
    if(goAddCard) goAddCard.onclick = (e)=>{ e.preventDefault(); currentPage='accounts'; render(); setTimeout(()=>openAccountModal(),0); };
    mainEl.querySelectorAll('[data-edit-acc]').forEach(el=>{
      el.style.cursor = 'pointer';
      el.onclick = ()=> openAccountModal(state.accounts.find(a=>a.id===el.dataset.editAcc));
    });
    mainEl.querySelectorAll('[data-toggle-cat]').forEach(el=>{
      el.onclick = ()=>{
        const cid = el.dataset.toggleCat;
        expandedDashboardCat = expandedDashboardCat===cid ? null : cid;
        renderDashboard();
      };
    });
  }

  function rowHtml(t){
    const dateFmt = new Date(t.date+'T00:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'short'});
    if(t.type==='transfer'){
      const from = accById(t.fromAccountId);
      const to = accById(t.toAccountId);
      return `<div class="ledger-row" data-id="${t.id}">
        <div class="cat-stamp" style="background:var(--brass)">⇄</div>
        <div>
          <div class="desc">${escapeHtml(t.desc || 'Transferência')}</div>
          <div class="meta">${from?from.name:'?'} → ${to?to.name:'?'}</div>
        </div>
        <div class="amount mono" style="color:var(--ink);">${fmt(t.amount)}</div>
        <div class="date">${dateFmt}</div>
        <div class="row-actions">
          <button class="icon-btn edit-tx" title="Editar">✎</button>
          <button class="icon-btn del-tx" title="Excluir">✕</button>
        </div>
      </div>`;

      : t.recurrenceType==='period' ? `<span class="tag">${t.installmentIndex}/${t.installmentTotal}</span>`
      : t.recurrenceType==='fixed' ? `<span class="tag">Fixa</span>` : '';

      <div>
        <div class="desc">${escapeHtml(t.desc)}${badge}</div>
        <div class="meta">${c?c.name:'Sem categoria'}${sub?' › '+escapeHtml(sub.name):''} · ${a?a.name:''}</div>
      </div>

  function bindLedgerRowActions(){
    mainEl.querySelectorAll('.ledger-row').forEach(row=>{
      const id = row.dataset.id;
      const editBtn = row.querySelector('.edit-tx');
      const delBtn = row.querySelector('.del-tx');

      if(editBtn) editBtn.onclick = (e)=>{ e.stopPropagation(); openTxModal(state.transactions.find(t=>t.id===id)); };

        e.stopPropagation();
        state.transactions = state.transactions.filter(t=>t.id!==id);
        await saveState(); render();
      };
    });

  function escapeHtml(s){
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  // Descrições mais usadas recentemente, pra sugerir no autocompletar (ajuda
  // bastante a digitar rápido no celular).
  function recentDescriptions(){
    const counts = {};
    [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,300).forEach(t=>{
      if(!t.desc) return;
      counts[t.desc] = (counts[t.desc]||0) + 1;
    });
    return Object.keys(counts).sort((a,b)=>counts[b]-counts[a]).slice(0,25);
  }

  // ---------- TRANSACTIONS ----------
  function renderTransactions(){
    let list = txForMonth(currentYear, currentMonth);
    if(txFilter.categoryId!=='all') list = list.filter(t=>t.categoryId===txFilter.categoryId);
    if(txFilter.accountId!=='all') list = list.filter(t=> t.type==='transfer' ? (t.fromAccountId===txFilter.accountId || t.toAccountId===txFilter.accountId) : t.accountId===txFilter.accountId);
    if(txFilter.search.trim()) {
      const q = txFilter.search.toLowerCase();
      list = list.filter(t=>t.desc.toLowerCase().includes(q));

    list = [...list].sort((a,b)=> b.date.localeCompare(a.date));

    const catOptions = state.categories.map(c=>`<option value="${c.id}" ${txFilter.categoryId===c.id?'selected':''}>${c.name}</option>`).join('');
    const accOptions = state.accounts.map(a=>`<option value="${a.id}" ${txFilter.accountId===a.id?'selected':''}>${a.name}</option>`).join('');

    mainEl.innerHTML = `
